<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyEssantia · all products</title>
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Montserrat:wght@300..900&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <!-- Common CSS -->
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="footer.css">
  
  <style>
    /* ===== GLOBAL & RESETS ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { 
      font-family: 'Inter', 'Montserrat', sans-serif; 
      background: #ffffff; 
      color: #1e1e1e; 
      overflow-x: hidden;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { 
      width: 100%; 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 0 20px; 
    }
    @media (min-width: 640px) { 
      .container { 
        padding: 0 30px; 
      } 
    }
    @media (min-width: 1200px) { 
      .container { 
        padding: 0 40px; 
      } 
    }

    /* ===== ACTIVE NAV ===== */
    .nav-link.active { color: #d4af37 !important; font-weight: 700; position: relative; }
    .nav-link.active::after {
      content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px;
      background: #d4af37; animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { width: 0; opacity: 0; } to { width: 100%; opacity: 1; } }

    /* ===== PAGE HEADER ===== */
    .page-header {
      background: #fcfaf7;
      padding: 1.5rem 0 1rem;
      position: relative;
      overflow: hidden;
      border-bottom: 3px solid #000;
    }
    .page-header-bg {
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1601924994987-69e26d50dc26?q=80&w=2070&auto=format&fit=crop');
      background-size: cover; background-position: 60% 30%; opacity: 0.1;
    }
    .page-header .container { position: relative; z-index: 2; }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .breadcrumbs a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumbs a:hover {
      color: #d4af37;
    }
    .breadcrumbs i {
      color: #d4af37;
      font-size: 0.7rem;
    }
    .breadcrumbs span {
      color: #000;
    }

    .page-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      line-height: 1.1;
      color: #000;
      margin-bottom: 0.25rem;
    }
    .page-title span {
      color: #d4af37;
      font-weight: 900;
      background: linear-gradient(145deg, #d4af37, #b07e2e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-desc {
      color: #2a2a2a;
      font-size: 1rem;
      max-width: 600px;
      font-weight: 400;
      line-height: 1.5;
    }

    /* ===== FILTER BAR ===== */
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0 1.5rem;
      border-bottom: 2px solid #000;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .filter-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .filter-select {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #000;
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      border: 2px solid #d4af37;
      cursor: pointer;
      transition: 0.2s;
    }

    .filter-select:hover {
      background: #1a1a1a;
    }

    .filter-select i {
      color: #d4af37;
      font-size: 0.9rem;
    }

    .filter-select select,
    .filter-select input {
      background: transparent;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      outline: none;
      cursor: pointer;
      text-transform: uppercase;
    }

    .filter-select select option {
      background: #000;
      color: #fff;
    }

    .filter-select input {
      width: 200px;
      cursor: text;
    }

    .filter-select input::placeholder {
      color: #999;
      text-transform: none;
    }

    /* Hidden category filter (for JS) */
    #category-filter {
      display: none;
    }

    /* ===== CATEGORY CHIPS ===== */
    .category-chips {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      justify-content: flex-start;
    }

    .category-chip {
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      background: #fff;
      border: 2px solid #000;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .category-chip:hover {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .category-chip.active {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    /* ===== PRODUCT GRID - IMPROVED SPACING ===== */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin: 2rem 0 4rem;
    }
    
    @media (min-width: 600px) { 
      .product-grid { 
        gap: 1.8rem; 
      } 
    }
    
    @media (min-width: 800px) { 
      .product-grid { 
        grid-template-columns: repeat(3, 1fr);
        gap: 2rem;
      } 
    }
    
    @media (min-width: 1100px) { 
      .product-grid { 
        grid-template-columns: repeat(4, 1fr); 
        gap: 2.2rem; 
      } 
    }
    
    @media (min-width: 1400px) { 
      .product-grid { 
        grid-template-columns: repeat(5, 1fr); 
        gap: 2.5rem; 
      } 
    }

    .product-card {
      background: transparent;
      padding: 0;
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
      text-decoration: none;
      color: inherit;
      border: none;
      cursor: pointer;
      position: relative;
      width: 100%;
    }
    .product-card:hover { transform: translateY(-4px); }

    .image-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 0.8rem;
      background: #f8f6f2;
      border: 2px solid #000;
      box-shadow: 0 8px 16px -8px rgba(0,0,0,0.15);
    }
    
    /* Image hover effect - show second image */
    .primary-img, .secondary-img { 
      position: absolute; 
      inset: 0; 
      background-size: cover; 
      background-position: center; 
      transition: opacity 0.3s ease;
    }
    .primary-img { 
      opacity: 1; 
      z-index: 2; 
    }
    .secondary-img { 
      opacity: 0; 
      z-index: 1; 
    }
    .image-frame:hover .primary-img { 
      opacity: 0; 
    }
    .image-frame:hover .secondary-img { 
      opacity: 1; 
    }
    @media (hover: none) { 
      .secondary-img { 
        opacity: 0; 
      }
      .image-frame:hover .primary-img { 
        opacity: 1; 
      }
    }

    /* Sale badge positioned top right on image - matching accessories page */
    .sale-badge-image {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #d4af37;
      color: #000;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.2rem 0.7rem;
      border-radius: 60px;
      border: 2px solid #000;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 30;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      pointer-events: none;
    }
    .sale-badge-image::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 30%;
      height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,240,1) 40%, rgba(255,255,255,0.9) 60%, rgba(255,255,255,0) 100%);
      transform: rotate(25deg);
      animation: shimmerStrongPulse 2.2s infinite ease-in-out;
      filter: blur(1px);
    }

    @keyframes shimmerStrongPulse {
      0% { left: -60%; opacity: 0.2; }
      10% { left: -60%; opacity: 0.2; transform: rotate(25deg) scale(1); }
      25% { left: 0%; opacity: 0.6; transform: rotate(25deg) scale(1.15); }
      35% { left: 50%; opacity: 1; transform: rotate(25deg) scale(1.25); }
      45% { left: 100%; opacity: 0.8; transform: rotate(25deg) scale(1.15); }
      55% { left: 100%; opacity: 0; transform: rotate(25deg) scale(1); }
      100% { left: 100%; opacity: 0; transform: rotate(25deg) scale(1); }
    }

    .new-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #000;
      color: #d4af37;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.2rem 0.7rem;
      border-radius: 60px;
      z-index: 20;
      letter-spacing: 0.3px;
      border: 2px solid #d4af37;
      display: flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
      pointer-events: none;
    }

    .product-category {
      font-size: 0.65rem;
      color: #666;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 0.1rem;
    }
    .product-title { 
      font-weight: 800;
      font-size: 0.95rem;
      margin: 0.1rem 0 0.2rem;
      color: #000;
      line-height: 1.3;
      text-transform: uppercase;
      word-break: break-word;
      font-family: 'Montserrat', sans-serif;
    }
    .product-rating { 
      display: flex;
      align-items: center;
      gap: 2px;
      margin: 0.1rem 0;
      font-size: 0.75rem;
    }
    .product-rating i { color: #d4af37; font-size: 0.7rem; }
    .product-rating span {
      margin-left: 4px;
      color: #666;
      font-weight: 600;
      font-size: 0.7rem;
    }
    .product-price-block {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin: 0.2rem 0 0.1rem;
      width: 100%;
    }
    .current-price { 
      color: #d4af37; 
      font-weight: 800; 
      font-size: 1.2rem; 
    }
    .current-price .inr-symbol { 
      font-size: 0.9rem; 
    }
    .old-price { 
      color: #999; 
      font-size: 0.8rem; 
      text-decoration: line-through; 
    }
    .card-add-btn {
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px;
      background: #000; 
      border: 2px solid #000; 
      border-radius: 60px;
      padding: 0.6rem 0.3rem; 
      font-size: 0.8rem; 
      font-weight: 600; 
      color: #fff;
      cursor: pointer; 
      width: 100%; 
      margin: 0.5rem 0 0; 
      min-height: 40px;
      transition: all 0.15s; 
      text-transform: uppercase;
    }
    .card-add-btn i { color: #d4af37; transition: color 0.15s; font-size: 0.8rem; }
    .card-add-btn:hover { background: #d4af37; color: #000; border-color: #d4af37; }
    .card-add-btn:hover i { color: #000; }
    
    /* Added state for add-to-cart feedback */
    .card-add-btn.added {
      background: #2e7d32;
      border-color: #2e7d32;
      color: white;
      pointer-events: none;
    }
    .card-add-btn.added i {
      color: white;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      background: #fcfaf7;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
    }
    .empty-state i {
      font-size: 4rem;
      color: #d4af37;
      margin-bottom: 1rem;
    }
    .empty-state h3 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      font-family: 'Montserrat', sans-serif;
    }
    .empty-state p {
      color: #666;
      font-size: 1.1rem;
    }

    /* ===== SCROLL TOP ===== */
    .scroll-top {
      position: fixed; bottom: 20px; right: 20px; 
      background: #000; color: #d4af37; width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; 
      border: 2px solid #d4af37; box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      opacity: 0; transform: translateY(15px); transition: 0.2s; z-index: 100;
      font-size: 1.2rem; cursor: pointer;
    }
    .scroll-top.visible { opacity: 1; transform: translateY(0); }
    .scroll-top:hover { background: #d4af37; color: #000; border-color: #000; }

    /* ===== CART MODAL BUTTON STYLES ===== */
    .cart-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }
    
    .cart-buttons .btn {
      text-decoration: none !important;
      border-bottom: none !important;
    }
    
    .cart-buttons .btn:hover,
    .cart-buttons .btn:focus,
    .cart-buttons .btn:active {
      text-decoration: none !important;
      border-bottom: none !important;
    }
    
    /* Mobile-specific styles */
    @media (max-width: 768px) {
      .filter-bar { 
        flex-direction: column; 
        align-items: stretch; 
      }
      .filter-group { 
        justify-content: center; 
      }
      .filter-select input { 
        width: 100%; 
      }
      
      /* Align buttons on same line for mobile */
      .cart-buttons {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      
      .cart-buttons .btn {
        margin: 0 !important;
        white-space: nowrap;
        flex: 0 1 auto;
        min-width: 120px;
      }
    }

    @media (max-width: 480px) {
      .category-chip {
        padding: 0.4rem 1rem;
        font-size: 0.75rem;
      }
      
      .cart-buttons .btn {
        min-width: 100px;
        padding: 10px 15px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div id="header"></div>
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fa-solid fa-arrow-up"></i></button>

  <main>
    <!-- PAGE HEADER -->
    <section class="page-header">
      <div class="page-header-bg"></div>
      <div class="container">
        <div class="breadcrumbs">
          <a href="index.html">home</a>
          <i class="fa-solid fa-chevron-right"></i>
          <span>all products</span>
        </div>
        <h1 class="page-title">our <span>collection</span></h1>
        <p class="page-desc">Discover our complete range of premium accessories and essentials</p>
      </div>
    </section>

    <!-- FILTER BAR -->
    <div class="container">
      <div class="filter-bar">
        <div class="filter-group">
          <div class="filter-select">
            <i class="fa-solid fa-arrow-down-wide-short"></i>
            <select id="sort-filter">
              <option value="default">Sort: Featured</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="rating">Top Rated</option>
              <option value="newest">Newest First</option>
            </select>
          </div>
        </div>

        <div class="filter-select">
          <i class="fa-solid fa-search"></i>
          <input type="text" id="search-input" placeholder="Search products..." autocomplete="off">
        </div>
      </div>

      <!-- Hidden category filter input -->
      <input type="hidden" id="category-filter" value="all">

      <!-- CATEGORY CHIPS -->
      <div id="category-chips" class="category-chips">
        <span class="category-chip active" data-category="all">All</span>
        <span class="category-chip" data-category="accessories">Accessories</span>
        <span class="category-chip" data-category="essentials">Essentials</span>
        <span class="category-chip" data-category="newarrival">New Arrivals</span>
      </div>
      
      <!-- PRODUCT GRID -->
      <div id="product-grid" class="product-grid"></div>
    </div>
  </main>

  <div id="footer"></div>

  <!-- Common Modals -->
  <div id="common-modals"></div>

  <script src="common.js"></script>
  <script>
    // ===== UTILITY FUNCTIONS =====
    function handleScroll() {
      const btn = document.getElementById('scrollTop');
      if (btn) btn.classList.toggle('visible', window.scrollY > 200);
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function renderRating(rating) {
      if (!rating || rating === 0) return '<span>★ 0.0</span>';
      const full = Math.floor(rating);
      let stars = '';
      for (let i = 0; i < 5; i++) {
        stars += i < full ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
      }
      return stars + `<span> ${rating.toFixed(1)}</span>`;
    }

    function formatPrice(price) {
      if (!price && price !== 0) return '0.00';
      return price.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
    }

    // Check if product is new (within 24h)
    function isNewProduct(product) {
      if (!product.createdAt) return false;
      const now = new Date();
      const creationDate = product.createdAt.toDate ? product.createdAt.toDate() : new Date(product.createdAt);
      const hoursDiff = (now - creationDate) / (1000 * 60 * 60);
      return hoursDiff < 24;
    }

    // ===== CATEGORY CHIPS SETUP =====
    function setupCategoryChips() {
      const chips = document.querySelectorAll('.category-chip');
      const categoryFilter = document.getElementById('category-filter');
      
      chips.forEach(chip => {
        chip.addEventListener('click', function() {
          // Remove active class from all chips
          chips.forEach(c => c.classList.remove('active'));
          
          // Add active class to clicked chip
          this.classList.add('active');
          
          // Update hidden category filter
          const category = this.dataset.category;
          if (categoryFilter) {
            categoryFilter.value = category;
          }
          
          // Re-render products
          renderProducts();
        });
      });

      // Initial active state
      const activeChip = document.querySelector('.category-chip.active');
      if (activeChip && categoryFilter) {
        categoryFilter.value = activeChip.dataset.category;
      }
    }

    // ===== MAIN RENDERING FUNCTION =====
    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const categoryFilter = document.getElementById('category-filter')?.value || 'all';
      const sortFilter = document.getElementById('sort-filter')?.value || 'default';
      const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';

      if (!grid || !window.products) return;

      // Add fallback oldPrice for testing
      window.products.forEach(product => {
        if (!product.oldPrice && product.price) {
          product.oldPrice = product.price * 1.2; // 20% higher for demo
        }
      });

      let filteredProducts = window.products.filter(product => {
        // Category filter
        if (categoryFilter !== 'all') {
          if (categoryFilter === 'accessories' && product.category !== 'accessories') return false;
          if (categoryFilter === 'essentials' && product.category !== 'essentials') return false;
          
          if (categoryFilter === 'newarrival') {
            if (!isNewProduct(product) && !product.showOnNew) return false;
          }
        }

        // Search filter
        if (searchTerm) {
          const searchable = `${product.title} ${product.category} ${product.brand || ''}`.toLowerCase();
          if (!searchable.includes(searchTerm)) return false;
        }

        return true;
      });

      // Sorting
      switch(sortFilter) {
        case 'price-low':
          filteredProducts.sort((a, b) => (a.price || 0) - (b.price || 0));
          break;
        case 'price-high':
          filteredProducts.sort((a, b) => (b.price || 0) - (a.price || 0));
          break;
        case 'rating':
          filteredProducts.sort((a, b) => (b.rating || 0) - (a.rating || 0));
          break;
        case 'newest':
          filteredProducts.sort((a, b) => {
            const dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
            const dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
            return dateB - dateA;
          });
          break;
        default:
          // Keep original order
          break;
      }

      if (filteredProducts.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-box-open"></i>
            <h3>no products found</h3>
            <p>Try adjusting your filters or search term.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = filteredProducts.map(product => {
        const mainImage = product.images?.[0] || product.primaryImg || 'https://via.placeholder.com/300';
        const secondImage = product.images?.[1] || product.secondaryImg || mainImage;
        const isNew = isNewProduct(product) || product.showOnNew;
        const hasSale = product.oldPrice && product.oldPrice > product.price;
        
        return `
          <div class="product-card" data-product-id="${product.id}">
            <a href="product.html?id=${product.id}" style="text-decoration:none; color:inherit; display:block;">
              <div class="image-frame">
                ${isNew ? `
                  <span class="new-badge">
                    <i class="fa-regular fa-star"></i> NEW
                  </span>
                ` : ''}
                ${hasSale ? `
                  <span class="sale-badge-image">SALE</span>
                ` : ''}
                <div class="primary-img" style="background-image: url('${mainImage}');"></div>
                <div class="secondary-img" style="background-image: url('${secondImage}');"></div>
              </div>
              <p class="product-category">${product.category || 'product'}</p>
              <h3 class="product-title">${product.title}</h3>
              <div class="product-rating">${renderRating(product.rating)}</div>
              <div class="product-price-block">
                ${hasSale ? `<span class="old-price">₹${formatPrice(product.oldPrice)}</span>` : ''}
                <span class="current-price"><span class="inr-symbol">₹</span>${formatPrice(product.price)}</span>
              </div>
            </a>
            <button class="card-add-btn" onclick="handleProductAdd('${product.id}', this); event.stopPropagation();">
              <i class="fa-solid fa-cart-plus"></i> add
            </button>
          </div>
        `;
      }).join('');
    }

    // Handle add to cart with button feedback
    window.handleProductAdd = function(productId, btn) {
      // Show added effect
      btn.classList.add('added');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> added';
      
      // Use master function from common.js
      if (typeof window.masterAddToCart === 'function') {
        window.masterAddToCart(productId, false);
        
        // Open cart modal after a short delay
        setTimeout(() => {
          if (typeof window.openCart === 'function') {
            window.openCart();
            
            // Remove underline from cart modal buttons
            setTimeout(() => {
              const cartButtons = document.querySelectorAll('.cart-buttons .btn, .cart-modal .btn, .cart-footer .btn');
              cartButtons.forEach(btn => {
                btn.style.textDecoration = 'none';
                btn.style.borderBottom = 'none';
              });
            }, 100);
          }
          
          // Reset button after 2 seconds
          setTimeout(() => {
            btn.classList.remove('added');
            btn.innerHTML = '<i class="fa-solid fa-cart-plus"></i> add';
          }, 2000);
        }, 200);
      } else {
        // Fallback
        if (typeof window.addToCart === 'function') {
          window.addToCart(productId);
          
          setTimeout(() => {
            btn.classList.remove('added');
            btn.innerHTML = '<i class="fa-solid fa-cart-plus"></i> add';
          }, 2000);
        }
      }
    };

    // Function to ensure cart buttons have no underline
    function ensureCartButtonsNoUnderline() {
      const cartButtons = document.querySelectorAll('.cart-buttons .btn, .cart-modal .btn, .cart-footer .btn');
      cartButtons.forEach(btn => {
        btn.style.textDecoration = 'none';
        btn.style.borderBottom = 'none';
        
        // Also remove any hover underlines
        btn.addEventListener('mouseenter', function() {
          this.style.textDecoration = 'none';
          this.style.borderBottom = 'none';
        });
        
        btn.addEventListener('mouseleave', function() {
          this.style.textDecoration = 'none';
          this.style.borderBottom = 'none';
        });
      });
    }

    // ===== INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', async () => {
      // Load components
      if (typeof window.loadComponents === 'function') {
        await window.loadComponents();
      }
      
      // Set active nav
      setTimeout(() => {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.nav-link[href="all-products.html"]').forEach(l => l.classList.add('active'));
      }, 200);

      // Setup category chips
      setupCategoryChips();

      // Render products
      if (window.products?.length) {
        renderProducts();
      } else {
        const cached = localStorage.getItem('MyEssantia_products');
        if (cached) {
          try {
            window.products = JSON.parse(cached);
            renderProducts();
          } catch (e) {
            console.error('Error parsing cached products:', e);
          }
        }
      }

      // Add event listeners
      document.getElementById('sort-filter')?.addEventListener('change', renderProducts);
      document.getElementById('search-input')?.addEventListener('input', debounce(renderProducts, 300));
      
      // Ensure cart buttons have no underline when cart opens
      document.addEventListener('cartOpened', ensureCartButtonsNoUnderline);
    });

    window.addEventListener('load', () => {
      if (!window.products?.length) {
        const cached = localStorage.getItem('MyEssantia_products');
        if (cached) { 
          try {
            window.products = JSON.parse(cached); 
            renderProducts();
          } catch (e) {
            console.error('Error parsing cached products:', e);
          }
        }
      }
      
      // Final check for cart buttons
      setTimeout(ensureCartButtonsNoUnderline, 1000);
    });

    // Watch for products to be loaded
    const productsObserver = new MutationObserver(() => {
      if (window.products?.length && !document.getElementById('product-grid').children.length) {
        renderProducts();
      }
    });
    
    productsObserver.observe(document.body, { childList: true, subtree: true });

    window.addEventListener('scroll', handleScroll);
  </script>
</body>
</html>
