<!-- ================= CART MODAL ================= -->
<div id="cart-modal" class="modal">
  <div class="modal-content cart-modal-content">
    <div class="modal-header">
      <h3>YOUR <span>CART</span></h3>
      <button class="close-modal" id="close-cart">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div id="cart-items" class="cart-items">
      <div class="empty-cart-message">
        <i class="fa-solid fa-bag-shopping" style="font-size:2rem; margin-bottom:0.5rem;"></i>
        <p>Your cart is empty</p>
      </div>
    </div>

    <div class="modal-footer">
      <div class="cart-total">
        <span>TOTAL:</span>
        <span id="cart-total-amount">₹0.00</span>
      </div>

      <button class="checkout-btn" id="checkout-btn">
        <i class="fa-solid fa-bolt"></i>
        PROCEED TO CHECKOUT
      </button>
    </div>
  </div>
</div>

<!-- ================= PROFILE MODAL ================= -->
<div id="profile-modal" class="modal">
  <div class="modal-content profile-modal-content">
    <div class="modal-header">
      <h3>MY <span>ACCOUNT</span></h3>
      <button class="close-modal" id="close-profile">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div id="profile-content" class="profile-content"></div>
  </div>
</div>

<!-- ================= SEARCH MODAL ================= -->
<div id="search-modal" class="modal">
  <div class="modal-content search-modal-content">
    <div class="modal-header">
      <h3>SEARCH <span>PRODUCTS</span></h3>
      <button class="close-modal" id="close-search">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="search-box-wrap">
      <input
        type="text"
        id="search-products-input"
        class="search-products-input"
        placeholder="Search by product name or category"
        autocomplete="off"
      />
    </div>

    <div id="search-results" class="search-results"></div>
  </div>
</div>

<!-- ================= DYNAMIC CHECKOUT ROOT ================= -->
<div id="checkout-modal-root"></div>

<style>
  .search-modal-content {
    max-width: 760px;
    width: min(92vw, 760px);
    max-height: 88vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .search-box-wrap {
    padding: 0 1.5rem 1rem;
    border-bottom: 1px solid #eee;
  }

  .search-products-input {
    width: 100%;
    border: 1px solid #d9d9d9;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 1rem;
    outline: none;
  }

  .search-products-input:focus {
    border-color: #d4af37;
    box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12);
  }

  .search-results {
    padding: 1rem 1.5rem 1.5rem;
    overflow-y: auto;
    display: grid;
    gap: 1rem;
  }

  .search-empty {
    text-align: center;
    color: #666;
    padding: 2rem 1rem;
  }

  .search-product-card {
    display: grid;
    grid-template-columns: 92px 1fr auto;
    gap: 1rem;
    align-items: center;
    border: 1px solid #eee;
    border-radius: 18px;
    padding: 0.9rem;
    background: #fff;
  }

  .search-product-image {
    width: 92px;
    height: 92px;
    border-radius: 16px;
    background-size: cover;
    background-position: center;
    background-color: #f7f7f7;
  }

  .search-product-info h4 {
    margin: 0 0 0.35rem;
    font-size: 1rem;
  }

  .search-product-meta {
    color: #777;
    font-size: 0.92rem;
    margin-bottom: 0.45rem;
  }

  .search-product-price {
    font-weight: 700;
    color: #111;
  }

  .search-product-action {
    min-width: 140px;
  }

  .search-add-btn {
    border: 0;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    background: #111;
    color: #fff;
  }

  @media (max-width: 640px) {
    .search-product-card {
      grid-template-columns: 72px 1fr;
    }

    .search-product-action {
      grid-column: 1 / -1;
      min-width: 100%;
    }

    .search-product-image {
      width: 72px;
      height: 72px;
    }
  }
</style>
