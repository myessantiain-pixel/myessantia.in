<!-- Review Form (Add/Edit) -->
<div class="review-form" id="reviewForm">

    <div class="form-title">
      <i class="fa-solid fa-plus-circle"></i> 
      <span id="review-form-title">add new review</span>
    </div>
  </div>
  <div class="form-body">
    <form id="review-form" onsubmit="return handleReviewSubmit(event)">
      <input type="hidden" id="review-id">
      
      <div class="form-row">
        <div class="form-group">
          <label><i class="fa-solid fa-box"></i> product</label>
          <select id="review-product-id" required>
            <option value="">Choose product...</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-user"></i> reviewer name</label>
          <input type="text" id="reviewer-name" required>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label><i class="fa-solid fa-city"></i> city</label>
          <input type="text" id="reviewer-city" required>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-star"></i> rating (1-5)</label>
          <input type="number" step="0.5" min="1" max="5" id="review-rating" required>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group full-width">
          <label><i class="fa-solid fa-comment"></i> comment</label>
          <textarea id="review-comment" rows="2" required></textarea>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label><i class="fa-solid fa-image"></i> image (optional)</label>
          <div class="media-upload-row">
            <input type="text" class="media-url-input" id="review-image-url" placeholder="image URL...">
            <button type="button" class="media-upload-btn" onclick="addReviewImageFromUrl()">
              <i class="fa-solid fa-plus"></i> add
            </button>
            <input type="file" id="review-image-file" class="media-file-input" accept="image/*" onchange="handleReviewImageUpload(this.files)" style="display:none;">
            <label for="review-image-file" class="media-file-label">
              <i class="fa-solid fa-upload"></i> upload
            </label>
          </div>
          <div id="review-image-preview" style="margin-top:12px; display:none;">
            <img id="review-image-preview-img" style="width:80px; height:80px; border-radius:12px; border:2px solid #000; object-fit:cover;">
            <button type="button" class="action-btn" onclick="removeReviewImage()" style="margin-top:6px;">
              <i class="fa-solid fa-times"></i> remove
            </button>
          </div>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-check-circle"></i> verified purchase</label>
          <div class="toggle-container">
            <label class="toggle-switch">
              <input type="checkbox" id="review-verified" checked> 
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">verified</span>
          </div>
        </div>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-save"></i> save review
        </button>
        <button type="button" class="btn btn-outline" onclick="resetReviewForm()">

        </button>
