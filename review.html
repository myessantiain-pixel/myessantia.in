<!-- Complete Review Page -->
<div class="container">
  <!-- Review Form (Add/Edit) - Exactly like original -->
  <div class="review-form" id="reviewForm">
    <div class="form-header">
      <div class="form-title">
        <i class="fa-solid fa-plus-circle"></i> 
        <span id="review-form-title">add new review</span>
      </div>
    </div>
    <div class="form-body">
      <form id="review-form" onsubmit="return handleReviewSubmit(event)">
        <input type="hidden" id="review-id">
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fa-solid fa-box"></i> product</label>
            <select id="review-product-id" required>
              <option value="">Choose product...</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-user"></i> reviewer name</label>
            <input type="text" id="reviewer-name" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fa-solid fa-city"></i> city</label>
            <input type="text" id="reviewer-city" required>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-star"></i> rating (1-5)</label>
            <input type="number" step="0.5" min="1" max="5" id="review-rating" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group full-width">
            <label><i class="fa-solid fa-comment"></i> comment</label>
            <textarea id="review-comment" rows="2" required></textarea>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fa-solid fa-image"></i> image (optional)</label>
            <div class="media-upload-row">
              <input type="text" class="media-url-input" id="review-image-url" placeholder="image URL...">
              <button type="button" class="media-upload-btn" onclick="addReviewImageFromUrl()">
                <i class="fa-solid fa-plus"></i> add
              </button>
              <input type="file" id="review-image-file" class="media-file-input" accept="image/*" onchange="handleReviewImageUpload(this.files)" style="display:none;">
              <label for="review-image-file" class="media-file-label">
                <i class="fa-solid fa-upload"></i> upload
              </label>
            </div>
            <div id="review-image-preview" style="margin-top:12px; display:none;">
              <img id="review-image-preview-img" style="width:80px; height:80px; border-radius:12px; border:2px solid #000; object-fit:cover;">
              <button type="button" class="action-btn" onclick="removeReviewImage()" style="margin-top:6px;">
                <i class="fa-solid fa-times"></i> remove
              </button>
            </div>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-check-circle"></i> verified purchase</label>
            <div style="display:flex; align-items:center; gap:12px; margin-top:8px;">
              <label class="toggle-switch">
                <input type="checkbox" id="review-verified" checked> 
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label">verified</span>
            </div>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-save"></i> save review
          </button>
          <button type="button" class="btn btn-outline" onclick="resetReviewForm()">
            <i class="fa-solid fa-times"></i> cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Filters Bar -->
  <div class="filters-bar">
    <div class="search-box">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="search-reviews" placeholder="search reviewer, city or comment...">
    </div>
    
    <div class="filter-tabs">
      <span class="filter-tab active" id="filter-all" onclick="filterReviews('all')">all</span>
      <span class="filter-tab" id="filter-verified" onclick="filterReviews('verified')">verified</span>
      <span class="filter-tab" id="filter-unverified" onclick="filterReviews('unverified')">unverified</span>
      <span class="filter-tab" id="filter-with-image" onclick="filterReviews('with-image')">with images</span>
    </div>
    
    <div style="display: flex; gap: 12px;">
      <button class="export-btn" onclick="resetReviewForm()">
        <i class="fa-solid fa-plus"></i> new review
      </button>
      <button class="export-btn" onclick="exportReviews()">
        <i class="fa-solid fa-download"></i> export csv
      </button>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid" style="margin-top: 24px;">
    <div class="stat-card">
      <div class="stat-icon"><i class="fa-solid fa-star"></i></div>
      <div class="stat-info">
        <h3 id="total-reviews">0</h3>
        <p>total reviews</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fa-solid fa-check-circle"></i></div>
      <div class="stat-info">
        <h3 id="verified-reviews">0</h3>
        <p>verified</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fa-solid fa-image"></i></div>
      <div class="stat-info">
        <h3 id="reviews-with-images">0</h3>
        <p>with images</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
      <div class="stat-info">
        <h3 id="reviewed-products">0</h3>
        <p>products</p>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div id="reviews-loading" style="display: flex; justify-content: center; padding: 40px;">
    <div class="spinner" style="width:40px;height:40px;border:4px solid #eee;border-top-color:#d4af37;border-radius:50%;animation:spin 1s infinite;"></div>
  </div>
  
  <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

  <!-- Reviews Table Container -->
  <div class="reviews-table">
    <div class="table-header">
      <h2><i class="fa-solid fa-star"></i> product reviews</h2>
      <div class="header-actions">
        <span class="template-btn" onclick="resetReviewForm()">
          <i class="fa-solid fa-plus"></i> new review
        </span>
      </div>
    </div>
    
    <!-- Empty State -->
    <div id="reviews-empty-state" class="empty-state" style="display: none;">
      <i class="fa-regular fa-star"></i>
      <h3>no reviews yet</h3>
      <p>add your first review using the form above.</p>
    </div>
    
    <!-- Desktop Table View -->
    <div class="table-wrapper" id="reviews-table-wrapper">
      <table>
        <thead>
          <tr>
            <th>product</th>
            <th>reviewer</th>
            <th>rating</th>
            <th>comment</th>
            <th>image</th>
            <th>verified</th>
            <th>date</th>
            <th>actions</th>
          </tr>
        </thead>
        <tbody id="reviews-table-body">
          <!-- Populated by JavaScript -->
        </tbody>
      </table>
    </div>
    
    <!-- Mobile Cards View -->
    <div id="reviews-mobile-cards" class="mobile-cards"></div>
    
    <!-- Pagination -->
    <div class="pagination" id="reviews-pagination" style="display: none;">
      <button class="page-btn" id="prev-review-page" onclick="changeReviewPage('prev')">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="page-numbers" id="review-page-numbers"></div>
      <button class="page-btn" id="next-review-page" onclick="changeReviewPage('next')">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </div>
</div>

<script>
// ===== GLOBALLY ACCESSIBLE REVIEW FUNCTIONS =====
// Store variables in window object
window.allReviews = [];
window.filteredReviews = [];
window.currentReviewFilter = 'all';
window.currentReviewPage = 1;
window.reviewItemsPerPage = 10;
window.reviewProducts = {};
window.reviewImageUrl = '';

// Show notification function (global)
window.showReviewNotification = function(message, type = 'success') {
  // Try to use parent notification first
  if (typeof window.parent.showNotification === 'function') {
    window.parent.showNotification(message, type);
    return;
  }
  
  // Fallback notification
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => {
    notification.remove();
  }, 2000);
};

// Load products for dropdown
window.loadReviewProducts = async function() {
  try {
    const snap = await db.collection('products').get();
    let options = '<option value="">Choose product...</option>';
    snap.docs.forEach(doc => {
      const prod = doc.data();
      window.reviewProducts[doc.id] = { 
        title: prod.title, 
        primaryImg: prod.primaryImg || (prod.media?.[0]?.url) || 'https://via.placeholder.com/80',
        price: prod.price
      };
      options += `<option value="${doc.id}">${prod.title}</option>`;
    });
    const selectProduct = document.getElementById('review-product-id');
    if (selectProduct) selectProduct.innerHTML = options;
  } catch (e) { 
    console.error('Error loading products:', e); 
    window.showReviewNotification('Error loading products', 'error');
  }
};

// Load reviews from Firestore
window.loadReviews = async function() {
  const loadingEl = document.getElementById('reviews-loading');
  if (loadingEl) loadingEl.style.display = 'flex';
  
  try {
    const snap = await db.collection('reviews').orderBy('timestamp', 'desc').get();
    window.allReviews = snap.docs.map(doc => ({
      id: doc.id,
      ...doc.data(),
      timestamp: doc.data().timestamp?.toDate() || new Date()
    }));
    
    await window.loadReviewProducts();
    window.applyReviewFilter(window.currentReviewFilter);
    window.updateReviewStats();
    window.renderReviews();
    
  } catch (error) {
    console.error('Error loading reviews:', error);
    window.showReviewNotification('error loading reviews', 'error');
  } finally {
    if (loadingEl) loadingEl.style.display = 'none';
  }
};

// Apply filter logic
window.applyReviewFilter = function(filter) {
  if (filter === 'all') {
    window.filteredReviews = [...window.allReviews];
  } else if (filter === 'verified') {
    window.filteredReviews = window.allReviews.filter(r => r.verified === true);
  } else if (filter === 'unverified') {
    window.filteredReviews = window.allReviews.filter(r => !r.verified);
  } else if (filter === 'with-image') {
    window.filteredReviews = window.allReviews.filter(r => r.imageUrl && r.imageUrl.trim() !== '');
  }
};

// Filter reviews function (global)
window.filterReviews = function(filter) {
  window.currentReviewFilter = filter;
  window.currentReviewPage = 1;
  
  document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
  const activeTab = document.getElementById(`filter-${filter}`);
  if (activeTab) activeTab.classList.add('active');
  
  window.applyReviewFilter(filter);
  window.renderReviews();
};

// Update statistics
window.updateReviewStats = function() {
  const totalEl = document.getElementById('total-reviews');
  const verifiedEl = document.getElementById('verified-reviews');
  const imagesEl = document.getElementById('reviews-with-images');
  const productsReviewedEl = document.getElementById('reviewed-products');
  
  if (totalEl) totalEl.textContent = window.allReviews.length;
  if (verifiedEl) verifiedEl.textContent = window.allReviews.filter(r => r.verified).length;
  if (imagesEl) imagesEl.textContent = window.allReviews.filter(r => r.imageUrl && r.imageUrl.trim() !== '').length;
  if (productsReviewedEl) productsReviewedEl.textContent = new Set(window.allReviews.map(r => r.productId)).size;
};

// Render reviews
window.renderReviews = function() {
  if (!window.filteredReviews) return;
  
  const tableBody = document.getElementById('reviews-table-body');
  const mobileCards = document.getElementById('reviews-mobile-cards');
  const emptyState = document.getElementById('reviews-empty-state');
  const paginationDiv = document.getElementById('reviews-pagination');
  
  if (window.filteredReviews.length === 0) {
    if (emptyState) emptyState.style.display = 'block';
    if (tableBody) tableBody.innerHTML = '';
    if (mobileCards) mobileCards.innerHTML = '';
    if (paginationDiv) paginationDiv.style.display = 'none';
    return;
  }
  
  if (emptyState) emptyState.style.display = 'none';
  
  const start = (window.currentReviewPage - 1) * window.reviewItemsPerPage;
  const end = start + window.reviewItemsPerPage;
  const pageReviews = window.filteredReviews.slice(start, end);
  
  // Desktop rows
  if (tableBody) {
    tableBody.innerHTML = pageReviews.map(review => {
      const product = window.reviewProducts[review.productId] || { title: 'Unknown', primaryImg: 'https://via.placeholder.com/80' };
      const stars = '★'.repeat(Math.floor(review.rating)) + (review.rating % 1 >= 0.5 ? '½' : '');
      const date = review.timestamp ? review.timestamp.toLocaleDateString('en-IN',{day:'numeric', month:'short', year:'numeric'}) : '';
      return `<tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="product-thumb" style="background-image:url('${product.primaryImg}')"></div>
            <span class="product-title">${product.title}</span>
          </div>
        </td>
        <td>
          <div style="font-weight:700;">${review.reviewerName}</div>
          <div style="font-size:0.7rem;">${review.city || ''}</div>
        </td>
        <td>
          <span class="star-rating">${stars}</span> ${review.rating}
        </td>
        <td style="max-width:200px;">${review.comment?.substring(0,50)}${review.comment?.length>50?'…':''}</td>
        <td>
          ${review.imageUrl ? 
            `<div class="review-thumb" style="background-image:url('${review.imageUrl}');" onclick="window.open('${review.imageUrl}')"></div>` : 
            '—'
          }
        </td>
        <td>
          ${review.verified ? 
            '<span class="verified-badge"><i class="fa-solid fa-check"></i> verified</span>' : 
            'no'
          }
        </td>
        <td><span class="timestamp">${date}</span></td>
        <td>
          <div class="action-btns">
            <button class="action-btn" onclick="editReview('${review.id}')"><i class="fa-solid fa-edit"></i></button>
            <button class="action-btn" onclick="deleteReview('${review.id}')"><i class="fa-solid fa-trash"></i></button>
            <button class="action-btn" onclick="viewReviewProduct('${review.productId}')"><i class="fa-solid fa-eye"></i></button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }
  
  // Mobile cards
  if (mobileCards) {
    mobileCards.innerHTML = pageReviews.map(review => {
      const product = window.reviewProducts[review.productId] || { title: 'Unknown', primaryImg: 'https://via.placeholder.com/80' };
      const stars = '★'.repeat(Math.floor(review.rating)) + (review.rating % 1 >= 0.5 ? '½' : '');
      return `<div class="notification-card">
        <div class="card-header">
          <div class="card-thumb" style="background-image:url('${product.primaryImg}')"></div>
          <div class="card-title">
            <h4>${product.title}</h4>
            <span class="product-id">${review.productId?.slice(0,8)}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-row"><i class="fa-solid fa-user"></i> ${review.reviewerName} (${review.city})</div>
          <div class="card-row"><i class="fa-solid fa-star"></i> ${stars} (${review.rating})</div>
          <div class="card-row"><i class="fa-solid fa-comment"></i> ${review.comment}</div>
          ${review.imageUrl ? 
            `<div class="card-row"><i class="fa-solid fa-image"></i> <div class="review-thumb" style="background-image:url('${review.imageUrl}');" onclick="window.open('${review.imageUrl}')"></div></div>` : 
            ''
          }
          <div class="card-row"><i class="fa-regular fa-calendar"></i> ${review.timestamp?.toLocaleDateString()}</div>
          <div class="card-row"><i class="fa-regular fa-circle-check"></i> verified: ${review.verified ? '✓' : '✗'}</div>
        </div>
        <div class="card-footer">
          <span>ID: ${review.id.slice(0,6)}</span>
          <div class="card-actions">
            <button class="action-btn" onclick="editReview('${review.id}')"><i class="fa-solid fa-edit"></i></button>
            <button class="action-btn" onclick="deleteReview('${review.id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  
  window.updateReviewPagination();
};

// Pagination functions
window.updateReviewPagination = function() {
  const paginationDiv = document.getElementById('reviews-pagination');
  const prevBtn = document.getElementById('prev-review-page');
  const nextBtn = document.getElementById('next-review-page');
  const pageNumbers = document.getElementById('review-page-numbers');
  
  const totalPages = Math.ceil(window.filteredReviews.length / window.reviewItemsPerPage);
  if (totalPages <= 1) { 
    if (paginationDiv) paginationDiv.style.display = 'none'; 
    return; 
  }
  
  if (paginationDiv) paginationDiv.style.display = 'flex';
  
  if (prevBtn) prevBtn.disabled = window.currentReviewPage === 1;
  if (nextBtn) nextBtn.disabled = window.currentReviewPage === totalPages;
  
  let nums = '';
  for (let i = Math.max(1, window.currentReviewPage-2); i <= Math.min(totalPages, window.currentReviewPage+2); i++) {
    nums += `<button class="page-btn ${i===window.currentReviewPage?'active':''}" onclick="goToReviewPage(${i})">${i}</button>`;
  }
  if (pageNumbers) pageNumbers.innerHTML = nums;
};

window.changeReviewPage = function(dir) {
  const total = Math.ceil(window.filteredReviews.length / window.reviewItemsPerPage);
  if (dir === 'prev' && window.currentReviewPage > 1) window.currentReviewPage--;
  if (dir === 'next' && window.currentReviewPage < total) window.currentReviewPage++;
  window.renderReviews();
};

window.goToReviewPage = function(p) { 
  window.currentReviewPage = p; 
  window.renderReviews(); 
};

// Form functions (global)
window.addReviewImageFromUrl = function() {
  const url = document.getElementById('review-image-url').value.trim();
  if (!url) {
    window.showReviewNotification('enter url', 'error');
    return;
  }
  try { 
    new URL(url); 
  } catch { 
    window.showReviewNotification('invalid url', 'error'); 
    return; 
  }
  window.reviewImageUrl = url;
  const preview = document.getElementById('review-image-preview');
  const previewImg = document.getElementById('review-image-preview-img');
  if (previewImg) previewImg.src = url;
  if (preview) preview.style.display = 'block';
  document.getElementById('review-image-url').value = '';
  window.showReviewNotification('image added');
};

window.handleReviewImageUpload = function(files) {
  if (!files.length) return;
  const file = files[0];
  const url = URL.createObjectURL(file);
  window.reviewImageUrl = url;
  const previewImg = document.getElementById('review-image-preview-img');
  if (previewImg) previewImg.src = url;
  document.getElementById('review-image-preview').style.display = 'block';
  window.showReviewNotification('image uploaded');
};

window.removeReviewImage = function() {
  window.reviewImageUrl = '';
  document.getElementById('review-image-preview').style.display = 'none';
  const fileInput = document.getElementById('review-image-file');
  if (fileInput) fileInput.value = '';
  window.showReviewNotification('image removed');
};

window.resetReviewForm = function() {
  document.getElementById('review-form').reset();
  const reviewId = document.getElementById('review-id');
  const formTitle = document.getElementById('review-form-title');
  const reviewVerified = document.getElementById('review-verified');
  
  if (reviewId) reviewId.value = '';
  if (formTitle) formTitle.innerHTML = '<i class="fa-solid fa-plus-circle"></i> add new review';
  if (reviewVerified) reviewVerified.checked = true;
  window.removeReviewImage();
  document.getElementById('reviewForm').scrollIntoView({ behavior: 'smooth' });
};

window.handleReviewSubmit = async function(e) {
  e.preventDefault();
  
  const productId = document.getElementById('review-product-id').value;
  if (!productId) { 
    window.showReviewNotification('select product', 'error'); 
    return false; 
  }
  
  const reviewData = {
    productId: productId,
    reviewerName: document.getElementById('reviewer-name').value,
    city: document.getElementById('reviewer-city').value,
    rating: parseFloat(document.getElementById('review-rating').value),
    comment: document.getElementById('review-comment').value,
    verified: document.getElementById('review-verified').checked,
    imageUrl: window.reviewImageUrl || '',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  try {
    const reviewId = document.getElementById('review-id');
    if (reviewId && reviewId.value) {
      await db.collection('reviews').doc(reviewId.value).update(reviewData);
      window.showReviewNotification('review updated');
    } else {
      await db.collection('reviews').add({ 
        ...reviewData, 
        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
      });
      window.showReviewNotification('review added');
    }
    window.resetReviewForm();
    await window.loadReviews();
  } catch (err) { 
    console.error(err);
    window.showReviewNotification('error saving', 'error'); 
  }
  return false;
};

window.editReview = function(id) {
  const review = window.allReviews.find(r => r.id === id);
  if (!review) return;
  
  const reviewId = document.getElementById('review-id');
  const selectProduct = document.getElementById('review-product-id');
  const reviewerName = document.getElementById('reviewer-name');
  const reviewerCity = document.getElementById('reviewer-city');
  const reviewRating = document.getElementById('review-rating');
  const reviewComment = document.getElementById('review-comment');
  const reviewVerified = document.getElementById('review-verified');
  const formTitle = document.getElementById('review-form-title');
  
  if (reviewId) reviewId.value = review.id;
  if (selectProduct) selectProduct.value = review.productId;
  if (reviewerName) reviewerName.value = review.reviewerName;
  if (reviewerCity) reviewerCity.value = review.city || '';
  if (reviewRating) reviewRating.value = review.rating;
  if (reviewComment) reviewComment.value = review.comment;
  if (reviewVerified) reviewVerified.checked = review.verified === true;
  
  if (review.imageUrl) {
    window.reviewImageUrl = review.imageUrl;
    const previewImg = document.getElementById('review-image-preview-img');
    if (previewImg) previewImg.src = review.imageUrl;
    document.getElementById('review-image-preview').style.display = 'block';
  } else {
    window.removeReviewImage();
  }
  
  if (formTitle) formTitle.innerHTML = '<i class="fa-solid fa-edit"></i> edit review';
  document.getElementById('reviewForm').scrollIntoView({ behavior: 'smooth' });
};

window.deleteReview = async function(id) {
  if (!confirm('delete review?')) return;
  try { 
    await db.collection('reviews').doc(id).delete(); 
    window.showReviewNotification('deleted'); 
    await window.loadReviews(); 
  } catch { 
    window.showReviewNotification('error', 'error'); 
  }
};

window.viewReviewProduct = function(productId) { 
  window.open(`product.html?id=${productId}`, '_blank'); 
};

// Export CSV (global)
window.exportReviews = function() {
  const data = window.filteredReviews.map(review => {
    const product = window.reviewProducts[review.productId] || { title: '' };
    return {
      product: product.title,
      reviewer: review.reviewerName,
      city: review.city,
      rating: review.rating,
      comment: review.comment,
      verified: review.verified ? 'yes' : 'no',
      image: review.imageUrl ? 'yes' : 'no',
      date: review.timestamp?.toLocaleDateString() || ''
    };
  });
  
  if (data.length === 0) {
    window.showReviewNotification('no reviews to export', 'error');
    return;
  }
  
  const headers = ['product','reviewer','city','rating','comment','verified','image','date'];
  const csvRows = [];
  csvRows.push(headers.join(','));
  
  for (const row of data) {
    const values = headers.map(header => {
      const value = row[header]?.toString() || '';
      return `"${value.replace(/"/g, '""')}"`;
    });
    csvRows.push(values.join(','));
  }
  
  const blob = new Blob([csvRows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); 
  a.href = URL.createObjectURL(blob); 
  a.download = 'reviews.csv'; 
  a.click();
  window.showReviewNotification('exported');
};

// Search
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('search-reviews');
  if (searchInput) {
    searchInput.addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      if (!term) { 
        window.applyReviewFilter(window.currentReviewFilter); 
      } else { 
        window.filteredReviews = window.allReviews.filter(r => 
          (r.reviewerName?.toLowerCase() || '').includes(term) || 
          (r.city?.toLowerCase() || '').includes(term) || 
          (r.comment?.toLowerCase() || '').includes(term)
        ); 
      }
      window.currentReviewPage = 1;
      window.renderReviews();
    });
  }
  
  // Initialize
  window.loadReviews();
});
</script>
