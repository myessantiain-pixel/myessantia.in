<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyEssantia · essentials – EXACT format (old price + sale badge)</title>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Montserrat:wght@300..900&display=swap" rel="stylesheet">

  <!-- Firebase SDKs (kept for compatibility) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Common CSS (referenced but not required for isolated demo) -->
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="footer.css">

  <style>
    /* ===== EXACT STYLES FROM ACCESSORIES.HTML (product grid, badges, header, sort) ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { 
      font-family: 'Inter', 'Montserrat', sans-serif; 
      background: #ffffff; 
      color: #1e1e1e; 
      overflow-x: hidden;
      line-height: 1.5;
    }
    .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 30px; }
    @media (min-width: 1600px) { .container { max-width: 1600px; padding: 0 40px; } }
    @media (min-width: 640px) { .container { padding: 0 32px; } }

    /* active nav (styling only) */
    .nav-link.active { color: #d4af37 !important; font-weight: 700; position: relative; }
    .nav-link.active::after {
      content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px;
      background: #d4af37; animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { width: 0; opacity: 0; } to { width: 100%; opacity: 1; } }

    /* page header exactly from accessories */
    .page-header {
      background: #fcfaf7;
      padding: 1.5rem 0 1rem;
      position: relative;
      overflow: hidden;
      border-bottom: 3px solid #000;
    }
    .page-header-bg {
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1601924994987-69e26d50dc26?q=80&w=2070&auto=format&fit=crop');
      background-size: cover; background-position: 60% 30%; opacity: 0.1;
    }
    .page-header .container { position: relative; z-index: 2; }

    /* header-content flex with sort */
    .header-content {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .title-section {
      flex: 1;
      min-width: 280px;
    }
    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .breadcrumbs a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumbs a:hover {
      color: #d4af37;
    }
    .breadcrumbs i {
      color: #d4af37;
      font-size: 0.7rem;
    }
    .breadcrumbs span {
      color: #000;
    }
    .page-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      line-height: 1.1;
      color: #000;
      margin-bottom: 0.25rem;
    }
    .page-title span {
      color: #d4af37;
      font-weight: 900;
      background: linear-gradient(145deg, #d4af37, #b07e2e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-desc {
      color: #2a2a2a;
      font-size: 1rem;
      max-width: 600px;
      font-weight: 400;
      line-height: 1.5;
    }

    /* sort section exactly from accessories */
    .sort-header-section {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .sort-select {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #000;
      padding: 0.5rem 1.5rem;
      border-radius: 60px;
      border: 2px solid #d4af37;
      cursor: pointer;
      transition: 0.2s;
    }
    .sort-select:hover {
      background: #1a1a1a;
    }
    .sort-select i {
      color: #d4af37;
      font-size: 0.9rem;
    }
    .sort-select select {
      background: transparent;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      outline: none;
      cursor: pointer;
      text-transform: uppercase;
    }
    .sort-select select option {
      background: #000;
      color: #fff;
    }

    /* product grid (accessories exact) */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
      margin: 1rem 0 4rem;
    }
    @media (min-width: 600px) { .product-grid { gap: 1.8rem; } }
    @media (min-width: 800px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1100px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 2rem; } }
    @media (min-width: 1400px) { .product-grid { grid-template-columns: repeat(5, 1fr); gap: 2rem; } }

    .product-card {
      background: transparent;
      padding: 0;
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
      text-decoration: none;
      color: inherit;
      border: none;
      cursor: pointer;
      position: relative;
    }
    .product-card:hover { transform: translateY(-4px); }

    .image-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 0.8rem;
      background: #f8f6f2;
      border: 2px solid #000;
      box-shadow: 0 8px 16px -8px rgba(0,0,0,0.15);
    }

    /* hover effect */
    .primary-img, .secondary-img { 
      position: absolute; 
      inset: 0; 
      background-size: cover; 
      background-position: center; 
      transition: opacity 0.3s ease;
    }
    .primary-img { 
      opacity: 1; 
      z-index: 2; 
    }
    .secondary-img { 
      opacity: 0; 
      z-index: 1; 
    }
    .image-frame:hover .primary-img { 
      opacity: 0; 
    }
    .image-frame:hover .secondary-img { 
      opacity: 1; 
    }
    @media (hover: none) { 
      .secondary-img { opacity: 0; }
    }

    /* ===== EXACT SALE BADGE (on image) & NEW BADGE ===== */
    .sale-badge-image {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #d4af37;
      color: #000;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.25rem 0.8rem;
      border-radius: 60px;
      border: 2px solid #000;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 30;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      pointer-events: none;
    }
    .sale-badge-image::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 30%;
      height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,240,1) 40%, rgba(255,255,255,0.9) 60%, rgba(255,255,255,0) 100%);
      transform: rotate(25deg);
      animation: shimmerStrongPulse 2.2s infinite ease-in-out;
      filter: blur(1px);
    }
    @keyframes shimmerStrongPulse {
      0% { left: -60%; opacity: 0.2; }
      10% { left: -60%; opacity: 0.2; transform: rotate(25deg) scale(1); }
      25% { left: 0%; opacity: 0.6; transform: rotate(25deg) scale(1.15); }
      35% { left: 50%; opacity: 1; transform: rotate(25deg) scale(1.25); }
      45% { left: 100%; opacity: 0.8; transform: rotate(25deg) scale(1.15); }
      55% { left: 100%; opacity: 0; transform: rotate(25deg) scale(1); }
      100% { left: 100%; opacity: 0; transform: rotate(25deg) scale(1); }
    }

    .new-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #000;
      color: #d4af37;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.8rem;
      border-radius: 60px;
      z-index: 20;
      letter-spacing: 0.3px;
      border: 2px solid #d4af37;
      display: flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* product info */
    .product-category {
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .product-title { 
      font-weight: 800;
      font-size: 1rem;
      margin: 0.2rem 0;
      color: #000;
      line-height: 1.3;
      text-transform: uppercase;
      word-break: break-word;
      font-family: 'Montserrat', sans-serif;
    }
    .product-rating { 
      display: flex;
      align-items: center;
      gap: 2px;
      margin: 0.2rem 0;
      font-size: 0.8rem;
    }
    .product-rating i { color: #d4af37; }
    .product-rating span {
      margin-left: 4px;
      color: #666;
      font-weight: 600;
    }
    .product-price-block {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0.4rem 0 0.1rem;
      width: 100%;
    }
    .current-price { 
      color: #d4af37; 
      font-weight: 800; 
      font-size: 1.4rem; 
    }
    .current-price .inr-symbol { 
      font-size: 1rem; 
    }
    .old-price { 
      color: #999; 
      font-size: 0.9rem; 
      text-decoration: line-through; 
    }

    /* add button exactly */
    .card-add-btn {
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px;
      background: #000; 
      border: 2px solid #000; 
      border-radius: 60px;
      padding: 0.7rem 0.3rem; 
      font-size: 0.85rem; 
      font-weight: 600; 
      color: #fff;
      cursor: pointer; 
      width: 100%; 
      margin: 0.5rem 0 0; 
      min-height: 44px;
      transition: all 0.15s; 
      text-transform: uppercase;
    }
    .card-add-btn i { color: #d4af37; transition: color 0.15s; }
    .card-add-btn:hover { background: #d4af37; color: #000; border-color: #d4af37; }
    .card-add-btn:hover i { color: #000; }
    .card-add-btn.added {
      background: #2e7d32;
      border-color: #2e7d32;
      color: white;
      pointer-events: none;
    }
    .card-add-btn.added i { color: white; }

    /* empty state */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      background: #fcfaf7;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
    }
    .empty-state i {
      font-size: 4rem;
      color: #d4af37;
      margin-bottom: 1rem;
    }
    .empty-state h3 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      font-family: 'Montserrat', sans-serif;
    }
    .empty-state p {
      color: #666;
      font-size: 1.1rem;
    }

    /* scroll top (accessories style) */
    .scroll-top {
      position: fixed; bottom: 20px; right: 20px; 
      background: #000; color: #d4af37; width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; 
      border: 2px solid #d4af37; box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      opacity: 0; transform: translateY(15px); transition: 0.2s; z-index: 100;
      font-size: 1.4rem; cursor: pointer;
    }
    .scroll-top.visible { opacity: 1; transform: translateY(0); }
    .scroll-top:hover { background: #d4af37; color: #000; border-color: #000; }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }
      .sort-header-section {
        width: 100%;
        justify-content: flex-start;
      }
      .sort-select {
        width: 100%;
        justify-content: center;
      }
      .sort-select select {
        flex: 1;
      }
    }
    @media (max-width: 480px) {
      .page-title { font-size: 2.2rem; }
    }

    /* minimal header / footer placeholder styling (just to keep layout if components missing) */
    #header, #footer, #common-modals { min-height: 20px; }
  </style>
</head>
<body>

  <!-- Header placeholder (as in accessories) -->
  <div id="header"></div>
  
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <main>
    <!-- PAGE HEADER EXACTLY FROM ACCESSORIES (only title changed to "essentials") -->
    <section class="page-header">
      <div class="page-header-bg"></div>
      <div class="container">
        <div class="header-content">
          <div class="title-section">
            <div class="breadcrumbs">
              <a href="index.html">home</a>
              <i class="fa-solid fa-chevron-right"></i>
              <span>essentials</span>   <!-- changed from accessories to essentials -->
            </div>
            <h1 class="page-title">all <span>essentials</span></h1> <!-- changed span text -->
            <p class="page-desc">Minimal, premium & daily essentials — curated for the modern lifestyle.</p> <!-- minor tweak -->
          </div>
          <div class="sort-header-section">
            <div class="sort-select">
              <i class="fa-solid fa-arrow-down-wide-short"></i>
              <select id="sort-select" aria-label="Sort products">
                <option value="popular">sort: popular</option>
                <option value="price-low">price: low to high</option>
                <option value="price-high">price: high to low</option>
                <option value="rating">top rated</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- PRODUCT GRID (exact same structure, old price + sale badge on image) -->
    <div class="container">
      <div id="product-grid-container" class="product-grid">
        <!-- products will be injected via JS -->
      </div>
    </div>
  </main>

  <!-- Footer placeholder -->
  <div id="footer"></div>
  
  <!-- Common modals container -->
  <div id="common-modals"></div>

  <script>
    // ===== EXACT HELPER FUNCTIONS FROM ACCESSORIES (with small adjustments) =====
    function formatPrice(price) {
      return price?.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,') || '0.00';
    }

    // Simple rating render (copied from accessories behavior)
    function renderRating(rating) {
      if (!rating || rating === 0) return '<span>★ 0.0</span>';
      const full = Math.floor(rating);
      let stars = '';
      for (let i = 0; i < 5; i++) {
        stars += i < full ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
      }
      return stars + `<span> ${rating.toFixed(1)}</span>`;
    }

    // Check if product is new (within 24h) — same logic
    function isNewProduct(product) {
      if (!product.createdAt) return false;
      const now = new Date();
      const creationDate = product.createdAt?.toDate ? product.createdAt.toDate() : new Date(product.createdAt);
      const hoursDiff = (now - creationDate) / (1000 * 60 * 60);
      return hoursDiff < 24;
    }

    // ===== PRODUCT DATA (enriched with oldPrice to show sale badge) =====
    // We build a small set of essentials products, each with oldPrice > price to trigger sale badge.
    // Also include secondary images for hover, and NEW badge for some.
    window.products = [
      {
        id: 'ess1',
        title: 'minimal card holder',
        category: 'essentials',
        price: 1899,
        oldPrice: 2499,          // triggers sale badge
        rating: 4.7,
        images: [
          'https://images.unsplash.com/photo-1601924994987-69e26d50dc26?w=300&auto=format&fit=crop',
          'https://images.unsplash.com/photo-1622560480605-d6c3c4d7c0f5?w=300&auto=format&fit=crop'
        ],
        primaryImg: 'https://images.unsplash.com/photo-1601924994987-69e26d50dc26?w=300&auto=format&fit=crop',
        secondaryImg: 'https://images.unsplash.com/photo-1622560480605-d6c3c4d7c0f5?w=300&auto=format&fit=crop',
        stock: 8,
        createdAt: new Date(Date.now() - 10 * 60 * 60 * 1000) // 10h old → NEW
      },
      {
        id: 'ess2',
        title: 'vegan leather notebook',
        category: 'essentials',
        price: 1299,
        oldPrice: 1799,           // sale
        rating: 4.2,
        images: [
          'https://images.unsplash.com/photo-1531346680769-a15dbb1726ad?w=300&auto=format&fit=crop',
          'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=300&auto=format&fit=crop'
        ],
        primaryImg: 'https://images.unsplash.com/photo-1531346680769-a15dbb1726ad?w=300&auto=format&fit=crop',
        secondaryImg: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=300&auto=format&fit=crop',
        stock: 3,
        // no createdAt → not new
      },
      {
        id: 'ess3',
        title: 'stainless steel bottle',
        category: 'essentials',
        price: 2199,
        oldPrice: 2799,            // sale
        rating: 4.9,
        images: [
          'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=300&auto=format&fit=crop',
          'https://images.unsplash.com/photo-1625772452859-1b03dabf6c33?w=300&auto=format&fit=crop'
        ],
        primaryImg: 'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=300&auto=format&fit=crop',
        secondaryImg: 'https://images.unsplash.com/photo-1625772452859-1b03dabf6c33?w=300&auto=format&fit=crop',
        stock: 12,
        createdAt: new Date(Date.now() - 5 * 60 * 60 * 1000) // 5h → NEW
      },
      {
        id: 'ess4',
        title: 'premium cable organiser',
        category: 'essentials',
        price: 999,
        oldPrice: 1499,            // sale
        rating: 4.0,
        images: [
          'https://images.unsplash.com/photo-1625723044792-44de16ccb0e9?w=300&auto=format&fit=crop',
          'https://images.unsplash.com/photo-1615529179035-e760f6a0b6b4?w=300&auto=format&fit=crop'
        ],
        primaryImg: 'https://images.unsplash.com/photo-1625723044792-44de16ccb0e9?w=300&auto=format&fit=crop',
        secondaryImg: 'https://images.unsplash.com/photo-1615529179035-e760f6a0b6b4?w=300&auto=format&fit=crop',
        stock: 20,
        // no new
      },
      {
        id: 'ess5',
        title: 'slim wallet rfid',
        category: 'essentials',
        price: 1699,
        oldPrice: 1699,           // no sale (equal) → no badge
        rating: 4.3,
        images: [
          'https://images.unsplash.com/photo-1627222927040-169e4d2d6a7f?w=300&auto=format&fit=crop',
          'https://images.unsplash.com/photo-1625917512083-abcdccaacb4d?w=300&auto=format&fit=crop'
        ],
        primaryImg: 'https://images.unsplash.com/photo-1627222927040-169e4d2d6a7f?w=300&auto=format&fit=crop',
        secondaryImg: 'https://images.unsplash.com/photo-1625917512083-abcdccaacb4d?w=300&auto=format&fit=crop',
        stock: 5,
        createdAt: new Date(Date.now() - 30 * 60 * 60 * 1000) // 30h old → not new
      },
      {
        id: 'ess6',
        title: 'tech pouch',
        category: 'essentials',
        price: 2499,
        oldPrice: 3299,           // sale
        rating: 4.8,
        images: [
          'https://images.unsplash.com/photo-1621805245186-7f2a86b6a93b?w=300&auto=format&fit=crop',
          'https://images.unsplash.com/photo-1621805245186-7f2a86b6a93b?w=300&auto=format&fit=crop' // fallback same
        ],
        primaryImg: 'https://images.unsplash.com/photo-1621805245186-7f2a86b6a93b?w=300&auto=format&fit=crop',
        secondaryImg: 'https://images.unsplash.com/photo-1621805245186-7f2a86b6a93b?w=300&auto=format&fit=crop',
        stock: 7,
        createdAt: new Date(Date.now() - 2 * 60 * 60 * 1000) // 2h → NEW
      }
    ];

    // Ensure each product has primaryImg/secondaryImg as fallback
    window.products.forEach(p => {
      if (!p.primaryImg && p.images?.length) p.primaryImg = p.images[0];
      if (!p.secondaryImg && p.images?.length > 1) p.secondaryImg = p.images[1];
      if (!p.secondaryImg) p.secondaryImg = p.primaryImg;
    });

    // ===== RENDER FUNCTION (exact from accessories, but filtered to 'essentials') =====
    function renderProducts() {
      const gridContainer = document.getElementById('product-grid-container');
      const sortSelect = document.getElementById('sort-select');
      
      if (!gridContainer) return;

      // Filter essentials products (category === 'essentials')
      const essentialsProducts = (window.products || []).filter(p => 
        p.category === 'essentials' || p.showOnEssentials === true
      );

      if (essentialsProducts.length === 0) {
        gridContainer.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-box-open"></i>
            <h3>no essentials found</h3>
            <p>Check back later for new arrivals!</p>
          </div>
        `;
        return;
      }

      function getSortedProducts() {
        let sorted = [...essentialsProducts];
        switch (sortSelect.value) {
          case 'price-low':
            sorted.sort((a, b) => (a.price || 0) - (b.price || 0));
            break;
          case 'price-high':
            sorted.sort((a, b) => (b.price || 0) - (a.price || 0));
            break;
          case 'rating':
            sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            break;
          default: break;
        }
        return sorted;
      }

      function renderAllProducts() {
        const sortedProducts = getSortedProducts();
        
        let gridHtml = '';
        sortedProducts.forEach(product => {
          const mainImage = product.images?.[0] || product.primaryImg || 'https://via.placeholder.com/300';
          const secondImage = product.images?.[1] || product.secondaryImg || mainImage;
          
          const hasSale = product.oldPrice && product.oldPrice > product.price;
          const isNew = isNewProduct(product);
          
          gridHtml += `
            <div class="product-card" data-product-id="${product.id}">
              <a href="product.html?id=${product.id}" style="text-decoration:none; color:inherit; display:block;">
                <div class="image-frame">
                  ${isNew ? `
                    <span class="new-badge">
                      <i class="fa-regular fa-star"></i> NEW
                    </span>
                  ` : ''}
                  ${hasSale ? `
                    <span class="sale-badge-image">SALE</span>
                  ` : ''}
                  <div class="primary-img" style="background-image: url('${mainImage}');"></div>
                  <div class="secondary-img" style="background-image: url('${secondImage}');"></div>
                </div>
                <p class="product-category">${product.category || 'essential'}</p>
                <h3 class="product-title">${product.title}</h3>
                <div class="product-rating">${renderRating(product.rating)}</div>
                <div class="product-price-block">
                  ${hasSale ? `<span class="old-price">₹${formatPrice(product.oldPrice)}</span>` : ''}
                  <span class="current-price"><span class="inr-symbol">₹</span>${formatPrice(product.price)}</span>
                </div>
              </a>
              <button class="card-add-btn" onclick="handleAdd('${product.id}', this); event.stopPropagation();">
                <i class="fa-solid fa-cart-plus"></i> add
              </button>
            </div>
          `;
        });
        
        gridContainer.innerHTML = gridHtml;
      }

      renderAllProducts();
      
      if (sortSelect) {
        sortSelect.removeEventListener('change', renderAllProducts);
        sortSelect.addEventListener('change', renderAllProducts);
      }
    }

    // Dummy add handler (mimics accessories behavior, with added effect)
    window.handleAdd = function(productId, btn) {
      btn.classList.add('added');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> added';
      setTimeout(() => {
        btn.classList.remove('added');
        btn.innerHTML = '<i class="fa-solid fa-cart-plus"></i> add';
        // optional open cart simulation
        if (typeof window.openCart === 'function') window.openCart();
        else console.log('Added to cart (demo)');
      }, 800);
    };

    // Load components placeholder (accessories uses loadComponents, but we just set active nav)
    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();

      // Set active nav manually for demo
      setTimeout(() => {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        // not critical for demo
      }, 100);

      // Scroll button logic
      window.addEventListener('scroll', () => {
        const btn = document.getElementById('scrollTop');
        if (btn) btn.classList.toggle('visible', window.scrollY > 200);
      });
    });

    // Extra: simulate that common functions exist (to avoid errors)
    window.loadComponents = () => {};
    window.openCart = () => { alert('Cart modal would open (demo)'); };
  </script>
</body>
</html>
