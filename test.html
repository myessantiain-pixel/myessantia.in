<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Montserrat', sans-serif; background: #fcfaf7; color: #1e1e1e; overflow-x: hidden; line-height: 1.5; padding: 20px; position: relative; }
    .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 10000; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
    .login-overlay.hidden { display: none; }
    .login-card { background: #ffffff; border-radius: 40px; border: 3px solid #000; box-shadow: 12px 12px 0 rgba(0,0,0,0.3); width: 90%; max-width: 420px; overflow: hidden; animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .login-header { background: #000; padding: 32px 24px; text-align: center; border-bottom: 4px solid #d4af37; }
    .login-header h2 { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 800; color: #fff; text-transform: uppercase; }
    .login-header h2 strong { color: #d4af37; }
    .login-icon { width: 80px; height: 80px; background: #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; border: 3px solid #000; }
    .login-icon i { font-size: 2.5rem; color: #000; }
    .login-form { padding: 32px 24px; }
    .input-group { margin-bottom: 24px; }
    .input-group label { display: block; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; font-size: 0.85rem; color: #000; }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper i.input-icon { position: absolute; left: 16px; color: #d4af37; font-size: 1.2rem; }
    .input-wrapper input { width: 100%; padding: 16px 18px; padding-left: 48px; border: 2px solid #000; border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 1rem; background: #fcfaf7; transition: all 0.2s; }
    .input-wrapper input:focus { outline: none; border-color: #d4af37; box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.2); }
    .password-toggle { position: absolute; right: 16px; color: #d4af37; cursor: pointer; font-size: 1.2rem; z-index: 2; }
    .remember-forgot { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .forgot-link { color: #d4af37; font-weight: 700; font-size: 0.85rem; text-decoration: none; text-transform: uppercase; cursor: pointer; }
    .login-btn { width: 100%; padding: 18px; background: #000; color: #d4af37; border: 3px solid #d4af37; border-radius: 60px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s; }
    .login-btn:hover:not(:disabled) { background: #d4af37; color: #000; border-color: #000; transform: translateY(-2px); box-shadow: 4px 4px 0 rgba(0,0,0,0.2); }
    .login-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #d4af37; border-top: 3px solid #000; border-radius: 50%; animation: spin 1s linear infinite; }
    .error-message { background: #ff4444; color: #fff; padding: 12px 16px; border-radius: 20px; border: 2px solid #000; font-weight: 600; font-size: 0.85rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .admin-container.blurred { filter: blur(8px); pointer-events: none; user-select: none; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: #ffffff; padding: 24px; border-radius: 30px; border: 2px solid #000; box-shadow: 6px 6px 0 rgba(0,0,0,0.2); display: flex; align-items: center; gap: 16px; }
    .stat-icon { width: 60px; height: 60px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #d4af37; border: 3px solid #d4af37; }
    .stat-info h3 { font-size: 2rem; font-weight: 800; color: #000; }
    .sliding-menu { position: fixed; top: 0; left: -320px; width: 300px; height: 100vh; background: #ffffff; border-right: 3px solid #000; box-shadow: 10px 0 0 rgba(0,0,0,0.2); z-index: 1000; transition: left 0.3s ease; display: flex; flex-direction: column; overflow-y: auto; }
    .sliding-menu.open { left: 0; }
    .menu-header { background: #000; padding: 30px 24px; border-bottom: 4px solid #d4af37; }
    .menu-header h2 { color: #fff; font-family: 'Montserrat', sans-serif; font-size: 2rem; font-weight: 800; display: flex; align-items: center; gap: 12px; }
    .menu-header h2 i { color: #d4af37; }
    .menu-items { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .menu-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border: 2px solid #000; border-radius: 30px; cursor: pointer; transition: all 0.2s; background: #fcfaf7; }
    .menu-item:hover { transform: translateX(5px); border-color: #d4af37; }
    .menu-item.active { background: #000; border-color: #d4af37; }
    .menu-item.active .menu-item-icon, .menu-item.active .menu-item-title { color: #d4af37; }
    .menu-item-icon { width: 40px; height: 40px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #d4af37; font-size: 1.2rem; border: 2px solid #d4af37; }
    .menu-item.active .menu-item-icon { background: #d4af37; color: #000; }
    .menu-item-title { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; color: #000; }
    .menu-item-badge { background: #d4af37; color: #000; padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; font-weight: 700; border: 2px solid #000; }
    .menu-footer { padding: 20px; border-top: 2px solid #000; background: #fcfaf7; }
    .menu-footer .live-indicator { display: flex; align-items: center; gap: 8px; padding: 12px; background: #000; border-radius: 30px; color: #d4af37; font-weight: 700; }
    .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
    .menu-overlay.show { display: block; }
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; gap: 20px; }
    .loading-overlay.show { display: flex; }
    .loading-spinner { width: 60px; height: 60px; border: 6px solid #fcfaf7; border-top: 6px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .menu-icon { width: 48px; height: 48px; border-radius: 50%; background: #000; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #d4af37; border: 3px solid #d4af37; cursor: pointer; }
    .header { background: #ffffff; padding: 20px 24px; border-radius: 40px; border: 2px solid #000; box-shadow: 8px 8px 0 rgba(0,0,0,0.2); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .brand h1 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 800; text-transform: uppercase; color: #000; }
    .brand h1 strong { color: #d4af37; }
    .admin-badge { background: #000; color: #d4af37; padding: 8px 24px; border-radius: 60px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; border: 2px solid #d4af37; }
    .product-form { background: #ffffff; border-radius: 40px; border: 2px solid #000; box-shadow: 8px 8px 0 rgba(0,0,0,0.2); margin-bottom: 24px; }
    .form-header { background: #000; padding: 24px 32px; border-bottom: 4px solid #d4af37; }
    .form-header .form-title { font-family: 'Montserrat', sans-serif; font-size: 2rem; font-weight: 800; display: flex; align-items: center; gap: 16px; color: #fff; }
    .form-body { padding: 32px; }
    .form-section { background: #fcfaf7; border-radius: 30px; padding: 24px; margin-bottom: 24px; border: 2px solid #000; }
    .form-section-title { display: flex; align-items: center; gap: 12px; font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; color: #000; padding-bottom: 12px; border-bottom: 3px solid #d4af37; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; color: #000; text-transform: uppercase; }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper input, .input-wrapper select, .input-wrapper textarea { width: 100%; padding: 14px 18px; padding-left: 48px; border: 2px solid #000; border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 1rem; background: #fff; }
    .media-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .media-item { aspect-ratio: 1; border-radius: 16px; border: 3px solid #000; overflow: hidden; position: relative; cursor: pointer; background: #fcfaf7; }
    .media-item.selected { border-color: #d4af37; border-width: 4px; }
    .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
    .media-add-item { aspect-ratio: 1; border-radius: 16px; border: 3px dashed #d4af37; background: #fcfaf7; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #d4af37; }
    .btn { border-radius: 60px; padding: 0.85rem 2.2rem; font-weight: 600; font-size: 1rem; text-transform: uppercase; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; border: 2px solid transparent; cursor: pointer; }
    .btn-primary { background: #000; color: #fff; border-color: #000; }
    .btn-outline { background: transparent; border-color: #000; color: #000; }
    .products-table { background: #ffffff; border-radius: 40px; padding: 24px; border: 2px solid #000; box-shadow: 8px 8px 0 rgba(0,0,0,0.2); }
    .table-header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .product-thumb { width: 60px; height: 60px; border-radius: 16px; background-size: cover; background-position: center; border: 2px solid #000; cursor: pointer; }
    .action-btns { display: flex; gap: 8px; }
    .action-btn { width: 38px; height: 38px; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fff; cursor: pointer; transition: all 0.2s; }
    .action-btn:hover { background: #000; color: #d4af37; }
    .notification { position: fixed; top: 20px; right: 20px; padding: 16px 32px; border-radius: 60px; background: #000; color: #d4af37; font-weight: 700; z-index: 9999; border: 2px solid #d4af37; animation: slideInRight 0.3s ease; }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    /* Drag & drop styles */
    .description-block { cursor: grab; transition: all 0.2s; }
    .description-block:active { cursor: grabbing; }
    .sortable-drag { opacity: 0.4; }
    .sortable-ghost { opacity: 0.4; background: #e0e0e0; border: 2px dashed #d4af37; }
    @media (max-width: 768px) { .media-grid { grid-template-columns: repeat(3, 1fr); } .form-body { padding: 16px; } }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-header"><div class="login-icon"><i class="fa-solid fa-crown"></i></div><h2><strong>MyEssantia</strong></h2><p>admin · master access</p></div>
    <div class="login-form"><div id="loginError" class="error-message" style="display:none;"><span id="errorText"></span></div>
      <form id="loginForm" onsubmit="return handleLogin(event)"><div class="input-group"><label><i class="fa-solid fa-envelope"></i> email</label><div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="email" placeholder="admin@myessantia.com" required></div></div>
      <div class="input-group"><label><i class="fa-solid fa-lock"></i> password</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="password" placeholder="••••••••" required><i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i></div></div>
      <div class="remember-forgot"><label class="remember-me"><input type="checkbox" id="rememberMe" checked><span>remember me</span></label><a class="forgot-link" onclick="handleForgotPassword()">forgot password?</a></div>
      <button type="submit" class="login-btn" id="loginButton"><span id="loginText">access dashboard</span><span id="loginSpinner" style="display:none;" class="login-spinner"></span></button></form>
      <div class="login-footer"><p><i class="fa-regular fa-circle-check"></i> secure · encrypted access</p></div>
    </div>
  </div>
</div>

<div class="sliding-menu" id="slidingMenu"><div class="menu-header"><h2><i class="fa-solid fa-bars"></i> menu</h2><p>navigate</p></div><div class="menu-items"><div class="menu-item active" onclick="loadPage('dashboard')" id="menuDashboard"><div class="menu-item-icon"><i class="fa-solid fa-house"></i></div><div class="menu-item-content"><div class="menu-item-title">dashboard</div></div><div class="menu-item-badge"><i class="fa-solid fa-chevron-right"></i></div></div><div class="menu-item" onclick="loadPage('notify')" id="menuNotify"><div class="menu-item-icon"><i class="fa-solid fa-bell"></i></div><div class="menu-item-content"><div class="menu-item-title">notify</div></div><div class="menu-item-badge" id="notifyBadge">0</div></div><div class="menu-item" onclick="loadPage('reviews')" id="menuReviews"><div class="menu-item-icon"><i class="fa-solid fa-star"></i></div><div class="menu-item-content"><div class="menu-item-title">reviews</div></div><div class="menu-item-badge" id="reviewsBadge">0</div></div></div><div class="menu-footer"><div class="live-indicator"><span class="live-dot"></span><span>live · realtime</span></div></div></div>
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><div class="loading-text">loading...</div></div>

<div class="admin-container" id="admin-content">
  <div class="header"><div style="display:flex; align-items:center; gap:16px;"><div class="menu-icon" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div><div class="brand"><h1><strong>MyEssantia</strong> · admin</h1><span id="pageTitle">dashboard</span></div></div><div style="display:flex; align-items:center; gap:20px;"><div class="admin-badge" id="adminEmail"><i class="fa-solid fa-crown"></i> master admin</div><div class="admin-info"><div class="admin-avatar"><i class="fa-regular fa-user"></i></div><div class="admin-details"><div class="name" id="adminName">admin</div></div></div></div></div>
  <div id="page-container" class="page-container"></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyD16uGnm1vodkbqGoFSdFdJjGFSLpJmflk", authDomain: "myessantia.firebaseapp.com", projectId: "myessantia", storageBucket: "myessantia.firebasestorage.app", messagingSenderId: "701726517205", appId: "1:701726517205:web:f6ab79efdffeab6dbbbf5c" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let products = [], productMedia = [], selectedMediaIndex = 0;
let sortableInstance = null;

auth.onAuthStateChanged((user) => {
  if (user) { hideLoginOverlay(); updateAdminInfo(user); checkAdminStatus(user).then(isAdmin => { if (!isAdmin) auth.signOut(); else loadPage('dashboard'); }); }
  else { showLoginOverlay(); document.getElementById('admin-content').classList.add('blurred'); }
});

async function checkAdminStatus(user) { return ['admin@myessantia.com', 'master@myessantia.com'].includes(user.email); }
function showLoginOverlay() { document.getElementById('loginOverlay').classList.remove('hidden'); document.getElementById('admin-content').classList.add('blurred'); }
function hideLoginOverlay() { document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('admin-content').classList.remove('blurred'); }
function showLoginError(msg) { let e=document.getElementById('loginError'); document.getElementById('errorText').innerText=msg; e.style.display='flex'; setTimeout(()=>e.style.display='none',5000); }
function togglePasswordVisibility() { let p=document.getElementById('password'), i=document.getElementById('togglePassword'); if(p.type==='password'){ p.type='text'; i.classList.remove('fa-eye'); i.classList.add('fa-eye-slash'); } else { p.type='password'; i.classList.remove('fa-eye-slash'); i.classList.add('fa-eye'); } }
async function handleLogin(e) { e.preventDefault(); let email=document.getElementById('email').value.trim(), pass=document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(email,pass); } catch(err) { showLoginError('Invalid credentials'); } return false; }
function updateAdminInfo(user) { document.getElementById('adminEmail').innerHTML=`<i class="fa-solid fa-crown"></i> ${user.email}`; document.getElementById('adminName').innerText=user.email.split('@')[0]; }
async function handleForgotPassword() { let email=document.getElementById('email').value.trim(); if(!email) return showLoginError('Enter email'); try { await auth.sendPasswordResetEmail(email); showNotification('Reset email sent','success'); } catch(e){ showLoginError('Failed'); } }
function logout() { auth.signOut(); showNotification('Logged out'); }
function toggleMenu() { document.getElementById('slidingMenu').classList.toggle('open'); document.getElementById('menuOverlay').classList.toggle('show'); }

async function loadPage(page) { if(!auth.currentUser) return; document.getElementById('loadingOverlay').classList.add('show'); try { if(page==='dashboard') await loadDashboardPage(); else if(page==='notify') await loadNotifyPage(); else if(page==='reviews') await loadReviewsPage(); } catch(e){ console.error(e); } document.getElementById('loadingOverlay').classList.remove('show'); toggleMenu(); }

async function loadDashboardPage() {
  const response = await fetch('dashhome.html');
  const html = await response.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const container = document.getElementById('page-container');
  container.innerHTML = '';
  container.appendChild(doc.querySelector('.stats-grid').cloneNode(true));
  container.appendChild(doc.querySelector('.product-form').cloneNode(true));
  container.appendChild(doc.querySelector('.products-table').cloneNode(true));
  initializeDashboard();
}

function initializeDashboard() {
  productMedia = []; selectedMediaIndex = 0;
  renderMediaGrid();
  document.getElementById('product-price')?.addEventListener('input', updatePricePreviews);
  document.getElementById('product-form').addEventListener('submit', handleProductSubmit);
  document.getElementById('cancel-edit')?.addEventListener('click', resetForm);
  document.getElementById('search-products')?.addEventListener('input', filterProducts);
  document.getElementById('product-high-demand')?.addEventListener('change', updateHighDemandChip);
  loadProducts();
  initDragAndDrop(); // Initialize drag & drop for description blocks
}

function initDragAndDrop() {
  const container = document.getElementById('description-blocks-container');
  if(container && !sortableInstance) {
    sortableInstance = new Sortable(container, {
      animation: 200,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onEnd: function() { updatePreview(); }
    });
  }
}

function renderMediaGrid() {
  const grid = document.getElementById('media-grid');
  if(!grid) return;
  let html='';
  for(let i=0;i<Math.min(productMedia.length,8);i++){ const m=productMedia[i]; html+=`<div class="media-item ${i===selectedMediaIndex?'selected':''}" onclick="selectMedia(${i})">${m.type==='video'?`<video src="${m.url}"></video>`:`<img src="${m.url}" onerror="this.src='https://via.placeholder.com/300?text=error'">`}<span class="media-remove-btn" style="position:absolute; top:4px; right:4px; background:#d4af37; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="event.stopPropagation(); removeMedia(${i})"><i class="fa-solid fa-times"></i></span></div>`; }
  for(let i=productMedia.length;i<8;i++) html+=`<div class="media-add-item" onclick="document.getElementById('media-url-input').focus()"><i class="fa-solid fa-plus"></i><span>add media</span></div>`;
  grid.innerHTML=html;
}
window.selectMedia = function(i){ selectedMediaIndex=i; renderMediaGrid(); };
window.addMediaFromUrl = function(){ let url=document.getElementById('media-url-input')?.value.trim(); if(!url) return showNotification('Enter URL','error'); productMedia.push({url,type:url.match(/\.(mp4|webm)/i)?'video':'image'}); if(productMedia.length===1) selectedMediaIndex=0; document.getElementById('media-url-input').value=''; renderMediaGrid(); showNotification('Media added'); };
window.handleFileUpload = function(files){ if(!files) return; for(let f of files){ let url=URL.createObjectURL(f); productMedia.push({url,type:f.type.startsWith('video/')?'video':'image'}); } if(productMedia.length===1) selectedMediaIndex=0; renderMediaGrid(); showNotification(`${files.length} file(s) added`); };
window.removeMedia = function(i){ productMedia.splice(i,1); if(selectedMediaIndex>=productMedia.length) selectedMediaIndex=Math.max(0,productMedia.length-1); renderMediaGrid(); };
function updateHighDemandChip(){ document.getElementById('high-demand-chip')?.classList.toggle('active', document.getElementById('product-high-demand')?.checked); }
window.toggleHighDemand = function(){ let cb=document.getElementById('product-high-demand'); if(cb){ cb.checked=!cb.checked; updateHighDemandChip(); } };
function updatePricePreviews(){ let price=parseFloat(document.getElementById('product-price')?.value)||0; document.getElementById('prepaid-preview').innerText=`₹${Math.round(price*0.85)}`; document.getElementById('cod-preview').innerText=`₹${Math.round(price+100)}`; }
function calculatePrepaidPrice(p){ return Math.round(p*0.85); }
function calculateCodPrice(p){ return Math.round(p+100); }
function calculateOriginalPrice(s,o){ return o && o>s ? o : Math.round(s*1.25); }

async function loadProducts(){ const snap=await db.collection('products').orderBy('createdAt','desc').get(); products=snap.docs.map(d=>({id:d.id,...d.data()})); renderProducts(); updateStats(); }
function renderProducts(){ const list=document.getElementById('products-list'); if(!list) return; if(products.length===0){ document.getElementById('empty-products').style.display='block'; list.innerHTML=''; return; } document.getElementById('empty-products').style.display='none'; let html='<div class="desktop-table"><table width="100%"><thead><tr><th>Media</th><th>Title</th><th>Category</th><th>Prices</th><th>Stock</th><th>Rating</th><th>Flags</th><th>Actions</th></tr></thead><tbody>'; products.forEach(p=>{ let mainImg=p.primaryImg||(p.media?.[0]?.url)||'https://via.placeholder.com/80'; html+=`<tr><td><div class="product-thumb" style="background-image:url('${mainImg}')" onclick="window.open('product.html?id=${p.id}','_blank')"></div></td><td><strong>${p.title}</strong></td><td>${p.category}</td><td>₹${p.price}<br><small>P:₹${p.prepaidPrice||calculatePrepaidPrice(p.price)} C:₹${p.codPrice||calculateCodPrice(p.price)}</small></td><td>${p.stock||0}</td><td>${p.rating?.toFixed(1)}★ (${p.reviewCount||0})</td><td>${p.highDemand?'🔥 High Demand':''}</td><td><div class="action-btns"><button class="action-btn" onclick="editProduct('${p.id}')"><i class="fa-solid fa-edit"></i></button><button class="action-btn" onclick="deleteProduct('${p.id}')"><i class="fa-solid fa-trash"></i></button></div></td></tr>`; }); html+='</tbody></table></div><div class="products-list"></div>'; list.innerHTML=html; }
function updateStats(){ document.getElementById('total-products').innerText=products.length; document.getElementById('newin-products').innerText=products.filter(p=>p.createdAt&&(new Date()- (p.createdAt.toDate?.()||new Date(p.createdAt)))<86400000).length; document.getElementById('high-demand-products').innerText=products.filter(p=>p.highDemand).length; document.getElementById('total-stock').innerText=products.reduce((s,p)=>s+(p.stock||0),0); document.getElementById('product-count').innerText=`${products.length} products`; }
function filterProducts(){ let term=document.getElementById('search-products')?.value.toLowerCase(); if(!term) return renderProducts(); let filtered=products.filter(p=>p.title.toLowerCase().includes(term)||p.category.toLowerCase().includes(term)); renderProducts(filtered); }
window.deleteProduct=function(id){ if(confirm('Delete?')) db.collection('products').doc(id).delete().then(()=>loadProducts()); };
window.editProduct=function(id){ let p=products.find(x=>x.id===id); if(!p) return; document.getElementById('product-id').value=p.id; document.getElementById('product-title').value=p.title; document.getElementById('product-category').value=p.category; document.getElementById('product-price').value=p.price; document.getElementById('product-original-price').value=p.originalPrice||''; document.getElementById('product-rating').value=p.rating||4.5; document.getElementById('product-review-count').value=p.reviewCount||0; document.getElementById('product-stock').value=p.stock||10; document.getElementById('product-brand').value=p.brand||'MyEssantia'; document.getElementById('product-short-desc').value=p.shortDesc||''; document.getElementById('show-on-home').checked=p.showOnHome||false; document.getElementById('show-on-accessories').checked=p.showOnAccessories||false; document.getElementById('show-on-essentials').checked=p.showOnEssentials||false; document.getElementById('product-high-demand').checked=p.highDemand||false; productMedia=p.media?[...p.media]:[]; selectedMediaIndex=0; renderMediaGrid(); updateHighDemandChip(); updatePricePreviews(); if(p.descriptionBlocks) loadDescriptionBlocks(p.descriptionBlocks); document.getElementById('form-title').innerHTML='<i class="fa-solid fa-edit"></i> edit product'; };
function resetForm(){ document.getElementById('product-form').reset(); document.getElementById('product-id').value=''; productMedia=[]; selectedMediaIndex=0; renderMediaGrid(); document.getElementById('description-blocks-container').innerHTML=''; addTextBlock(); document.getElementById('show-on-home').checked=false; document.getElementById('show-on-accessories').checked=false; document.getElementById('show-on-essentials').checked=false; document.getElementById('product-high-demand').checked=false; updateHighDemandChip(); updatePricePreviews(); document.getElementById('form-title').innerHTML='<i class="fa-solid fa-plus-circle"></i> add new product'; }
async function handleProductSubmit(e){ e.preventDefault(); let id=document.getElementById('product-id').value; let data={ title:document.getElementById('product-title').value, category:document.getElementById('product-category').value, price:parseFloat(document.getElementById('product-price').value), originalPrice:parseFloat(document.getElementById('product-original-price').value)||0, rating:parseFloat(document.getElementById('product-rating').value), reviewCount:parseInt(document.getElementById('product-review-count').value), stock:parseInt(document.getElementById('product-stock').value), brand:document.getElementById('product-brand').value, shortDesc:document.getElementById('product-short-desc').value, media:productMedia.map(m=>({url:m.url,type:m.type})), primaryImg:productMedia[selectedMediaIndex]?.url||'', showOnHome:document.getElementById('show-on-home').checked, showOnAccessories:document.getElementById('show-on-accessories').checked, showOnEssentials:document.getElementById('show-on-essentials').checked, highDemand:document.getElementById('product-high-demand').checked, descriptionBlocks:getDescriptionBlocks() }; data.prepaidPrice=calculatePrepaidPrice(data.price); data.codPrice=calculateCodPrice(data.price); data.originalPrice=calculateOriginalPrice(data.price,data.originalPrice); if(id) await db.collection('products').doc(id).update({...data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}); else await db.collection('products').add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}); showNotification('Product saved'); resetForm(); loadProducts(); }
function getDescriptionBlocks(){ let blocks=[]; document.querySelectorAll('#description-blocks-container .description-block').forEach(block=>{ if(block.classList.contains('text-block')){ let content=block.querySelector('.block-content')?.value; if(content) blocks.push({type:'text',content}); } else if(block.classList.contains('heading-block')){ let content=block.querySelector('.block-content')?.value, level=block.querySelector('.heading-level')?.value; if(content) blocks.push({type:'heading',content,level}); } else if(block.classList.contains('image-block')){ let url=block.querySelector('.block-content')?.value; if(url) blocks.push({type:'image',url}); } else if(block.classList.contains('video-block')){ let url=block.querySelector('.block-content')?.value, alignment=block.querySelector('.video-alignment')?.value; if(url) blocks.push({type:'video',url,alignment}); } else if(block.classList.contains('bullet-block')){ let items=[]; block.querySelectorAll('.bullet-text').forEach(inp=>{ if(inp.value) items.push(inp.value); }); if(items.length) blocks.push({type:'bullets',items}); } }); return blocks; }
function loadDescriptionBlocks(blocks){ let container=document.getElementById('description-blocks-container'); if(!container) return; container.innerHTML=''; blocks.forEach(b=>{ if(b.type==='text') addTextBlock(b.content); else if(b.type==='heading') addHeadingBlock(b.content,b.level); else if(b.type==='image') addImageBlock(b.url); else if(b.type==='video') addVideoBlock(b.url,b.alignment); else if(b.type==='bullets') addBulletBlock(b.items); }); updatePreview(); initDragAndDrop(); }
function updatePreview(){ let preview=document.getElementById('description-preview'); if(!preview) return; let html=''; document.querySelectorAll('#description-blocks-container .description-block').forEach(block=>{ if(block.classList.contains('text-block')){ let t=block.querySelector('.block-content')?.value; if(t) html+=`<p style="margin-bottom:1rem;">${t}</p>`; } else if(block.classList.contains('heading-block')){ let t=block.querySelector('.block-content')?.value, lvl=block.querySelector('.heading-level')?.value||'h2'; if(t) html+=`<${lvl} style="margin:1rem 0 0.5rem;">${t}</${lvl}>`; } else if(block.classList.contains('image-block')){ let u=block.querySelector('.block-content')?.value; if(u) html+=`<p><img src="${u}" style="max-width:100%; border-radius:12px; border:2px solid #000;"></p>`; } else if(block.classList.contains('video-block')){ let u=block.querySelector('.block-content')?.value; if(u) html+=`<p><video controls style="max-width:100%; border-radius:12px;"><source src="${u}"></video></p>`; } else if(block.classList.contains('bullet-block')){ let items=[]; block.querySelectorAll('.bullet-text').forEach(inp=>{ if(inp.value) items.push(inp.value); }); if(items.length){ html+=`<ul style="margin:1rem 0;">${items.map(i=>`<li><i class="fa-solid fa-check" style="color:#d4af37;"></i> ${i}</li>`).join('')}</ul>`; } } }); preview.innerHTML=html||'<p style="color:#999;">No content</p>'; }
window.addTextBlock = function(content=''){ let container=document.getElementById('description-blocks-container'); let div=document.createElement('div'); div.className='description-block text-block'; div.style.background='#f9f9f9'; div.style.borderRadius='16px'; div.style.padding='16px'; div.style.marginBottom='16px'; div.style.border='2px solid #000'; div.style.position='relative'; div.innerHTML=`<div style="position:absolute; top:10px; right:10px; display:flex; gap:5px;"><span class="drag-handle" style="cursor:grab; padding:5px;"><i class="fa-solid fa-grip-vertical"></i></span><button type="button" class="move-up-btn" style="width:30px;height:30px;border-radius:50%;border:2px solid #000;background:#fff;" onclick="moveBlockUp(this)"><i class="fa-solid fa-arrow-up"></i></button><button type="button" class="move-down-btn" style="width:30px;height:30px;border-radius:50%;border:2px solid #000;background:#fff;" onclick="moveBlockDown(this)"><i class="fa-solid fa-arrow-down"></i></button><button type="button" style="width:30px;height:30px;border-radius:50%;border:2px solid #000;background:#ff4444;color:white;" onclick="removeBlock(this)"><i class="fa-solid fa-times"></i></button></div><div style="margin-bottom:10px;font-weight:700;color:#d4af37;">Text Block</div><textarea class="block-content" placeholder="Enter text..." style="width:100%;padding:12px;border:2px solid #000;border-radius:12px;min-height:80px;" oninput="updatePreview()">${content.replace(/"/g, '&quot;')}</textarea>`; container.appendChild(div); updatePreview(); initDragAndDrop(); };
window.addHeadingBlock = function(content='',level='h2'){ let container=document.getElementById('description-blocks-container'); let div=document.createElement('div'); div.className='description-block heading-block'; div.style.cssText='background:#f9f9f9;border-radius:16px;padding:16px;margin-bottom:16px;border:2px solid #000;position:relative;'; div.innerHTML=`<div style="position:absolute; top:10px; right:10px; display:flex; gap:5px;"><span class="drag-handle" style="cursor:grab;"><i class="fa-solid fa-grip-vertical"></i></span><button type="button" class="move-up-btn" onclick="moveBlockUp(this)"><i class="fa-solid fa-arrow-up"></i></button><button type="button" class="move-down-btn" onclick="moveBlockDown(this)"><i class="fa-solid fa-arrow-down"></i></button><button type="button" onclick="removeBlock(this)"><i class="fa-solid fa-times"></i></button></div><div style="margin-bottom:10px;font-weight:700;color:#d4af37;">Heading</div><select class="heading-level" onchange="updatePreview()"><option value="h2" ${level==='h2'?'selected':''}>H2</option><option value="h3" ${level==='h3'?'selected':''}>H3</option><option value="h4" ${level==='h4'?'selected':''}>H4</option></select><input type="text" class="block-content" value="${content.replace(/"/g, '&quot;')}" style="width:100%;margin-top:8px;padding:12px;border:2px solid #000;border-radius:12px;" oninput="updatePreview()">`; container.appendChild(div); updatePreview(); initDragAndDrop(); };
window.addImageBlock = function(url=''){ let container=document.getElementById('description-blocks-container'); let div=document.createElement('div'); div.className='description-block image-block'; div.style.cssText='background:#f9f9f9;border-radius:16px;padding:16px;margin-bottom:16px;border:2px solid #000;position:relative;'; div.innerHTML=`<div style="position:absolute; top:10px; right:10px; display:flex; gap:5px;"><span class="drag-handle" style="cursor:grab;"><i class="fa-solid fa-grip-vertical"></i></span><button type="button" class="move-up-btn" onclick="moveBlockUp(this)"><i class="fa-solid fa-arrow-up"></i></button><button type="button" class="move-down-btn" onclick="moveBlockDown(this)"><i class="fa-solid fa-arrow-down"></i></button><button type="button" onclick="removeBlock(this)"><i class="fa-solid fa-times"></i></button></div><div style="margin-bottom:10px;font-weight:700;color:#d4af37;">Image URL</div><input type="text" class="block-content" value="${url.replace(/"/g, '&quot;')}" placeholder="https://..." style="width:100%;padding:12px;border:2px solid #000;border-radius:12px;" oninput="updatePreview()">`; container.appendChild(div); updatePreview(); initDragAndDrop(); };
window.addVideoBlock = function(url='',alignment='center'){ let container=document.getElementById('description-blocks-container'); let div=document.createElement('div'); div.className='description-block video-block'; div.style.cssText='background:#f9f9f9;border-radius:16px;padding:16px;margin-bottom:16px;border:2px solid #000;position:relative;'; div.innerHTML=`<div style="position:absolute; top:10px; right:10px; display:flex; gap:5px;"><span class="drag-handle" style="cursor:grab;"><i class="fa-solid fa-grip-vertical"></i></span><button type="button" class="move-up-btn" onclick="moveBlockUp(this)"><i class="fa-solid fa-arrow-up"></i></button><button type="button" class="move-down-btn" onclick="moveBlockDown(this)"><i class="fa-solid fa-arrow-down"></i></button><button type="button" onclick="removeBlock(this)"><i class="fa-solid fa-times"></i></button></div><div style="margin-bottom:10px;font-weight:700;color:#d4af37;">Video URL</div><input type="text" class="block-content" value="${url.replace(/"/g, '&quot;')}" placeholder="MP4 URL" style="width:100%;padding:12px;border:2px solid #000;border-radius:12px;" oninput="updatePreview()"><select class="video-alignment" style="margin-top:8px;" onchange="updatePreview()"><option value="left" ${alignment==='left'?'selected':''}>Left</option><option value="center" ${alignment==='center'?'selected':''}>Center</option><option value="right" ${alignment==='right'?'selected':''}>Right</option></select>`; container.appendChild(div); updatePreview(); initDragAndDrop(); };
window.addBulletBlock = function(items=[]){ let container=document.getElementById('description-blocks-container'); let div=document.createElement('div'); div.className='description-block bullet-block'; div.style.cssText='background:#f9f9f9;border-radius:16px;padding:16px;margin-bottom:16px;border:2px solid #000;position:relative;'; div.innerHTML=`<div style="position:absolute; top:10px; right:10px; display:flex; gap:5px;"><span class="drag-handle" style="cursor:grab;"><i class="fa-solid fa-grip-vertical"></i></span><button type="button" class="move-up-btn" onclick="moveBlockUp(this)"><i class="fa-solid fa-arrow-up"></i></button><button type="button" class="move-down-btn" onclick="moveBlockDown(this)"><i class="fa-solid fa-arrow-down"></i></button><button type="button" onclick="removeBlock(this)"><i class="fa-solid fa-times"></i></button></div><div style="margin-bottom:10px;font-weight:700;color:#d4af37;">Bullet Points</div><div class="bullet-items-container"></div><button type="button" class="btn btn-outline" style="margin-top:10px;padding:6px 12px;" onclick="addBulletItem(this)">+ Add Bullet</button>`; let itemsDiv=div.querySelector('.bullet-items-container'); if(items.length) items.forEach(t=>{ let it=document.createElement('div'); it.className='bullet-item'; it.style.display='flex'; it.style.gap='8px'; it.style.marginBottom='8px'; it.innerHTML=`<input type="text" class="bullet-text" value="${t.replace(/"/g, '&quot;')}" style="flex:1;padding:8px;border:2px solid #000;border-radius:12px;" oninput="updatePreview()"><button type="button" onclick="removeBulletItem(this)" style="width:30px;border-radius:50%;border:2px solid #000;background:#ff4444;color:white;">✕</button>`; itemsDiv.appendChild(it); }); else { let it=document.createElement('div'); it.className='bullet-item'; it.style.display='flex'; it.style.gap='8px'; it.style.marginBottom='8px'; it.innerHTML=`<input type="text" class="bullet-text" placeholder="Enter point" style="flex:1;padding:8px;border:2px solid #000;border-radius:12px;" oninput="updatePreview()"><button type="button" onclick="removeBulletItem(this)" style="width:30px;border-radius:50%;border:2px solid #000;background:#ff4444;color:white;">✕</button>`; itemsDiv.appendChild(it); } container.appendChild(div); updatePreview(); initDragAndDrop(); };
window.addBulletItem = function(btn){ let container=btn.closest('.bullet-block')?.querySelector('.bullet-items-container'); if(container){ let it=document.createElement('div'); it.className='bullet-item'; it.style.display='flex'; it.style.gap='8px'; it.style.marginBottom='8px'; it.innerHTML=`<input type="text" class="bullet-text" placeholder="New point" style="flex:1;padding:8px;border:2px solid #000;border-radius:12px;" oninput="updatePreview()"><button type="button" onclick="removeBulletItem(this)" style="width:30px;border-radius:50%;border:2px solid #000;background:#ff4444;color:white;">✕</button>`; container.appendChild(it); updatePreview(); } };
window.removeBulletItem = function(btn){ btn.closest('.bullet-item')?.remove(); updatePreview(); };
window.moveBlockUp = function(btn){ let block=btn.closest('.description-block'); if(block&&block.previousElementSibling&&block.previousElementSibling.classList.contains('description-block')) block.parentNode.insertBefore(block,block.previousElementSibling); updatePreview(); };
window.moveBlockDown = function(btn){ let block=btn.closest('.description-block'); if(block&&block.nextElementSibling&&block.nextElementSibling.classList.contains('description-block')) block.parentNode.insertBefore(block.nextElementSibling,block); updatePreview(); };
window.removeBlock = function(btn){ if(confirm('Remove block?')) btn.closest('.description-block')?.remove(); updatePreview(); };
function showNotification(msg,type='success'){ let n=document.createElement('div'); n.className=`notification ${type}`; n.innerText=msg; document.body.appendChild(n); setTimeout(()=>n.remove(),3000); }

async function loadNotifyPage() { const page=document.getElementById('page-container'); page.innerHTML='<div style="padding:40px;text-align:center;">Notifications module loaded (simplified)</div>'; }
async function loadReviewsPage() { document.getElementById('page-container').innerHTML='<div style="padding:40px;text-align:center;">Reviews module loaded (simplified)</div>'; }

db.collection('notifications').onSnapshot(snap=>{ document.getElementById('notifyBadge').innerText=snap.docs.filter(d=>!d.data().status||d.data().status==='pending').length; });
db.collection('reviews').onSnapshot(snap=>{ document.getElementById('reviewsBadge').innerText=snap.size; });

window.addEventListener('DOMContentLoaded',()=>{ setTimeout(()=>{ let btn=document.createElement('button'); btn.innerHTML='<i class="fa-solid fa-sign-out-alt"></i> logout'; btn.className='quick-action-btn'; btn.style.marginLeft='10px'; btn.onclick=logout; document.querySelector('.header>div:last-child')?.appendChild(btn); },1000); });
</script>
