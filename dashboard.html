<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>MyEssantia · admin · dashboard</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Montserrat:wght@300..900&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* ===== GLOBAL & RESETS ===== */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    html { 
      scroll-behavior: smooth; 
    }
    
    body { 
      font-family: 'Inter', 'Montserrat', sans-serif; 
      background: #fcfaf7; 
      color: #1e1e1e; 
      overflow-x: hidden;
      line-height: 1.5;
      padding: 20px;
      position: relative;
    }

    /* ===== NOTIFY.CSS - Complete Styles for Notification Page ===== */

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #ffffff;
      padding: 24px;
      border-radius: 30px;
      border: 2px solid #000;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #d4af37;
      border: 3px solid #d4af37;
    }

    .stat-info h3 {
      font-size: 2rem;
      font-weight: 800;
      color: #000;
    }

    .stat-info p {
      color: #666;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Filters Bar */
    .filters-bar {
      background: #ffffff;
      padding: 20px 24px;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fcfaf7;
      padding: 8px 20px;
      border-radius: 60px;
      border: 2px solid #000;
      flex: 1;
      max-width: 400px;
    }

    .search-box i {
      color: #d4af37;
      font-size: 1.2rem;
    }

    .search-box input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 10px 24px;
      border: 2px solid #000;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      color: #000;
    }

    .filter-tab:hover {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .filter-tab.active {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .export-btn {
      padding: 10px 28px;
      background: #000;
      color: #d4af37;
      border: 2px solid #d4af37;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .export-btn:hover {
      background: #d4af37;
      color: #000;
      border-color: #000;
    }

    /* Email Template Panel */
    .email-template-panel {
      background: #ffffff;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      padding: 24px;
      margin-bottom: 24px;
      display: none;
    }

    .email-template-panel.show {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 3px solid #d4af37;
    }

    .panel-header h3 {
      font-size: 1.4rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
    }

    .panel-header h3 i {
      color: #d4af37;
      font-size: 1.6rem;
    }

    .close-panel {
      width: 36px;
      height: 36px;
      border: 2px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .close-panel:hover {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .template-form {
      max-width: 800px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .form-group label i {
      color: #d4af37;
      margin-right: 8px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #000;
      border-radius: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background: #fcfaf7;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }

    .form-group textarea {
      min-height: 150px;
      resize: vertical;
    }

    .template-preview {
      background: #fcfaf7;
      border: 2px solid #d4af37;
      border-radius: 20px;
      padding: 20px;
      margin-top: 16px;
    }

    .template-preview h4 {
      font-size: 1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #000;
    }

    .preview-subject {
      font-weight: 800;
      color: #000;
      margin-bottom: 8px;
      padding: 8px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #000;
    }

    .preview-body {
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 12px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #000;
    }

    .variable-hint {
      background: #000;
      color: #d4af37;
      padding: 8px 16px;
      border-radius: 60px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    /* Table */
    .table-container {
      background: #ffffff;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .table-header {
      background: #000;
      padding: 20px 24px;
      border-bottom: 4px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .table-header h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      text-transform: uppercase;
    }

    .table-header h2 i {
      color: #d4af37;
      background: #fff;
      padding: 10px;
      border-radius: 50%;
      border: 2px solid #d4af37;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .template-btn {
      padding: 10px 24px;
      background: #d4af37;
      color: #000;
      border: 2px solid #fff;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .template-btn:hover {
      background: #fff;
      color: #000;
      border-color: #d4af37;
    }

    .table-wrapper {
      overflow-x: auto;
      padding: 0 24px 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th {
      text-align: left;
      padding: 20px 16px;
      font-weight: 800;
      font-size: 0.85rem;
      color: #000;
      text-transform: uppercase;
      border-bottom: 3px solid #d4af37;
      background: #fcfaf7;
    }

    td {
      padding: 16px;
      border-bottom: 2px solid #e0e0e0;
      vertical-align: middle;
    }

    tr:hover td {
      background: #fcfaf7;
    }

    /* Product Thumbnail */
    .product-thumb {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      border: 2px solid #000;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .product-title {
      font-weight: 800;
      color: #000;
      font-size: 0.9rem;
    }

    .product-id {
      font-size: 0.65rem;
      color: #666;
      font-family: monospace;
    }

    /* User Email */
    .user-email {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #000;
    }

    .user-email i {
      color: #d4af37;
      font-size: 1rem;
      width: 20px;
    }

    /* Status Badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      border: 2px solid #000;
    }

    .status-badge.pending {
      background: #ffbb33;
      color: #000;
      border-color: #000;
    }

    .status-badge.notified {
      background: #4CAF50;
      color: #fff;
      border-color: #000;
    }

    .status-badge.expired {
      background: #666;
      color: #fff;
      border-color: #000;
    }

    /* Action Buttons */
    .action-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      width: 38px;
      height: 38px;
      border: 2px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #000;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .action-btn:hover:not(:disabled) {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
      transform: scale(1.1);
    }

    .action-btn.email-btn {
      background: #d4af37;
      color: #000;
    }

    .action-btn.email-btn:hover:not(:disabled) {
      background: #000;
      color: #d4af37;
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ============================= */
/* MOBILE / DESKTOP SWITCH LOGIC */
/* ============================= */

/* Desktop default */
.mobile-cards{
  display:none;
}

.table-wrapper{
  display:block;
}

/* Mobile layout */
@media (max-width:900px){

  .table-wrapper{
    display:none;
  }

  .mobile-cards{
    display:block;
  }

  .notification-card{
    background:#fff;
    border:2px solid #000;
    border-radius:24px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:4px 4px 0 rgba(0,0,0,0.1);
  }

  .card-header{
    display:flex;
    gap:12px;
    margin-bottom:12px;
    padding-bottom:12px;
    border-bottom:2px solid #d4af37;
  }

  .card-thumb{
    width:60px;
    height:60px;
    border-radius:12px;
    background-size:cover;
    background-position:center;
    border:2px solid #000;
  }

  .card-title{
    flex:1;
  }

  .card-title h4{
    font-weight:800;
    font-size:1rem;
    margin-bottom:4px;
  }

  .card-title .product-id{
    font-size:0.65rem;
    color:#666;
  }

  .card-body{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:12px;
  }

  .card-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
  }

  .card-row i{
    color:#d4af37;
    width:20px;
  }

  .card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top:8px;
    border-top:2px solid #d4af37;
  }

  .card-actions{
    display:flex;
    gap:8px;
  }

  .card-actions .action-btn{
    width:40px;
    height:40px;
  }

}

    /* Timestamp */
    .timestamp {
      font-size: 0.75rem;
      color: #666;
      display: flex;
      flex-direction: column;
    }

    .timestamp .date {
      font-weight: 600;
      color: #000;
    }

    .timestamp .time {
      font-size: 0.65rem;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state i {
      font-size: 4rem;
      color: #d4af37;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

      .notification-card {
        background: #fff;
        border: 2px solid #000;
        border-radius: 24px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
      }
      
      .card-header {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 2px solid #d4af37;
      }
      
      .card-thumb {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        background-size: cover;
        background-position: center;
        border: 2px solid #000;
      }
      
      .card-title {
        flex: 1;
      }
      
      .card-title h4 {
        font-weight: 800;
        font-size: 1rem;
        margin-bottom: 4px;
      }
      
      .card-title .product-id {
        font-size: 0.65rem;
        color: #666;
      }
      
      .card-body {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }
      
      .card-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
      }
      
      .card-row i {
        color: #d4af37;
        width: 20px;
      }
      
      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 8px;
        border-top: 2px solid #d4af37;
      }
      
      .card-actions {
        display: flex;
        gap: 8px;
      }
      
      .card-actions .action-btn {
        width: 40px;
        height: 40px;
      }
    }

    /* Loading Spinner */
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f0f0f0;
      border-top: 4px solid #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 24px;
    }

    .page-btn {
      width: 40px;
      height: 40px;
      border: 2px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      background: #fff;
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .page-btn.active {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-numbers {
      display: flex;
      gap: 4px;
    }

    /* Notification Toast */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 32px;
      border-radius: 60px;
      background: #000;
      color: #d4af37;
      font-weight: 700;
      z-index: 9999;
      animation: slideInRight 0.3s ease;
      border: 2px solid #d4af37;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header Styles */
    .header {
      background: #ffffff;
      padding: 24px 32px;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #000;
    }

    .brand h1 strong { 
      color: #d4af37; 
      font-weight: 900;
    }

    .brand span {
      font-size: 0.9rem;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .badge {
      background: #000;
      color: #d4af37;
      padding: 8px 24px;
      border-radius: 60px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid #d4af37;
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    
    .admin-container { 
      width: 100%; 
      max-width: 1600px; 
      margin: 0 auto; 
      display: flex;
      flex-direction: column;
      gap: 24px;
      transition: transform 0.3s ease;
    }
    
    .admin-container.menu-open {
      transform: translateX(300px);
    }
    
    @media (min-width: 640px) { 
      body { padding: 24px 32px; }
    }
    
    /* ===== SLIDING MENU ===== */
    .sliding-menu {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100vh;
      background: #ffffff;
      border-right: 3px solid #000;
      box-shadow: 10px 0 0 rgba(0,0,0,0.2);
      z-index: 1000;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sliding-menu.open {
      left: 0;
    }

    .menu-header {
      background: #000;
      padding: 30px 24px;
      border-bottom: 4px solid #d4af37;
    }

    .menu-header h2 {
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-header h2 i {
      color: #d4af37;
    }

    .menu-header p {
      color: #d4af37;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .menu-items {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: 2px solid #000;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fcfaf7;
    }

    .menu-item:hover {
      transform: translateX(5px);
      border-color: #d4af37;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }

    .menu-item.active {
      background: #000;
      border-color: #d4af37;
    }

    .menu-item.active .menu-item-icon,
    .menu-item.active .menu-item-title,
    .menu-item.active .menu-item-desc {
      color: #d4af37;
    }

    .menu-item-icon {
      width: 40px;
      height: 40px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d4af37;
      font-size: 1.2rem;
      border: 2px solid #d4af37;
    }

    .menu-item.active .menu-item-icon {
      background: #d4af37;
      color: #000;
      border-color: #000;
    }

    .menu-item-content {
      flex: 1;
    }

    .menu-item-title {

    /* ===== TOGGLE SWITCH - RESPONSIVE ===== */
    .high-demand-toggle {
      display: flex;
      align-items: center;
      padding: 8px 0;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 70px;
      height: 36px;
      margin-right: 16px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 36px;
      border: 2px solid #000;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 28px;
      width: 28px;
      left: 3px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
      border: 2px solid #000;
    }

    input:checked + .toggle-slider {
      background-color: #d4af37;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(34px);
      background-color: #000;
    }

    .toggle-label {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }

      font-size: 1.2rem;
    }

      }
      .toggle-slider:before {

        width: 18px;
        left: 2px;
        bottom: 2px;

        transform: translateX(24px);

      .toggle-label {

const firebaseConfig = {

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productMedia = [];

const menuDashboard = document.getElementById('menuDashboard');
const menuNotify = document.getElementById('menuNotify');
const notifyBadge = document.getElementById('notifyBadge');
const loadingOverlay = document.getElementById('loadingOverlay');
const pageContainer = document.getElementById('page-container');
const pageTitle = document.getElementById('pageTitle');

// ========== MENU FUNCTIONS ==========
function toggleMenu() {
  slidingMenu.classList.toggle('open');
  menuOverlay.classList.toggle('show');
  adminContent.classList.toggle('menu-open');
}

// Close menu when clicking outside
document.addEventListener('click', function(event) {
  if (!event.target.closest('.sliding-menu') && !event.target.closest('.menu-icon')) {
    slidingMenu.classList.remove('open');
    menuOverlay.classList.remove('show');
    adminContent.classList.remove('menu-open');
  }
});

// ========== PAGE LOADING FUNCTIONS ==========
async function loadPage(page) {
  // Update active menu item
  if (page === 'dashboard') {
    menuDashboard.classList.add('active');
    menuNotify.classList.remove('active');
    pageTitle.textContent = 'dashboard';
  } else {
    menuNotify.classList.add('active');
    menuDashboard.classList.remove('active');
    pageTitle.textContent = 'notifications';
  }

  // Show loading overlay
  loadingOverlay.classList.add('show');
  
  // Close menu
  toggleMenu();
  
  try {
    if (page === 'dashboard') {
      await loadDashboardPage();
    } else {
      await loadNotifyPage();
    }
  } catch (error) {
    console.error('Error loading page:', error);
    showNotification('Failed to load page', 'error');
  } finally {
    // Hide loading overlay
    loadingOverlay.classList.remove('show');
  }
}

async function loadDashboardPage() {
  // Fetch dashboard HTML
  const response = await fetch('dashhome.html');
  const html = await response.text();
  
  // Parse the HTML
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  
  // Create a container for dashboard content
  const dashboardContent = document.createElement('div');
  
  // Add stats grid
  const statsGrid = doc.querySelector('.stats-grid');
  if (statsGrid) dashboardContent.appendChild(statsGrid.cloneNode(true));
  
  // Add product form
  const productForm = doc.querySelector('.product-form');
  if (productForm) dashboardContent.appendChild(productForm.cloneNode(true));
  
  // Add products table
  const productsTable = doc.querySelector('.products-table');
  if (productsTable) dashboardContent.appendChild(productsTable.cloneNode(true));
  
  // Clear and append
  pageContainer.innerHTML = '';
  pageContainer.appendChild(dashboardContent);
  
  // Reinitialize dashboard functionality
  initializeDashboard();
}

  // Add email template panel

  // Send email function using mailto
  window.sendNotifyEmail = function(requestId) {
    const request = window.allNotifyRequests.find(r => r.id === requestId);
    if (!request) return;
    
    const product = window.notifyProducts[request.productId] || { title: 'Unknown Product', price: 0 };
    
    const subject = document.getElementById('email-subject')?.value || emailTemplate.subject;
    const body = document.getElementById('email-body')?.value || emailTemplate.body;
    const cc = document.getElementById('email-cc')?.value || '';
    const bcc = document.getElementById('email-bcc')?.value || '';
    
    const processedSubject = subject
      .replace('{{product}}', product.title)
      .replace('{{price}}', product.price)
      .replace('{{productLink}}', `${window.location.origin}/product.html?id=${request.productId}`)
      .replace('{{email}}', request.email);
    
    const processedBody = body
      .replace('{{product}}', product.title)
      .replace('{{price}}', product.price)
      .replace('{{productLink}}', `${window.location.origin}/product.html?id=${request.productId}`)
      .replace('{{email}}', request.email);
    
    let mailtoLink = `mailto:${request.email}`;
    const params = [];
    
    if (cc) params.push(`cc=${encodeURIComponent(cc)}`);
    if (bcc) params.push(`bcc=${encodeURIComponent(bcc)}`);
    params.push(`subject=${encodeURIComponent(processedSubject)}`);
    params.push(`body=${encodeURIComponent(processedBody)}`);
    
    if (params.length > 0) {
      mailtoLink += '?' + params.join('&');
    }
    
    window.location.href = mailtoLink;
    
    setTimeout(() => {
      if (confirm('Email client opened. Mark this request as notified?')) {
        markNotifyAsNotified(requestId);
      }
    }, 1000);
  };

  // Send bulk emails to all pending
  window.sendBulkEmails = function() {
    const pendingRequests = window.filteredNotifyRequests.filter(r => r.status !== 'notified');
    
    if (pendingRequests.length === 0) {
      showNotification('No pending requests to email', 'error');
      return;
    }
    
    if (pendingRequests.length === 1) {
      sendNotifyEmail(pendingRequests[0].id);
      return;
    }
    
    const choice = confirm(
      `You have ${pendingRequests.length} pending requests.\n\n` +
      `Choose OK to open separate emails for each (will open ${pendingRequests.length} tabs/windows)\n` +
      `Choose Cancel to copy all emails to clipboard for manual sending`
    );
    
    if (choice) {
      pendingRequests.forEach((req, index) => {
        setTimeout(() => {
          sendNotifyEmail(req.id);
        }, index * 1500);
      });
      showNotification(`Opening ${pendingRequests.length} email windows...`);
    } else {
      const emails = pendingRequests.map(r => r.email).join(', ');
      navigator.clipboard.writeText(emails);
      showNotification('Emails copied to clipboard');
    }
  };

  // Export to CSV
  window.exportRequests = function() {
    const data = window.filteredNotifyRequests.map(req => {
      const product = window.notifyProducts[req.productId] || { title: 'Unknown Product', price: 0 };
      const date = req.timestamp ? new Date(req.timestamp) : new Date();
      
      return {
        'Email': req.email,
        'Product ID': req.productId,
        'Product Title': product.title,
        'Product Price': product.price,
        'Action Type': req.actionType || 'buy',
        'Status': req.status || 'pending',
        'Requested Date': date.toLocaleDateString('en-IN'),
        'Requested Time': date.toLocaleTimeString('en-IN'),
        'Notification ID': req.id
      };
    });

    const csv = convertToCSV(data);
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `notification_requests_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    
    showNotification('Exported to CSV');
  };

  function convertToCSV(data) {
    if (data.length === 0) return '';
    
    const headers = Object.keys(data[0]);
    const csvRows = [];
    
    csvRows.push(headers.join(','));
    
    for (const row of data) {
      const values = headers.map(header => {
        const value = row[header]?.toString() || '';
        return `"${value.replace(/"/g, '""')}"`;
      });
      csvRows.push(values.join(','));
    }
    
    return csvRows.join('\n');
  }

  window.changePage = function(direction) {
    const totalPages = Math.ceil(window.filteredNotifyRequests.length / window.notifyItemsPerPage);
    
    if (direction === 'prev' && window.currentNotifyPage > 1) {
      window.currentNotifyPage--;
    } else if (direction === 'next' && window.currentNotifyPage < totalPages) {
      window.currentNotifyPage++;
    }
    
    renderNotifyRequests();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.goToNotifyPage = function(page) {
    window.currentNotifyPage = page;
    renderNotifyRequests();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  function updateNotifyPagination() {
    const totalPages = Math.ceil(window.filteredNotifyRequests.length / window.notifyItemsPerPage);
    const pagination = document.getElementById('pagination');
    const prevBtn = document.getElementById('prev-page');
    const nextBtn = document.getElementById('next-page');
    const pageNumbers = document.getElementById('page-numbers');
    
    if (totalPages <= 1) {
      if (pagination) pagination.style.display = 'none';
      return;
    }

    if (pagination) pagination.style.display = 'flex';
    if (prevBtn) prevBtn.disabled = window.currentNotifyPage === 1;
    if (nextBtn) nextBtn.disabled = window.currentNotifyPage === totalPages;

    let pageNumbersHTML = '';
    const startPage = Math.max(1, window.currentNotifyPage - 2);
    const endPage = Math.min(totalPages, window.currentNotifyPage + 2);

    for (let i = startPage; i <= endPage; i++) {
      pageNumbersHTML += `
        <button class="page-btn ${i === window.currentNotifyPage ? 'active' : ''}" onclick="goToNotifyPage(${i})">
          ${i}
        </button>
      `;
    }

    if (pageNumbers) pageNumbers.innerHTML = pageNumbersHTML;
  }

  // Initialize
  loadTemplate();
  loadNotifyRequests();
}

// ========== DASHBOARD FIREBASE FUNCTIONS ==========
async function loadProducts() {
  try {
    const snapshot = await db.collection('products').orderBy('createdAt', 'desc').get();
    products = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));
    renderProducts();
    updateStats();
    startNewInMonitor();
  } catch (error) {
    console.error('Error loading products:', error);
    showNotification('failed to load products', 'error');
  }
}

// Set up real-time listener for notifications badge
db.collection('notifications')
  .onSnapshot((snapshot) => {
    const pendingCount = snapshot.docs.filter(doc => {
      const data = doc.data();
      return data.status === 'pending' || !data.status;
    }).length;
    notifyBadge.textContent = pendingCount;
  });

// ========== DASHBOARD HELPER FUNCTIONS ==========
function renderMediaGrid() {
  const mediaGrid = document.getElementById('media-grid');
  if (!mediaGrid) return;
  
  let html = '';
  
  for (let i = 0; i < Math.min(productMedia.length, 8); i++) {
    const media = productMedia[i];
    const isVideo = media.type === 'video';
    const isSelected = (i === selectedMediaIndex);
    
    html += `
      <div class="media-item ${isSelected ? 'selected' : ''}" onclick="selectMedia(${i})">
        ${isVideo ? 
          `<video src="${media.url}"></video>` : 
          `<img src="${media.url}" alt="media">`
        }
        <span class="media-type-badge">${isVideo ? 'VID' : 'IMG'}</span>
        <span class="media-remove-btn" onclick="removeMedia(${i}); event.stopPropagation();">
          <i class="fa-solid fa-times"></i>
        </span>
      </div>
    `;
  }
  
  for (let i = productMedia.length; i < 8; i++) {
    html += `
      <div class="media-add-item" onclick="document.getElementById('media-url-input').focus()">
        <i class="fa-solid fa-plus"></i>
        <span>add media</span>
      </div>
    `;
  }
  
  mediaGrid.innerHTML = html;
}

window.selectMedia = function(index) {
  selectedMediaIndex = index;
  renderMediaGrid();
};

window.addMediaFromUrl = function() {
  const urlInput = document.getElementById('media-url-input');
  if (!urlInput) return;
  
  const url = urlInput.value.trim();
  
  if (!url) {
    showNotification('please enter a url', 'error');
    return;
  }

  try {
    new URL(url);
  } catch {
    showNotification('please enter a valid url', 'error');
    return;
  }

  const isVideo = url.match(/\.(mp4|webm|ogg|mov|avi|wmv|flv|mkv)$/i) || 
                 url.includes('youtube.com') || 
                 url.includes('youtu.be') || 
                 url.includes('vimeo.com') ||
                 url.includes('player.vimeo');
  
  const mediaItem = {
    url: url,
    type: isVideo ? 'video' : 'image'
  };

  if (productMedia.length >= 8) {
    showNotification('maximum 8 media files allowed', 'error');
    return;
  }

  productMedia.push(mediaItem);
  
  if (productMedia.length === 1) {
    selectedMediaIndex = 0;
  }
  
  urlInput.value = '';
  renderMediaGrid();
  showNotification('media added successfully!', 'success');
};

window.handleFileUpload = function(files) {
  if (!files) return;
  
  if (productMedia.length + files.length > 8) {
    showNotification('maximum 8 media files allowed', 'error');
    return;
  }

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const url = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video/');
    
    const mediaItem = {
      url: url,
      type: isVideo ? 'video' : 'image',
      file: file
    };

    productMedia.push(mediaItem);
  }

  if (productMedia.length > 0 && selectedMediaIndex === 0 && productMedia.length === files.length) {
    selectedMediaIndex = 0;
  }

  renderMediaGrid();
  showNotification(`${files.length} file(s) added successfully!`, 'success');
};

window.removeMedia = function(index) {
  productMedia.splice(index, 1);
  
  if (selectedMediaIndex >= productMedia.length) {
    selectedMediaIndex = Math.max(0, productMedia.length - 1);
  }
  
  renderMediaGrid();
};

function updateHighDemandChip() {
  const highDemandChip = document.getElementById('high-demand-chip');
  const productHighDemand = document.getElementById('product-high-demand');
  
  if (!highDemandChip || !productHighDemand) return;
  
  if (productHighDemand.checked) {
    highDemandChip.classList.add('active');
  } else {
    highDemandChip.classList.remove('active');
  }
}

window.toggleHighDemand = function() {
  const productHighDemand = document.getElementById('product-high-demand');
  if (productHighDemand) {
    productHighDemand.checked = !productHighDemand.checked;
    updateHighDemandChip();
  }
};

async function handleProductSubmit(e) {
  e.preventDefault();

  const productTitle = document.getElementById('product-title');
  const productCategory = document.getElementById('product-category');
  const productPrice = document.getElementById('product-price');
  const productRating = document.getElementById('product-rating');
  const productStock = document.getElementById('product-stock');
  const productBrand = document.getElementById('product-brand');
  const productShortDesc = document.getElementById('product-short-desc');
  const productDescription = document.getElementById('product-description');
  const productSpecs = document.getElementById('product-specs');
  const productId = document.getElementById('product-id');
  const showOnHome = document.getElementById('show-on-home');
  const showOnAccessories = document.getElementById('show-on-accessories');
  const showOnEssentials = document.getElementById('show-on-essentials');
  const productHighDemand = document.getElementById('product-high-demand');

  const price = parseFloat(productPrice.value);
  const rating = parseFloat(productRating.value);
  
  const showOnHomeChecked = showOnHome ? showOnHome.checked : false;
  const showOnAccessoriesChecked = showOnAccessories ? showOnAccessories.checked : false;
  const showOnEssentialsChecked = showOnEssentials ? showOnEssentials.checked : false;
  const highDemandChecked = productHighDemand ? productHighDemand.checked : false;

  const productData = {
    title: productTitle.value,
    category: productCategory.value,
    price: price,
    rating: rating,
    stock: parseInt(productStock.value) || 10,
    brand: productBrand.value || 'MyEssantia',
    media: productMedia.map(m => ({ url: m.url, type: m.type })),
    primaryImg: productMedia[selectedMediaIndex]?.url || '',
    shortDesc: productShortDesc.value,
    description: productDescription.value,
    specs: productSpecs.value ? productSpecs.value.split('\n').filter(s => s.trim()) : [],
    showOnHome: showOnHomeChecked,
    showOnAccessories: showOnAccessoriesChecked,
    showOnEssentials: showOnEssentialsChecked,
    showOnNew: true,
    highDemand: highDemandChecked
  };

  if (productId.value) {
    productData.id = productId.value;
  }

  await saveProduct(productData);
}

async function saveProduct(productData) {
  try {
    if (productData.id) {
      const { id, ...data } = productData;
      await db.collection('products').doc(id).update({
        ...data,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showNotification('product updated successfully!', 'success');
    } else {
      await db.collection('products').add({
        ...productData,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showNotification('product added successfully!', 'success');
    }
    loadProducts();
    resetForm();
  } catch (error) {
    console.error('Error saving product:', error);
    showNotification('failed to save product', 'error');
  }
}

async function deleteProductFromFirebase(id) {
  try {
    await db.collection('products').doc(id).delete();
    showNotification('product deleted successfully!', 'success');
    loadProducts();
  } catch (error) {
    console.error('Error deleting product:', error);
    showNotification('failed to delete product', 'error');
  }
}

window.deleteProduct = function(id) {
  if (confirm('are you sure you want to delete this product?')) {
    deleteProductFromFirebase(id);
  }
};

window.editProduct = async function(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;

  document.getElementById('product-id').value = product.id;
  document.getElementById('product-creation-date').value = product.createdAt || '';
  document.getElementById('product-title').value = product.title;
  document.getElementById('product-category').value = product.category;
  document.getElementById('product-price').value = product.price;
  document.getElementById('product-rating').value = product.rating;
  document.getElementById('product-stock').value = product.stock || 10;
  document.getElementById('product-brand').value = product.brand || 'MyEssantia';
  document.getElementById('product-short-desc').value = product.shortDesc || '';
  document.getElementById('product-description').value = product.description || '';
  document.getElementById('product-specs').value = product.specs ? product.specs.join('\n') : '';

  productMedia = product.media ? [...product.media] : [];
  
  if (product.primaryImg && productMedia.length > 0) {
    selectedMediaIndex = productMedia.findIndex(m => m.url === product.primaryImg);
    if (selectedMediaIndex === -1) selectedMediaIndex = 0;
  } else {
    selectedMediaIndex = 0;
  }
  
  renderMediaGrid();

  document.getElementById('show-on-home').checked = product.showOnHome || false;
  document.getElementById('show-on-accessories').checked = product.showOnAccessories || false;
  document.getElementById('show-on-essentials').checked = product.showOnEssentials || false;
  document.getElementById('product-high-demand').checked = product.highDemand || false;
  
  updateHighDemandChip();
  
  document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-edit"></i> edit product';
  
  document.querySelector('.product-form').scrollIntoView({ behavior: 'smooth' });
};

function resetForm() {
  document.getElementById('product-form').reset();
  document.getElementById('product-id').value = '';
  document.getElementById('product-creation-date').value = '';
  productMedia = [];
  selectedMediaIndex = 0;
  renderMediaGrid();
  document.getElementById('show-on-home').checked = false;
  document.getElementById('show-on-accessories').checked = false;
  document.getElementById('show-on-essentials').checked = false;
  document.getElementById('show-on-new').checked = false;
  document.getElementById('product-high-demand').checked = false;
  updateHighDemandChip();
  document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-plus-circle"></i> add new product';
}

function updateStats() {
  const totalProducts = document.getElementById('total-products');
  const newinProducts = document.getElementById('newin-products');
  const highDemandProducts = document.getElementById('high-demand-products');
  const totalStock = document.getElementById('total-stock');
  const productCount = document.getElementById('product-count');

  if (!totalProducts) return;
  
  totalProducts.textContent = products.length;
  const now = new Date();
  const newInCount = products.filter(p => {
    if (!p.createdAt) return false;
    const creationDate = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
    return (now - creationDate) < (24 * 60 * 60 * 1000);
  }).length;
  newinProducts.textContent = newInCount;
  
  const highDemandCount = products.filter(p => p.highDemand).length;
  highDemandProducts.textContent = highDemandCount;
  
  const totalStockValue = products.reduce((sum, p) => sum + (p.stock || 0), 0);
  totalStock.textContent = totalStockValue;
  productCount.textContent = `${products.length} products`;
}

function filterProducts() {
  const searchInput = document.getElementById('search-products');
  if (!searchInput) return;
  
  const term = searchInput.value.toLowerCase();
  const filtered = products.filter(p => 
    p.title.toLowerCase().includes(term) ||
    p.category.toLowerCase().includes(term) ||
    (p.brand && p.brand.toLowerCase().includes(term))
  );
  renderProducts(filtered);
}

      <td>

function updateCategorySync() {
  const category = document.getElementById('product-category');
  if (!category) return;
  
  const catValue = category.value;
  
  if (catValue === 'accessories') {
    document.getElementById('show-on-accessories').checked = true;
    document.getElementById('show-on-essentials').checked = false;
  } else if (catValue === 'essentials') {
    document.getElementById('show-on-essentials').checked = true;
    document.getElementById('show-on-accessories').checked = false;
  }
}

function startNewInMonitor() {
  if (newInCheckInterval) clearInterval(newInCheckInterval);
  updateNewInStatus();
  newInCheckInterval = setInterval(updateNewInStatus, 60000);
}

function updateNewInStatus() {
  const now = new Date();
  let changed = false;

  products.forEach(product => {
    if (product.createdAt) {
      const creationDate = product.createdAt.toDate ? product.createdAt.toDate() : new Date(product.createdAt);
      const hoursDiff = (now - creationDate) / (1000 * 60 * 60);
      
      const shouldBeNew = hoursDiff < 24;
      if (product.showOnNew !== shouldBeNew) {
        product.showOnNew = shouldBeNew;
        changed = true;
        
        db.collection('products').doc(product.id).update({
          showOnNew: shouldBeNew
        }).catch(error => console.error('Error updating new status:', error));
      }
    }
  });

  if (changed) {
    renderProducts();
    updateStats();
  }
}

// ========== UTILITY FUNCTIONS ==========
function showNotification(message, type = 'info') {
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => {
    notification.remove();
  }, 3000);
}

// ========== EXPORT / IMPORT ==========
window.exportProducts = function() {
  const data = JSON.stringify(products, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `myessantia_products_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showNotification('products exported successfully!', 'success');
};

window.importProducts = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (Array.isArray(imported)) {
          for (const product of imported) {
            const { id, ...productData } = product;
            await db.collection('products').add({
              ...productData,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
          showNotification('products imported successfully!', 'success');
          loadProducts();
        }
      } catch {
        showNotification('invalid file format', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
};

// ========== INITIALIZE ==========
document.addEventListener('DOMContentLoaded', () => {
  // Load dashboard by default
  loadPage('dashboard');
});
