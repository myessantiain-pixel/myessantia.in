 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>MyEssantia · admin · dashboard</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Montserrat:wght@300..900&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* ===== GLOBAL & RESETS ===== */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    html { 
      scroll-behavior: smooth; 
    }
    
    body { 
      font-family: 'Inter', 'Montserrat', sans-serif; 
      background: #fcfaf7; 
      color: #1e1e1e; 
      overflow-x: hidden;
      line-height: 1.5;
      padding: 20px;
      position: relative;
    }
    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #ffffff;
      padding: 24px;
      border-radius: 30px;
      border: 2px solid #000;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #d4af37;
      border: 3px solid #d4af37;
    }

    .stat-info h3 {
      font-size: 2rem;
      font-weight: 800;
      color: #000;
    }

    .stat-info p {
      color: #666;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Filters Bar */
    .filters-bar {
      background: #ffffff;
      padding: 20px 24px;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fcfaf7;
      padding: 8px 20px;
      border-radius: 60px;
      border: 2px solid #000;
      flex: 1;
      max-width: 400px;
    }

    .search-box i {
      color: #d4af37;
      font-size: 1.2rem;
    }

    .search-box input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 10px 24px;
      border: 2px solid #000;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      color: #000;
    }

    .filter-tab:hover {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .filter-tab.active {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .export-btn {
      padding: 10px 28px;
      background: #000;
      color: #d4af37;
      border: 2px solid #d4af37;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .export-btn:hover {
      background: #d4af37;
      color: #000;
      border-color: #000;
    }

    /* Email Template Panel */
    .email-template-panel {
      background: #ffffff;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      padding: 24px;
      margin-bottom: 24px;
      display: none;
    }

    .email-template-panel.show {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 3px solid #d4af37;
    }

    .panel-header h3 {
      font-size: 1.4rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
    }

    .panel-header h3 i {
      color: #d4af37;
      font-size: 1.6rem;
    }

    .close-panel {
      width: 36px;
      height: 36px;
      border: 2px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .close-panel:hover {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .template-form {
      max-width: 800px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .form-group label i {
      color: #d4af37;
      margin-right: 8px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #000;
      border-radius: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background: #fcfaf7;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }

    .form-group textarea {
      min-height: 150px;
      resize: vertical;
    }

    .template-preview {
      background: #fcfaf7;
      border: 2px solid #d4af37;
      border-radius: 20px;
      padding: 20px;
      margin-top: 16px;
    }

    .template-preview h4 {
      font-size: 1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #000;
    }

    .preview-subject {
      font-weight: 800;
      color: #000;
      margin-bottom: 8px;
      padding: 8px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #000;
    }

    .preview-body {
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 12px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #000;
    }

    .variable-hint {
      background: #000;
      color: #d4af37;
      padding: 8px 16px;
      border-radius: 60px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    /* Table */
    .table-container {
      background: #ffffff;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .table-header {
      background: #000;
      padding: 20px 24px;
      border-bottom: 4px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .table-header h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      text-transform: uppercase;
    }

    .table-header h2 i {
      color: #d4af37;
      background: #fff;
      padding: 10px;
      border-radius: 50%;
      border: 2px solid #d4af37;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .template-btn {
      padding: 10px 24px;
      background: #d4af37;
      color: #000;
      border: 2px solid #fff;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .template-btn:hover {
      background: #fff;
      color: #000;
      border-color: #d4af37;
    }

    .table-wrapper {
      overflow-x: auto;
      padding: 0 24px 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th {
      text-align: left;
      padding: 20px 16px;
      font-weight: 800;
      font-size: 0.85rem;
      color: #000;
      text-transform: uppercase;
      border-bottom: 3px solid #d4af37;
      background: #fcfaf7;
    }

    td {
      padding: 16px;
      border-bottom: 2px solid #e0e0e0;
      vertical-align: middle;
    }

    tr:hover td {
      background: #fcfaf7;
    }

    /* Product Thumbnail */
    .product-thumb {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      border: 2px solid #000;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .product-title {
      font-weight: 800;
      color: #000;
      font-size: 0.9rem;
    }

    .product-id {
      font-size: 0.65rem;
      color: #666;
      font-family: monospace;
    }

    /* User Email */
    .user-email {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #000;
    }

    .user-email i {
      color: #d4af37;
      font-size: 1rem;
      width: 20px;
    }

    /* Status Badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      border: 2px solid #000;
    }

    .status-badge.pending {
      background: #ffbb33;
      color: #000;
      border-color: #000;
    }

    .status-badge.notified {
      background: #4CAF50;
      color: #fff;
      border-color: #000;
    }

    .status-badge.expired {
      background: #666;
      color: #fff;
      border-color: #000;
    }

    /* Action Buttons */
    .action-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      width: 38px;
      height: 38px;
      border: 2px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #000;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .action-btn:hover:not(:disabled) {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
      transform: scale(1.1);
    }

    .action-btn.email-btn {
      background: #d4af37;
      color: #000;
    }

    .action-btn.email-btn:hover:not(:disabled) {
      background: #000;
      color: #d4af37;
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ============================= */
/* MOBILE / DESKTOP SWITCH LOGIC */
/* ============================= */

/* Desktop default */
.mobile-cards{
  display:none;
}

.table-wrapper{
  display:block;
}

/* Mobile layout */
@media (max-width:900px){

  .table-wrapper{
    display:none;
  }

  .mobile-cards{
    display:block;
  }

  .notification-card{
    background:#fff;
    border:2px solid #000;
    border-radius:24px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:4px 4px 0 rgba(0,0,0,0.1);
  }

  .card-header{
    display:flex;
    gap:12px;
    margin-bottom:12px;
    padding-bottom:12px;
    border-bottom:2px solid #d4af37;
  }

  .card-thumb{
    width:60px;
    height:60px;
    border-radius:12px;
    background-size:cover;
    background-position:center;
    border:2px solid #000;
  }

  .card-title{
    flex:1;
  }

  .card-title h4{
    font-weight:800;
    font-size:1rem;
    margin-bottom:4px;
  }

  .card-title .product-id{
    font-size:0.65rem;
    color:#666;
  }

  .card-body{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:12px;
  }

  .card-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
  }

  .card-row i{
    color:#d4af37;
    width:20px;
  }

  .card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top:8px;
    border-top:2px solid #d4af37;
  }

  .card-actions{
    display:flex;
    gap:8px;
  }

  .card-actions .action-btn{
    width:40px;
    height:40px;
  }

}

    /* Timestamp */
    .timestamp {
      font-size: 0.75rem;
      color: #666;
      display: flex;
      flex-direction: column;
    }

    .timestamp .date {
      font-weight: 600;
      color: #000;
    }

    .timestamp .time {
      font-size: 0.65rem;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state i {
      font-size: 4rem;
      color: #d4af37;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

      .notification-card {
        background: #fff;
        border: 2px solid #000;
        border-radius: 24px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
      }
      
      .card-header {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 2px solid #d4af37;
      }
      
      .card-thumb {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        background-size: cover;
        background-position: center;
        border: 2px solid #000;
      }
      
      .card-title {
        flex: 1;
      }
      
      .card-title h4 {
        font-weight: 800;
        font-size: 1rem;
        margin-bottom: 4px;
      }
      
      .card-title .product-id {
        font-size: 0.65rem;
        color: #666;
      }
      
      .card-body {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }
      
      .card-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
      }
      
      .card-row i {
        color: #d4af37;
        width: 20px;
      }
      
      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 8px;
        border-top: 2px solid #d4af37;
      }
      
      .card-actions {
        display: flex;
        gap: 8px;
      }
      
      .card-actions .action-btn {
        width: 40px;
        height: 40px;
      }
    }

    /* Loading Spinner */
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f0f0f0;
      border-top: 4px solid #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 24px;
    }

    .page-btn {
      width: 40px;
      height: 40px;
      border: 2px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      background: #fff;
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .page-btn.active {
      background: #000;
      color: #d4af37;
      border-color: #d4af37;
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-numbers {
      display: flex;
      gap: 4px;
    }

    /* Notification Toast */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 32px;
      border-radius: 60px;
      background: #000;
      color: #d4af37;
      font-weight: 700;
      z-index: 9999;
      animation: slideInRight 0.3s ease;
      border: 2px solid #d4af37;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header Styles */
    .header {
      background: #ffffff;
      padding: 24px 32px;
      border-radius: 40px;
      border: 2px solid #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #000;
    }

    .brand h1 strong { 
      color: #d4af37; 
      font-weight: 900;
    }

    .brand span {
      font-size: 0.9rem;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .badge {
      background: #000;
      color: #d4af37;
      padding: 8px 24px;
      border-radius: 60px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid #d4af37;
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    
    .admin-container { 
      width: 100%; 
      max-width: 1600px; 
      margin: 0 auto; 
      display: flex;
      flex-direction: column;
      gap: 24px;
      transition: transform 0.3s ease;
    }
    
    .admin-container.menu-open {
      transform: translateX(300px);
    }
    
    @media (min-width: 640px) { 
      body { padding: 24px 32px; }
    }
    
    /* ===== SLIDING MENU ===== */
    .sliding-menu {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100vh;
      background: #ffffff;
      border-right: 3px solid #000;
      box-shadow: 10px 0 0 rgba(0,0,0,0.2);
      z-index: 1000;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sliding-menu.open {
      left: 0;
    }

    .menu-header {
      background: #000;
      padding: 30px 24px;
      border-bottom: 4px solid #d4af37;
    }

    .menu-header h2 {
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-header h2 i {
      color: #d4af37;
    }

    .menu-header p {
      color: #d4af37;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .menu-items {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: 2px solid #000;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fcfaf7;
    }

    .menu-item:hover {
      transform: translateX(5px);
      border-color: #d4af37;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }

    .menu-item.active {
      background: #000;
      border-color: #d4af37;
    }

    .menu-item.active .menu-item-icon,
    .menu-item.active .menu-item-title,
    .menu-item.active .menu-item-desc {
      color: #d4af37;
    }

    .menu-item-icon {
      width: 40px;
      height: 40px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d4af37;
      font-size: 1.2rem;
      border: 2px solid #d4af37;
    }

    .menu-item.active .menu-item-icon {
      background: #d4af37;
      color: #000;
      border-color: #000;
    }

    .menu-item-content {
      flex: 1;
    }

    .menu-item-title {
      font-weight: 800;
      font-size: 1.1rem;

    /* ===== TOGGLE SWITCH - RESPONSIVE ===== */
    .high-demand-toggle {
      display: flex;
      align-items: center;
      padding: 8px 0;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 70px;
      height: 36px;
      margin-right: 16px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 36px;
      border: 2px solid #000;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 28px;
      width: 28px;
      left: 3px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
      border: 2px solid #000;
    }

    input:checked + .toggle-slider {
      background-color: #d4af37;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(34px);
      background-color: #000;
    }

    .toggle-label {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }

    }

      .toggle-slider:before {

        width: 18px;
        left: 2px;
        bottom: 2px;

function toggleMenu() {
  slidingMenu.classList.toggle('open');
  menuOverlay.classList.toggle('show');
  adminContent.classList.toggle('menu-open');
}

// Close menu when clicking outside
document.addEventListener('click', function(event) {
  if (!event.target.closest('.sliding-menu') && !event.target.closest('.menu-icon')) {
    slidingMenu.classList.remove('open');
    menuOverlay.classList.remove('show');
    adminContent.classList.remove('menu-open');
  }
});

// ========== PAGE LOADING FUNCTIONS ==========
async function loadPage(page) {
  // Update active menu item
  menuDashboard.classList.remove('active');
  menuNotify.classList.remove('active');
  menuReviews.classList.remove('active');
  
  if (page === 'dashboard') {
    menuDashboard.classList.add('active');
    pageTitle.textContent = 'dashboard';
  } else if (page === 'notify') {
    menuNotify.classList.add('active');
    pageTitle.textContent = 'notifications';
  } else if (page === 'reviews') {
    menuReviews.classList.add('active');
    pageTitle.textContent = 'reviews';
  }

  // Show loading overlay
  loadingOverlay.classList.add('show');
  
  // Close menu
  toggleMenu();
  
  try {
    if (page === 'dashboard') {
      await loadDashboardPage();
    } else if (page === 'notify') {
      await loadNotifyPage();
    } else if (page === 'reviews') {
      await loadReviewsPage();
    }
  } catch (error) {
    console.error('Error loading page:', error);
    showNotification('Failed to load page: ' + error.message, 'error');
  } finally {
    // Hide loading overlay
    loadingOverlay.classList.remove('show');
  }
}

          (r.city?.toLowerCase() || '').includes(term) || 
          (r.comment?.toLowerCase() || '').includes(term)
        ); 
      }
      window.currentReviewPage = 1;

    };
    searchInput.addEventListener('input', window.handleReviewSearch);
  }
}

function initializeReviewsPage() {
  console.log('Initializing reviews page...');
  
  window.db = db;
  
  window.allReviews = [];
  window.filteredReviews = [];
  window.currentReviewFilter = 'all';
  window.currentReviewPage = 1;
  window.reviewItemsPerPage = 10;
  window.reviewProducts = {};
  window.reviewImageUrl = '';
  
  const preview = document.getElementById('review-image-preview');
  if (preview) preview.style.display = 'none';
  
  loadReviews();
  setupReviewEventListeners();
}

function setupReviewEventListeners() {
  const filterTabs = document.querySelectorAll('.filter-tab');
  filterTabs.forEach(tab => {
    const newTab = tab.cloneNode(true);
    tab.parentNode.replaceChild(newTab, tab);
    newTab.addEventListener('click', function() {
      const filter = this.dataset.filter;
      filterReviews(filter);
    });
  });
  
  const searchInput = document.getElementById('search-reviews');
  if (searchInput) {
    const newSearch = searchInput.cloneNode(true);
    searchInput.parentNode.replaceChild(newSearch, searchInput);
    newSearch.addEventListener('input', function(e) {
      performSearch(e.target.value);
    });
  }
  
  const reviewForm = document.getElementById('review-form');
  if (reviewForm) {
    const newForm = reviewForm.cloneNode(true);
    reviewForm.parentNode.replaceChild(newForm, reviewForm);
    newForm.addEventListener('submit', handleReviewSubmit);
  }
}

async function loadReviewProducts() {
  try {
    const loadingEl = document.getElementById('reviews-loading');
    if (loadingEl) loadingEl.style.display = 'flex';
    
    const snap = await db.collection('products').get();
    let options = '<option value="">Choose product...</option>';
    
    snap.docs.forEach(doc => {
      const prod = doc.data();
      window.reviewProducts[doc.id] = { 
        title: prod.title, 
        primaryImg: prod.primaryImg || (prod.media?.[0]?.url) || 'https://via.placeholder.com/80',
        price: prod.price
      };
      options += `<option value="${doc.id}">${prod.title}</option>`;
    });
    
    const selectProduct = document.getElementById('review-product-id');
    if (selectProduct) selectProduct.innerHTML = options;
    
  } catch (e) { 
    console.error('Error loading products:', e); 
    showReviewNotification('Error loading products', 'error');
  } finally {
    const loadingEl = document.getElementById('reviews-loading');
    if (loadingEl) loadingEl.style.display = 'none';
  }
}

async function loadReviews() {
  const loadingEl = document.getElementById('reviews-loading');
  if (loadingEl) loadingEl.style.display = 'flex';
  
  try {
    const snap = await db.collection('reviews').orderBy('timestamp', 'desc').get();
    window.allReviews = snap.docs.map(doc => ({
      id: doc.id,
      ...doc.data(),
      timestamp: doc.data().timestamp?.toDate() || new Date()
    }));
    
    await loadReviewProducts();
    applyReviewFilter(window.currentReviewFilter);
    updateReviewStats();
    renderReviews();
    
  } catch (error) {
    console.error('Error loading reviews:', error);
    showReviewNotification('Error loading reviews', 'error');
  } finally {
    if (loadingEl) loadingEl.style.display = 'none';
  }
}

function applyReviewFilter(filter) {
  if (filter === 'all') {
    window.filteredReviews = [...window.allReviews];
  } else if (filter === 'verified') {
    window.filteredReviews = window.allReviews.filter(r => r.verified === true);
  } else if (filter === 'unverified') {
    window.filteredReviews = window.allReviews.filter(r => !r.verified);
  } else if (filter === 'with-image') {
    window.filteredReviews = window.allReviews.filter(r => r.imageUrl && r.imageUrl.trim() !== '');
  }
}

function filterReviews(filter) {
  window.currentReviewFilter = filter;
  window.currentReviewPage = 1;
  
  document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
  const activeTab = document.querySelector(`[data-filter="${filter}"]`);
  if (activeTab) activeTab.classList.add('active');
  
  applyReviewFilter(filter);
  renderReviews();
}

function performSearch(term) {
  term = term.toLowerCase();
  if (!term) { 
    applyReviewFilter(window.currentReviewFilter); 
  } else { 
    window.filteredReviews = window.allReviews.filter(r => 
      (r.reviewerName?.toLowerCase() || '').includes(term) || 
      (r.city?.toLowerCase() || '').includes(term) || 
      (r.comment?.toLowerCase() || '').includes(term)
    ); 
  }
  window.currentReviewPage = 1;
  renderReviews();
}

function updateReviewStats() {
  const totalEl = document.getElementById('total-reviews');
  const verifiedEl = document.getElementById('verified-reviews');
  const imagesEl = document.getElementById('reviews-with-images');
  const productsReviewedEl = document.getElementById('reviewed-products');
  
  if (totalEl) totalEl.textContent = window.allReviews.length;
  if (verifiedEl) verifiedEl.textContent = window.allReviews.filter(r => r.verified).length;
  if (imagesEl) imagesEl.textContent = window.allReviews.filter(r => r.imageUrl && r.imageUrl.trim() !== '').length;
  if (productsReviewedEl) productsReviewedEl.textContent = new Set(window.allReviews.map(r => r.productId)).size;
}

function renderReviews() {
  if (!window.filteredReviews) return;
  
  const tableBody = document.getElementById('reviews-table-body');
  const mobileCards = document.getElementById('reviews-mobile-cards');
  const emptyState = document.getElementById('reviews-empty-state');
  const paginationDiv = document.getElementById('reviews-pagination');
  
  if (window.filteredReviews.length === 0) {
    if (emptyState) emptyState.style.display = 'block';
    if (tableBody) tableBody.innerHTML = '';
    if (mobileCards) mobileCards.innerHTML = '';
    if (paginationDiv) paginationDiv.style.display = 'none';
    return;
  }
  
  if (emptyState) emptyState.style.display = 'none';
  
  const start = (window.currentReviewPage - 1) * window.reviewItemsPerPage;
  const end = start + window.reviewItemsPerPage;
  const pageReviews = window.filteredReviews.slice(start, end);
  
  if (tableBody) {
    tableBody.innerHTML = pageReviews.map(review => {
      const product = window.reviewProducts[review.productId] || { title: 'Unknown', primaryImg: 'https://via.placeholder.com/80' };
      const stars = '★'.repeat(Math.floor(review.rating)) + (review.rating % 1 >= 0.5 ? '½' : '');
      const date = review.timestamp ? review.timestamp.toLocaleDateString('en-IN',{day:'numeric', month:'short', year:'numeric'}) : '';
      return `<tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="product-thumb" style="background-image:url('${product.primaryImg}')"></div>
            <span class="product-title">${product.title}</span>
          </div>
        </td>
        <td>
          <div style="font-weight:700;">${review.reviewerName}</div>
          <div style="font-size:0.7rem;">${review.city || ''}</div>
        </td>
        <td>
          <span class="star-rating">${stars}</span> ${review.rating}
        </td>
        <td style="max-width:200px;">${review.comment?.substring(0,50)}${review.comment?.length>50?'…':''}</td>
        <td>
          ${review.imageUrl ? 
            `<div class="review-thumb" style="background-image:url('${review.imageUrl}');" onclick="window.open('${review.imageUrl}')"></div>` : 
            '—'
          }
        </td>
        <td>
          ${review.verified ? 
            '<span class="verified-badge"><i class="fa-solid fa-check"></i> verified</span>' : 
            'no'
          }
        </td>
        <td><span class="timestamp">${date}</span></td>
        <td>
          <div class="action-btns">
            <button class="action-btn" onclick="editReview('${review.id}')"><i class="fa-solid fa-edit"></i></button>
            <button class="action-btn" onclick="deleteReview('${review.id}')"><i class="fa-solid fa-trash"></i></button>
            <button class="action-btn" onclick="viewReviewProduct('${review.productId}')"><i class="fa-solid fa-eye"></i></button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }
  
  if (mobileCards) {
    mobileCards.innerHTML = pageReviews.map(review => {
      const product = window.reviewProducts[review.productId] || { title: 'Unknown', primaryImg: 'https://via.placeholder.com/80' };
      const stars = '★'.repeat(Math.floor(review.rating)) + (review.rating % 1 >= 0.5 ? '½' : '');
      return `<div class="notification-card">
        <div class="card-header">
          <div class="card-thumb" style="background-image:url('${product.primaryImg}')"></div>
          <div class="card-title">
            <h4>${product.title}</h4>
            <span class="product-id">${review.productId?.slice(0,8)}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-row"><i class="fa-solid fa-user"></i> ${review.reviewerName} (${review.city})</div>
          <div class="card-row"><i class="fa-solid fa-star"></i> ${stars} (${review.rating})</div>
          <div class="card-row"><i class="fa-solid fa-comment"></i> ${review.comment}</div>
          ${review.imageUrl ? 
            `<div class="card-row"><i class="fa-solid fa-image"></i> <div class="review-thumb" style="background-image:url('${review.imageUrl}');" onclick="window.open('${review.imageUrl}')"></div></div>` : 
            ''
          }
          <div class="card-row"><i class="fa-regular fa-calendar"></i> ${review.timestamp?.toLocaleDateString()}</div>
          <div class="card-row"><i class="fa-regular fa-circle-check"></i> verified: ${review.verified ? '✓' : '✗'}</div>
        </div>
        <div class="card-footer">
          <span>ID: ${review.id.slice(0,6)}</span>
          <div class="card-actions">
            <button class="action-btn" onclick="editReview('${review.id}')"><i class="fa-solid fa-edit"></i></button>
            <button class="action-btn" onclick="deleteReview('${review.id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  
  updateReviewPagination();
}

function updateReviewPagination() {
  const paginationDiv = document.getElementById('reviews-pagination');
  const prevBtn = document.getElementById('prev-review-page');
  const nextBtn = document.getElementById('next-review-page');
  const pageNumbers = document.getElementById('review-page-numbers');
  
  const totalPages = Math.ceil(window.filteredReviews.length / window.reviewItemsPerPage);
  if (totalPages <= 1) { 
    if (paginationDiv) paginationDiv.style.display = 'none'; 
    return; 
  }
  
  if (paginationDiv) paginationDiv.style.display = 'flex';
  
  if (prevBtn) prevBtn.disabled = window.currentReviewPage === 1;
  if (nextBtn) nextBtn.disabled = window.currentReviewPage === totalPages;
  
  let nums = '';
  for (let i = Math.max(1, window.currentReviewPage-2); i <= Math.min(totalPages, window.currentReviewPage+2); i++) {
    nums += `<button class="page-btn ${i===window.currentReviewPage?'active':''}" onclick="goToReviewPage(${i})">${i}</button>`;
  }
  if (pageNumbers) pageNumbers.innerHTML = nums;
}

function changeReviewPage(dir) {
  const total = Math.ceil(window.filteredReviews.length / window.reviewItemsPerPage);
  if (dir === 'prev' && window.currentReviewPage > 1) window.currentReviewPage--;
  if (dir === 'next' && window.currentReviewPage < total) window.currentReviewPage++;
  renderReviews();
}

function goToReviewPage(p) { 
  window.currentReviewPage = p; 
  renderReviews(); 
}

function addReviewImageFromUrl() {
  const url = document.getElementById('review-image-url').value.trim();
  if (!url) {
    showReviewNotification('Enter URL', 'error');
    return;
  }
  try { 
    new URL(url); 
  } catch { 
    showReviewNotification('Invalid URL', 'error'); 
    return; 
  }
  window.reviewImageUrl = url;
  const preview = document.getElementById('review-image-preview');
  const previewImg = document.getElementById('review-image-preview-img');
  if (previewImg) previewImg.src = url;
  if (preview) preview.style.display = 'block';
  document.getElementById('review-image-url').value = '';
  showReviewNotification('Image added');
}

function handleReviewImageUpload(files) {
  if (!files || !files.length) return;
  const file = files[0];
  
  if (file.size > 5 * 1024 * 1024) {
    showReviewNotification('Image too large (max 5MB)', 'error');
    return;
  }
  
  const url = URL.createObjectURL(file);
  window.reviewImageUrl = url;
  const previewImg = document.getElementById('review-image-preview-img');
  if (previewImg) previewImg.src = url;
  document.getElementById('review-image-preview').style.display = 'block';
  showReviewNotification('Image uploaded');
}

function removeReviewImage(showNotification = true) {
  window.reviewImageUrl = '';
  document.getElementById('review-image-preview').style.display = 'none';
  const fileInput = document.getElementById('review-image-file');
  if (fileInput) fileInput.value = '';
  const urlInput = document.getElementById('review-image-url');
  if (urlInput) urlInput.value = '';
  
  if (showNotification) {
    showReviewNotification('Image removed');
  }
}

function resetReviewForm() {
  document.getElementById('review-form').reset();
  const reviewId = document.getElementById('review-id');
  const formTitle = document.getElementById('review-form-title');
  const reviewVerified = document.getElementById('review-verified');
  
  if (reviewId) reviewId.value = '';
  if (formTitle) formTitle.innerHTML = 'add new review';
  if (reviewVerified) reviewVerified.checked = true;
  
  removeReviewImage(false);
  
  document.getElementById('reviewForm').scrollIntoView({ behavior: 'smooth' });
}

let isSubmitting = false;

async function handleReviewSubmit(e) {
  e.preventDefault();
  
  if (isSubmitting) {
    console.log('Already submitting...');
    return false;
  }
  
  isSubmitting = true;
  
  const productId = document.getElementById('review-product-id').value;
  if (!productId) { 
    showReviewNotification('Select product', 'error'); 
    isSubmitting = false;
    return false; 
  }
  
  const reviewData = {
    productId: productId,
    reviewerName: document.getElementById('reviewer-name').value,
    city: document.getElementById('reviewer-city').value,
    rating: parseFloat(document.getElementById('review-rating').value),
    comment: document.getElementById('review-comment').value,
    verified: document.getElementById('review-verified').checked,
    imageUrl: window.reviewImageUrl || '',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  try {
    const reviewId = document.getElementById('review-id');
    if (reviewId && reviewId.value) {
      await db.collection('reviews').doc(reviewId.value).update(reviewData);
      showReviewNotification('Review updated');
    } else {
      await db.collection('reviews').add({ 
        ...reviewData, 
        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
      });
      showReviewNotification('Review added');
    }
    resetReviewForm();
    await loadReviews();
  } catch (err) { 
    console.error(err);
    showReviewNotification('Error saving review', 'error'); 
  } finally {
    isSubmitting = false;
  }
  return false;
}

function editReview(id) {
  const review = window.allReviews.find(r => r.id === id);
  if (!review) return;
  
  const reviewId = document.getElementById('review-id');
  const selectProduct = document.getElementById('review-product-id');
  const reviewerName = document.getElementById('reviewer-name');
  const reviewerCity = document.getElementById('reviewer-city');
  const reviewRating = document.getElementById('review-rating');
  const reviewComment = document.getElementById('review-comment');
  const reviewVerified = document.getElementById('review-verified');
  const formTitle = document.getElementById('review-form-title');
  
  if (reviewId) reviewId.value = review.id;
  if (selectProduct) selectProduct.value = review.productId;
  if (reviewerName) reviewerName.value = review.reviewerName;
  if (reviewerCity) reviewerCity.value = review.city || '';
  if (reviewRating) reviewRating.value = review.rating;
  if (reviewComment) reviewComment.value = review.comment;
  if (reviewVerified) reviewVerified.checked = review.verified === true;
  
  const preview = document.getElementById('review-image-preview');
  const previewImg = document.getElementById('review-image-preview-img');
  
  if (review.imageUrl) {
    window.reviewImageUrl = review.imageUrl;
    if (previewImg) previewImg.src = review.imageUrl;
    if (preview) preview.style.display = 'block';
  } else {
    window.reviewImageUrl = '';
    if (preview) preview.style.display = 'none';
    if (previewImg) previewImg.src = '';
  }
  
  if (formTitle) formTitle.innerHTML = 'edit review';
  document.getElementById('reviewForm').scrollIntoView({ behavior: 'smooth' });
}

async function deleteReview(id) {
  if (!confirm('Delete review?')) return;
  try { 
    await db.collection('reviews').doc(id).delete(); 
    showReviewNotification('Review deleted'); 
    await loadReviews(); 
  } catch (err) { 
    console.error(err);
    showReviewNotification('Error deleting review', 'error'); 
  }
}

function viewReviewProduct(productId) { 
  window.open(`product.html?id=${productId}`, '_blank'); 
}

function exportReviews() {
  const data = window.filteredReviews.map(review => {
    const product = window.reviewProducts[review.productId] || { title: '' };
    return {
      product: product.title,
      reviewer: review.reviewerName,
      city: review.city,
      rating: review.rating,
      comment: review.comment,
      verified: review.verified ? 'yes' : 'no',
      image: review.imageUrl ? 'yes' : 'no',
      date: review.timestamp?.toLocaleDateString() || ''
    };
  });
  
  if (data.length === 0) {
    showReviewNotification('No reviews to export', 'error');
    return;
  }
  
  const headers = ['product','reviewer','city','rating','comment','verified','image','date'];
  const csvRows = [];
  csvRows.push(headers.join(','));
  
  for (const row of data) {
    const values = headers.map(header => {
      const value = row[header]?.toString() || '';
      return `"${value.replace(/"/g, '""')}"`;
    });
    csvRows.push(values.join(','));
  }
  
  const blob = new Blob([csvRows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); 
  a.href = URL.createObjectURL(blob); 
  a.download = 'reviews.csv'; 
  a.click();
  showReviewNotification('Reviews exported');
}

function showReviewNotification(message, type = 'success') {
  if (typeof showNotification === 'function') {
    showNotification(message, type);
  } else {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);
    setTimeout(() => {
      notification.remove();
    }, 2000);
  }
}

  window.sendNotifyEmail = function(requestId) {
    const request = window.allNotifyRequests.find(r => r.id === requestId);
    if (!request) return;
    
    const product = window.notifyProducts[request.productId] || { title: 'Unknown Product', price: 0 };
    
    const subject = document.getElementById('email-subject')?.value || emailTemplate.subject;
    const body = document.getElementById('email-body')?.value || emailTemplate.body;
    const cc = document.getElementById('email-cc')?.value || '';
    const bcc = document.getElementById('email-bcc')?.value || '';
    
    const processedSubject = subject
      .replace('{{product}}', product.title)
      .replace('{{price}}', product.price)
      .replace('{{productLink}}', `${window.location.origin}/product.html?id=${request.productId}`)
      .replace('{{email}}', request.email);
    
    const processedBody = body
      .replace('{{product}}', product.title)
      .replace('{{price}}', product.price)
      .replace('{{productLink}}', `${window.location.origin}/product.html?id=${request.productId}`)
      .replace('{{email}}', request.email);
    
    let mailtoLink = `mailto:${request.email}`;
    const params = [];
    
    if (cc) params.push(`cc=${encodeURIComponent(cc)}`);
    if (bcc) params.push(`bcc=${encodeURIComponent(bcc)}`);
    params.push(`subject=${encodeURIComponent(processedSubject)}`);
    params.push(`body=${encodeURIComponent(processedBody)}`);
    
    if (params.length > 0) {
      mailtoLink += '?' + params.join('&');
    }
    
    window.location.href = mailtoLink;
    
    setTimeout(() => {
      if (confirm('Email client opened. Mark this request as notified?')) {
        markNotifyAsNotified(requestId);
      }
    }, 1000);
  };

  window.sendBulkEmails = function() {
    const pendingRequests = window.filteredNotifyRequests.filter(r => r.status !== 'notified');
    
    if (pendingRequests.length === 0) {
      showNotification('No pending requests to email', 'error');
      return;
    }
    
    if (pendingRequests.length === 1) {
      sendNotifyEmail(pendingRequests[0].id);
      return;
    }
    
    const choice = confirm(
      `You have ${pendingRequests.length} pending requests.\n\n` +
      `Choose OK to open separate emails for each (will open ${pendingRequests.length} tabs/windows)\n` +
      `Choose Cancel to copy all emails to clipboard for manual sending`
    );
    
    if (choice) {
      pendingRequests.forEach((req, index) => {
        setTimeout(() => {
          sendNotifyEmail(req.id);
        }, index * 1500);
      });
      showNotification(`Opening ${pendingRequests.length} email windows...`);
    } else {
      const emails = pendingRequests.map(r => r.email).join(', ');
      navigator.clipboard.writeText(emails);
      showNotification('Emails copied to clipboard');
    }
  };

  window.exportRequests = function() {
    const data = window.filteredNotifyRequests.map(req => {
      const product = window.notifyProducts[req.productId] || { title: 'Unknown Product', price: 0 };
      const date = req.timestamp ? new Date(req.timestamp) : new Date();
      
      return {
        'Email': req.email,
        'Product ID': req.productId,
        'Product Title': product.title,
        'Product Price': product.price,
        'Action Type': req.actionType || 'buy',
        'Status': req.status || 'pending',
        'Requested Date': date.toLocaleDateString('en-IN'),
        'Requested Time': date.toLocaleTimeString('en-IN'),
        'Notification ID': req.id
      };
    });

    const csv = convertToCSV(data);
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `notification_requests_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    
    showNotification('Exported to CSV');
  };

  function convertToCSV(data) {
    if (data.length === 0) return '';
    
    const headers = Object.keys(data[0]);
    const csvRows = [];
    
    csvRows.push(headers.join(','));
    
    for (const row of data) {
      const values = headers.map(header => {
        const value = row[header]?.toString() || '';
        return `"${value.replace(/"/g, '""')}"`;
      });
      csvRows.push(values.join(','));
    }
    
    return csvRows.join('\n');
  }

  window.markNotifyAsNotified = async function(notificationId) {
    try {
      await db.collection('notifications').doc(notificationId).update({
        status: 'notified',
        notifiedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      
      showNotification('Marked as notified');

  window.changePage = function(direction) {
    const totalPages = Math.ceil(window.filteredNotifyRequests.length / window.notifyItemsPerPage);
    
    if (direction === 'prev' && window.currentNotifyPage > 1) {
      window.currentNotifyPage--;
    } else if (direction === 'next' && window.currentNotifyPage < totalPages) {
      window.currentNotifyPage++;
    }
    
    renderNotifyRequests();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.goToNotifyPage = function(page) {
    window.currentNotifyPage = page;
    renderNotifyRequests();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  function updateNotifyPagination() {
    const totalPages = Math.ceil(window.filteredNotifyRequests.length / window.notifyItemsPerPage);
    const pagination = document.getElementById('pagination');
    const prevBtn = document.getElementById('prev-page');
    const nextBtn = document.getElementById('next-page');
    const pageNumbers = document.getElementById('page-numbers');
    
    if (totalPages <= 1) {
      if (pagination) pagination.style.display = 'none';
      return;
    }

    if (pagination) pagination.style.display = 'flex';
    if (prevBtn) prevBtn.disabled = window.currentNotifyPage === 1;
    if (nextBtn) nextBtn.disabled = window.currentNotifyPage === totalPages;

    let pageNumbersHTML = '';
    const startPage = Math.max(1, window.currentNotifyPage - 2);
    const endPage = Math.min(totalPages, window.currentNotifyPage + 2);

    for (let i = startPage; i <= endPage; i++) {
      pageNumbersHTML += `
        <button class="page-btn ${i === window.currentNotifyPage ? 'active' : ''}" onclick="goToNotifyPage(${i})">
          ${i}
        </button>
      `;
    }

    if (pageNumbers) pageNumbers.innerHTML = pageNumbersHTML;
  }

  loadTemplate();
  loadNotifyRequests();
}

function renderMediaGrid() {
  const mediaGrid = document.getElementById('media-grid');
  if (!mediaGrid) return;
  
  let html = '';
  
  for (let i = 0; i < Math.min(productMedia.length, 8); i++) {
    const media = productMedia[i];
    const isVideo = media.type === 'video';
    const isSelected = (i === selectedMediaIndex);
    
    html += `
      <div class="media-item ${isSelected ? 'selected' : ''}" onclick="selectMedia(${i})">
        ${isVideo ? 
          `<video src="${media.url}"></video>` : 
          `<img src="${media.url}" alt="media">`
        }
        <span class="media-type-badge">${isVideo ? 'VID' : 'IMG'}</span>
        <span class="media-remove-btn" onclick="removeMedia(${i}); event.stopPropagation();">
          <i class="fa-solid fa-times"></i>
        </span>
      </div>
    `;
  }
  
  for (let i = productMedia.length; i < 8; i++) {
    html += `
      <div class="media-add-item" onclick="document.getElementById('media-url-input').focus()">
        <i class="fa-solid fa-plus"></i>
        <span>add media</span>
      </div>
    `;
  }
  
  mediaGrid.innerHTML = html;
}

window.selectMedia = function(index) {
  selectedMediaIndex = index;
  renderMediaGrid();
};

window.addMediaFromUrl = function() {
  const urlInput = document.getElementById('media-url-input');
  if (!urlInput) return;
  
  const url = urlInput.value.trim();
  
  if (!url) {
    showNotification('please enter a url', 'error');
    return;
  }

  try {
    new URL(url);
  } catch {
    showNotification('please enter a valid url', 'error');
    return;
  }

  const isVideo = url.match(/\.(mp4|webm|ogg|mov|avi|wmv|flv|mkv)$/i) || 
                 url.includes('youtube.com') || 
                 url.includes('youtu.be') || 
                 url.includes('vimeo.com') ||
                 url.includes('player.vimeo');
  
  const mediaItem = {
    url: url,
    type: isVideo ? 'video' : 'image'
  };

  if (productMedia.length >= 8) {
    showNotification('maximum 8 media files allowed', 'error');
    return;
  }

  productMedia.push(mediaItem);
  
  if (productMedia.length === 1) {
    selectedMediaIndex = 0;
  }
  
  urlInput.value = '';
  renderMediaGrid();
  showNotification('media added successfully!', 'success');
};

window.handleFileUpload = function(files) {
  if (!files) return;
  
  if (productMedia.length + files.length > 8) {
    showNotification('maximum 8 media files allowed', 'error');
    return;
  }

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const url = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video/');
    
    const mediaItem = {
      url: url,
      type: isVideo ? 'video' : 'image',
      file: file
    };

    productMedia.push(mediaItem);
  }

  if (productMedia.length > 0 && selectedMediaIndex === 0 && productMedia.length === files.length) {
    selectedMediaIndex = 0;
  }

  renderMediaGrid();
  showNotification(`${files.length} file(s) added successfully!`, 'success');
};

window.removeMedia = function(index) {
  productMedia.splice(index, 1);
  
  if (selectedMediaIndex >= productMedia.length) {
    selectedMediaIndex = Math.max(0, productMedia.length - 1);
  }
  
  renderMediaGrid();
};

async function saveProduct(productData) {
  try {
    if (productData.id) {
      const { id, ...data } = productData;
      await db.collection('products').doc(id).update({
        ...data,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showNotification('Product updated successfully!', 'success');
    } else {
      await db.collection('products').add({
        ...productData,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showNotification('Product added successfully!', 'success');
    }
    loadProducts();
    resetForm();
  } catch (error) {
    console.error('Error saving product:', error);
    showNotification(`Failed to save product: ${error.message}`, 'error');
  }
}

async function deleteProductFromFirebase(id) {
  try {
    await db.collection('products').doc(id).delete();
    showNotification('product deleted successfully!', 'success');
    loadProducts();
  } catch (error) {
    console.error('Error deleting product:', error);
    showNotification('failed to delete product', 'error');
  }
}

window.deleteProduct = function(id) {

};

function calculatePrepaidPrice(sellingPrice) {
  const discount = sellingPrice * 0.15;
  const prepaid = sellingPrice - discount;
  return Math.round(prepaid);
}

function calculateCodPrice(sellingPrice) {
  return Math.round(sellingPrice + 100);
}

function calculateOriginalPrice(sellingPrice, originalPrice) {
  if (originalPrice && originalPrice > sellingPrice) {
    return originalPrice;
  } else {
    return Math.round(sellingPrice * 1.25);
  }
}

function updatePricePreviews() {
  const sellingPrice = parseFloat(document.getElementById('product-price')?.value) || 0;
  
  if (sellingPrice > 0) {
    const prepaid = calculatePrepaidPrice(sellingPrice);
    const cod = calculateCodPrice(sellingPrice);
    
    document.getElementById('prepaid-preview').textContent = `₹${prepaid}`;
    document.getElementById('cod-preview').textContent = `₹${cod}`;
  } else {
    document.getElementById('prepaid-preview').textContent = '₹0';
    document.getElementById('cod-preview').textContent = '₹0';
  }
}

function handleImageUploadForBlock(input) {
  const file = input.files[0];
  if (!file) return;
  
  if (file.size > 5 * 1024 * 1024) {
    showNotification('Image too large (max 5MB)', 'error');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const block = input.closest('.image-block');
    if (block) {
      const urlInput = block.querySelector('.block-content');
      const preview = block.querySelector('.image-preview-block');
      const previewImg = preview?.querySelector('img');
      
      if (urlInput) urlInput.value = e.target.result;
      if (previewImg) previewImg.src = e.target.result;
      if (preview) preview.style.display = 'block';
      updatePreview();
    }
  };
  reader.readAsDataURL(file);
}

function updatePreview() {
  const preview = document.getElementById('description-preview');
  if (!preview) return;
  
  const blocks = document.querySelectorAll('#description-blocks-container .description-block');
  
  let html = '';
  
  blocks.forEach(block => {
    if (block.classList.contains('text-block')) {
      const text = block.querySelector('.block-content')?.value || '';
      if (text) {
        html += `<p style="margin-bottom: 1.5rem; line-height: 1.6;">${text}</p>`;
      }
    }
    else if (block.classList.contains('heading-block')) {
      const level = block.querySelector('.heading-level')?.value || 'h2';
      const text = block.querySelector('.block-content')?.value || '';
      if (text) {
        html += `<${level} style="font-family: 'Proza Libre', sans-serif; margin: 2rem 0 1rem; color: #000;">${text}</${level}>`;
      }
    }
    else if (block.classList.contains('image-block')) {
      const url = block.querySelector('.block-content')?.value || '';
      if (url) {
        html += `<p style="text-align: center;"><img src="${url}" alt="Product image" style="max-width: 100%; border-radius: 12px; border: 2px solid #000; margin: 1rem 0;"></p>`;
      }
    }
    else if (block.classList.contains('video-block')) {
      const url = block.querySelector('.block-content')?.value || '';
      const alignment = block.querySelector('.video-alignment')?.value || 'center';
      const alignStyle = alignment === 'center' ? 'margin: 0 auto;' : alignment === 'right' ? 'margin-left: auto;' : 'margin-right: auto;';
      
      if (url) {
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
          let videoId = '';
          if (url.includes('youtube.com/watch?v=')) {
            videoId = url.split('v=')[1]?.split('&')[0];
          } else if (url.includes('youtu.be/')) {
            videoId = url.split('youtu.be/')[1]?.split('?')[0];
          }
          
          if (videoId) {
            html += `<p style="text-align: ${alignment};"><iframe width="100%" height="315" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen style="max-width: 560px; ${alignStyle} border-radius: 12px; border: 2px solid #000;"></iframe></p>`;
          }
        } else {
          html += `<p style="text-align: ${alignment};"><video width="100%" height="auto" style="max-width: 360px; border-radius: 10px; display: block; ${alignStyle}" controls><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video></p>`;
        }
      }
    }
    else if (block.classList.contains('bullet-block')) {
      const bullets = block.querySelectorAll('.bullet-text');
      let hasContent = false;
      let bulletHtml = '<ul style="margin-bottom: 1.5rem; list-style: none; padding-left: 0;">';
      
      bullets.forEach(bullet => {
        const text = bullet.value || '';
        if (text) {
          hasContent = true;
          bulletHtml += `<li style="margin-bottom: 0.5rem; display: flex; align-items: center;"><i class="fa-solid fa-check-circle" style="color: #d4af37; margin-right: 10px;"></i>${text}</li>`;
        }
      });
      
      bulletHtml += `</ul>`;
      if (hasContent) {
        html += bulletHtml;
      }
    }
  });
  
  preview.innerHTML = html || '<p style="color: #999; text-align: center;">No description blocks added yet. Use the buttons above to add content.</p>';
}

function loadDescriptionBlocks(blocks) {
  const container = document.getElementById('description-blocks-container');
  if (!container) return;
  
  container.innerHTML = '';
  
  if (blocks && Array.isArray(blocks)) {
    blocks.forEach(block => {
      if (block.type === 'text') {
        addTextBlock();
        const lastBlock = container.lastElementChild;
        if (lastBlock) {
          const contentInput = lastBlock.querySelector('.block-content');
          if (contentInput) contentInput.value = block.content || '';
        }
      }
      else if (block.type === 'heading') {
        addHeadingBlock();
        const lastBlock = container.lastElementChild;
        if (lastBlock) {
          const contentInput = lastBlock.querySelector('.block-content');
          if (contentInput) contentInput.value = block.content || '';
          const levelSelect = lastBlock.querySelector('.heading-level');
          if (levelSelect && block.level) levelSelect.value = block.level;
        }
      }
      else if (block.type === 'image') {
        addImageBlock();
        const lastBlock = container.lastElementChild;
        if (lastBlock) {
          const urlInput = lastBlock.querySelector('.block-content');
          if (urlInput) urlInput.value = block.url || '';
          if (block.url) {
            const preview = lastBlock.querySelector('.image-preview-block');
            const previewImg = preview?.querySelector('img');
            if (previewImg) previewImg.src = block.url;
            if (preview) preview.style.display = 'block';
          }
        }
      }
      else if (block.type === 'video') {
        addVideoBlock();
        const lastBlock = container.lastElementChild;
        if (lastBlock) {
          const urlInput = lastBlock.querySelector('.block-content');
          if (urlInput) urlInput.value = block.url || '';
          const alignmentSelect = lastBlock.querySelector('.video-alignment');
          if (alignmentSelect && block.alignment) alignmentSelect.value = block.alignment;
        }
      }
      else if (block.type === 'bullets') {
        addBulletBlock();
        const lastBlock = container.lastElementChild;
        if (lastBlock) {
          const bulletContainer = lastBlock.querySelector('.bullet-items-container');
          if (bulletContainer) {
            bulletContainer.innerHTML = '';
            
            if (block.items && Array.isArray(block.items)) {
              block.items.forEach(item => {
                const bulletItemDiv = document.createElement('div');
                bulletItemDiv.className = 'bullet-item';
                bulletItemDiv.style.display = 'flex';
                bulletItemDiv.style.alignItems = 'center';
                bulletItemDiv.style.gap = '10px';
                bulletItemDiv.style.marginBottom = '8px';
                
                bulletItemDiv.innerHTML = `
                  <i class="fa-solid fa-grip-vertical" style="color: #d4af37; cursor: move;"></i>
                  <input type="text" class="bullet-text" value="${item.replace(/"/g, '&quot;')}" style="flex: 1; padding: 8px 12px; border: 2px solid #000; border-radius: 12px;" oninput="updatePreview()">
                  <button type="button" class="remove-bullet-btn" style="width: 30px; height: 30px; border-radius: 50%; border: 2px solid #000; background: #ff4444; color: white; cursor: pointer;" onclick="removeBulletItem(this)"><i class="fa-solid fa-times"></i></button>
                `;
                
                bulletContainer.appendChild(bulletItemDiv);
              });
            }
          }
        }
      }
    });
  }
  
  updatePreview();
}

async function handleProductSubmit(e) {
  e.preventDefault();

  // Get all form elements with null checks
  const productTitle = document.getElementById('product-title');
  const productCategory = document.getElementById('product-category');
  const productPrice = document.getElementById('product-price');
  const productOriginalPrice = document.getElementById('product-original-price');
  const productRating = document.getElementById('product-rating');
  const productReviewCount = document.getElementById('product-review-count');
  const productStock = document.getElementById('product-stock');
  const productBrand = document.getElementById('product-brand');
  const productShortDesc = document.getElementById('product-short-desc');
  const productId = document.getElementById('product-id');
  const showOnHome = document.getElementById('show-on-home');
  const showOnAccessories = document.getElementById('show-on-accessories');
  const showOnEssentials = document.getElementById('show-on-essentials');
  const productHighDemand = document.getElementById('product-high-demand');

  // Validate required fields
  if (!productTitle) {
    showNotification('Product title field not found', 'error');
    return;
  }
  if (!productTitle.value) {
    showNotification('Please enter product title', 'error');
    return;
  }

  if (!productCategory) {
    showNotification('Product category field not found', 'error');
    return;
  }

  if (!productPrice) {
    showNotification('Product price field not found', 'error');
    return;
  }

  const sellingPrice = parseFloat(productPrice.value);
  if (isNaN(sellingPrice) || sellingPrice <= 0) {
    showNotification('Please enter a valid price', 'error');
    return;
  }
  
  const originalPriceInput = productOriginalPrice ? parseFloat(productOriginalPrice.value) || 0 : 0;
  
  const originalPrice = calculateOriginalPrice(sellingPrice, originalPriceInput);
  const prepaidPrice = calculatePrepaidPrice(sellingPrice);
  const codPrice = calculateCodPrice(sellingPrice);
  
  const rating = productRating ? parseFloat(productRating.value) || 4.5 : 4.5;
  const reviewCount = productReviewCount ? parseInt(productReviewCount.value) || 0 : 0;
  const stock = productStock ? parseInt(productStock.value) || 10 : 10;
  const brand = productBrand ? productBrand.value || 'MyEssantia' : 'MyEssantia';
  
  const showOnHomeChecked = showOnHome ? showOnHome.checked : false;
  const showOnAccessoriesChecked = showOnAccessories ? showOnAccessories.checked : false;
  const showOnEssentialsChecked = showOnEssentials ? showOnEssentials.checked : false;
  const highDemandChecked = productHighDemand ? productHighDemand.checked : false;

  // Collect description blocks
  const descriptionBlocks = [];
  const blocks = document.querySelectorAll('#description-blocks-container .description-block');
  
  blocks.forEach(block => {
    if (block.classList.contains('text-block')) {
      const content = block.querySelector('.block-content')?.value;
      if (content && content.trim()) {
        descriptionBlocks.push({
          type: 'text',
          content: content.trim()
        });
      }
    }
    else if (block.classList.contains('heading-block')) {
      const content = block.querySelector('.block-content')?.value;
      const level = block.querySelector('.heading-level')?.value;
      if (content && content.trim()) {
        descriptionBlocks.push({
          type: 'heading',
          content: content.trim(),
          level: level
        });
      }
    }
    else if (block.classList.contains('image-block')) {
      const url = block.querySelector('.block-content')?.value;
      if (url && url.trim()) {
        descriptionBlocks.push({
          type: 'image',
          url: url.trim()
        });
      }
    }
    else if (block.classList.contains('video-block')) {
      const url = block.querySelector('.block-content')?.value;
      const alignment = block.querySelector('.video-alignment')?.value;
      if (url && url.trim()) {
        descriptionBlocks.push({
          type: 'video',
          url: url.trim(),
          alignment: alignment
        });
      }
    }
    else if (block.classList.contains('bullet-block')) {
      const bullets = block.querySelectorAll('.bullet-text');
      const items = [];
      bullets.forEach(bullet => {
        const text = bullet.value;
        if (text && text.trim()) items.push(text.trim());
      });
      if (items.length > 0) {
        descriptionBlocks.push({
          type: 'bullets',
          items: items
        });
      }
    }
  });

  const productData = {
    title: productTitle.value,
    category: productCategory.value,
    price: sellingPrice,
    originalPrice: originalPrice,
    prepaidPrice: prepaidPrice,
    codPrice: codPrice,
    rating: rating,
    reviewCount: reviewCount,
    stock: stock,
    brand: brand,
    media: productMedia.map(m => ({ url: m.url, type: m.type })),
    primaryImg: productMedia[selectedMediaIndex]?.url || '',
    shortDesc: productShortDesc ? productShortDesc.value : '',
    descriptionBlocks: descriptionBlocks,
    showOnHome: showOnHomeChecked,
    showOnAccessories: showOnAccessoriesChecked,
    showOnEssentials: showOnEssentialsChecked,
    showOnNew: true,
    highDemand: highDemandChecked
  };

  if (productId && productId.value) {
    productData.id = productId.value;
  }

  await saveProduct(productData);
}

function renderProducts(productsToRender = products) {

    emptyProducts.style.display = 'block';
    productsList.innerHTML = '';
    return;
  }
  
  emptyProducts.style.display = 'none';

  let mobileHTML = '<div class="product-cards">';

    const pages = [];

    if (product.showOnAccessories) pages.push('<span class="page-badge accessories"><i class="fa-solid fa-bag-shopping"></i> acc</span>');
    if (product.showOnEssentials) pages.push('<span class="page-badge essentials"><i class="fa-solid fa-bolt"></i> ess</span>');
    
    const isNewIn = product.createdAt && 
                    (new Date() - (product.createdAt.toDate ? product.createdAt.toDate() : new Date(product.createdAt))) < (24 * 60 * 60 * 1000);

function resetForm() {
  // Get all form elements with null checks
  const productForm = document.getElementById('product-form');
  const productId = document.getElementById('product-id');
  const productCreationDate = document.getElementById('product-creation-date');
  const showOnHome = document.getElementById('show-on-home');
  const showOnAccessories = document.getElementById('show-on-accessories');
  const showOnEssentials = document.getElementById('show-on-essentials');
  const showOnNew = document.getElementById('show-on-new');
  const productHighDemand = document.getElementById('product-high-demand');
  const productReviewCount = document.getElementById('product-review-count');
  const formTitle = document.getElementById('form-title');
  
  if (productForm) productForm.reset();
  if (productId) productId.value = '';
  if (productCreationDate) productCreationDate.value = '';
  
  productMedia = [];
  selectedMediaIndex = 0;
  renderMediaGrid();
  
  const container = document.getElementById('description-blocks-container');
  if (container) {
    container.innerHTML = '';
    setTimeout(() => {
      addTextBlock();
    }, 100);
  }
  
  if (showOnHome) showOnHome.checked = false;
  if (showOnAccessories) showOnAccessories.checked = false;
  if (showOnEssentials) showOnEssentials.checked = false;
  if (showOnNew) showOnNew.checked = false;
  if (productHighDemand) productHighDemand.checked = false;
  if (productReviewCount) productReviewCount.value = '0';
  
  updateHighDemandChip();
  updatePricePreviews();
  
  if (formTitle) formTitle.innerHTML = '<i class="fa-solid fa-plus-circle"></i> add new product';
}

function initializeDashboard() {
  console.log('Initializing dashboard with price controls and rich description editor...');
  
  const priceInput = document.getElementById('product-price');
  if (priceInput) {
    priceInput.addEventListener('input', updatePricePreviews);
  }
  
  const container = document.getElementById('description-blocks-container');
  if (container) {
    container.innerHTML = '';
    // Add a default text block
    setTimeout(() => {
      addTextBlock();
    }, 100);
  }

  const productForm = document.getElementById('product-form');
  const productCategory = document.getElementById('product-category');
  const cancelEdit = document.getElementById('cancel-edit');
  const searchInput = document.getElementById('search-products');
  const productHighDemand = document.getElementById('product-high-demand');
  const mediaGrid = document.getElementById('media-grid');

  productMedia = [];
  selectedMediaIndex = 0;
  if (mediaGrid) renderMediaGrid();

  if (productCategory) {
    productCategory.addEventListener('change', updateCategorySync);
  }
  if (productForm) {
    productForm.removeEventListener('submit', handleProductSubmit);
    productForm.addEventListener('submit', handleProductSubmit);
  }
  if (cancelEdit) {
    cancelEdit.addEventListener('click', resetForm);
  }
  if (searchInput) {
    searchInput.addEventListener('input', filterProducts);
  }
  if (productHighDemand) {
    productHighDemand.addEventListener('change', updateHighDemandChip);
  }

  loadProducts();
}

function updateStats() {
  const totalProducts = document.getElementById('total-products');
  const newinProducts = document.getElementById('newin-products');
  const highDemandProducts = document.getElementById('high-demand-products');
  const totalStock = document.getElementById('total-stock');
  const productCount = document.getElementById('product-count');

  if (!totalProducts) return;
  
  totalProducts.textContent = products.length;
  const now = new Date();
  const newInCount = products.filter(p => {
    if (!p.createdAt) return false;
    const creationDate = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
    return (now - creationDate) < (24 * 60 * 60 * 1000);
  }).length;
  newinProducts.textContent = newInCount;
  
  const highDemandCount = products.filter(p => p.highDemand).length;
  highDemandProducts.textContent = highDemandCount;
  
  const totalStockValue = products.reduce((sum, p) => sum + (p.stock || 0), 0);
  totalStock.textContent = totalStockValue;
  productCount.textContent = `${products.length} products`;
}

function filterProducts() {
  const searchInput = document.getElementById('search-products');
  if (!searchInput) return;
  
  const term = searchInput.value.toLowerCase();
  const filtered = products.filter(p => 
    p.title.toLowerCase().includes(term) ||
    p.category.toLowerCase().includes(term) ||
    (p.brand && p.brand.toLowerCase().includes(term))
  );
  renderProducts(filtered);
}

function updateCategorySync() {
  const category = document.getElementById('product-category');
  if (!category) return;
  
  const catValue = category.value;
  
  if (catValue === 'accessories') {
    const showOnAccessories = document.getElementById('show-on-accessories');
    const showOnEssentials = document.getElementById('show-on-essentials');
    if (showOnAccessories) showOnAccessories.checked = true;
    if (showOnEssentials) showOnEssentials.checked = false;
  } else if (catValue === 'essentials') {
    const showOnAccessories = document.getElementById('show-on-accessories');
    const showOnEssentials = document.getElementById('show-on-essentials');
    if (showOnEssentials) showOnEssentials.checked = true;
    if (showOnAccessories) showOnAccessories.checked = false;
  }
}

function startNewInMonitor() {
  if (newInCheckInterval) clearInterval(newInCheckInterval);
  updateNewInStatus();
  newInCheckInterval = setInterval(updateNewInStatus, 60000);
}

function updateNewInStatus() {
  const now = new Date();
  let changed = false;

  products.forEach(product => {
    if (product.createdAt) {
      const creationDate = product.createdAt.toDate ? product.createdAt.toDate() : new Date(product.createdAt);
      const hoursDiff = (now - creationDate) / (1000 * 60 * 60);
      
      const shouldBeNew = hoursDiff < 24;
      if (product.showOnNew !== shouldBeNew) {
        product.showOnNew = shouldBeNew;
        changed = true;
        
        db.collection('products').doc(product.id).update({
          showOnNew: shouldBeNew
        }).catch(error => console.error('Error updating new status:', error));
      }
    }
  });

  if (changed) {
    renderProducts();
    updateStats();
  }
}

function showNotification(message, type = 'info') {
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => {
    notification.remove();
  }, 3000);
}

window.exportProducts = function() {
  const data = JSON.stringify(products, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `myessantia_products_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showNotification('products exported successfully!', 'success');
};

window.importProducts = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (Array.isArray(imported)) {
          for (const product of imported) {
            const { id, ...productData } = product;
            await db.collection('products').add({
              ...productData,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
          showNotification('products imported successfully!', 'success');
          loadProducts();
        }
      } catch {
        showNotification('invalid file format', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
};
