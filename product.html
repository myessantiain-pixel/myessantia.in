<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>MyEssantia · product · essential</title>
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Simple font: Inter only -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <!-- Common JS (loaded once) -->
  <script src="common.js"></script>
  
  <!-- Common CSS -->
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="footer.css">
  
  <style>
    /* ========== CRITICAL MOBILE FIXES ========== */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body { 
      width: 100%; 
      overflow-x: hidden; 
      background: #ffffff; 
      scroll-behavior: smooth;
      position: relative;
      min-height: 100vh;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      color: #1e1e1e;
      line-height: 1.4;
      font-size: 16px;
      position: relative;
      overflow-x: hidden;
    }
    
    :root {
      --vh: 1vh;
      --regular-font-size: 16px;
      --error-color: red;
    }
    
    .container { 
      width: 100%; 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 0 12px;
    }
    
    @media (min-width: 640px) { 
      .container { padding: 0 20px; } 
    }

    /* ========== BREADCRUMB ========== */
    .breadcrumb {
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
      padding: 12px 0; font-size: 0.75rem; color: #4a4a4a;
    }
    .breadcrumb a { color: #1e1e1e; text-decoration: none; font-weight: 600; }
    .breadcrumb a:hover { color: #d4af37; }
    .breadcrumb i { font-size: 0.6rem; color: #d4af37; }

    /* ========== MAIN PRODUCT GRID ========== */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding-bottom: 30px;
    }
    
    @media (min-width: 1024px) {
      .product-grid {
        grid-template-columns: 1fr 1fr;
        gap: 40px;
      }
    }

    /* ========== GALLERY ========== */
    .gallery-section { width: 100%; }
    
    @media (min-width: 1024px) { 
      .gallery-section { 
        position: sticky; 
        top: 20px; 
        height: fit-content; 
      } 
    }
    
    .main-image {
      width: 100%; 
      aspect-ratio: 1/1; 
      border-radius: 16px;
      overflow: hidden; 
      margin-bottom: 12px;
      background: #ffffff; 
      border: 2px solid #000000; 
      box-shadow: 4px 4px 0 rgba(0,0,0,0.15);
      transition: all 0.3s;
    }
    
    @media (min-width: 768px) {
      .main-image {
        border-radius: 20px;
        box-shadow: 6px 6px 0 rgba(0,0,0,0.15);
      }
    }
    
    .main-image img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.6s; 
    }
    
    .thumbnail-grid {
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 6px;
    }
    
    @media (min-width: 768px) {
      .thumbnail-grid { gap: 8px; }
    }
    
    .thumbnail {
      aspect-ratio: 1/1; 
      border-radius: 10px; 
      overflow: hidden; 
      cursor: pointer;
      border: 2px solid #000; 
      transition: all 0.2s;
    }
    
    .thumbnail:hover { border-color: #d4af37; }
    .thumbnail.active { border-color: #d4af37; border-width: 3px; }

    /* Rating Chart Styles */
    .rating-chart-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      border: 2px solid #000000;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }

    .rating-chart-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #000;
    }

    .rating-main {
      font-size: 1.8rem;
      font-weight: 900;
      color: #000;
      line-height: 1;
    }

    .rating-outof {
      font-size: 0.85rem;
      color: #666;
      font-weight: 500;
    }

    .rating-stars-large {
      color: #d4af37;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .rating-count {
      font-size: 0.7rem;
      background: #f5f5f5;
      padding: 3px 8px;
      border-radius: 40px;
      border: 1px solid #000;
      font-weight: 600;
      margin-left: auto;
    }

    .rating-bars {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rating-bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
    }

    .bar-label {
      min-width: 30px;
      font-weight: 700;
      color: #000;
    }

    .bar-container {
      flex: 1;
      height: 16px;
      background: #f0f0f0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #000;
    }

    .bar-fill {
      height: 100%;
      background: #d4af37;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    .bar-percent {
      min-width: 35px;
      text-align: right;
      font-weight: 600;
      color: #000;
      font-size: 0.65rem;
    }

    /* ========== BADGES ========== */
    .sold-badge, .live-badge {
      position: relative;
      overflow: hidden;
    }
    
    .sold-badge::after, .live-badge::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: wave 2s infinite;
    }
    
    @keyframes wave {
      0% { left: -100%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }
    
    .live-badge {
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    
    .sale-badge {
      background: #000;
      color: #d4af37;
      padding: 4px 10px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 0.8rem;
      border: 2px solid #d4af37;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    
    @media (min-width: 768px) {
      .sale-badge {
        padding: 6px 14px;
        font-size: 0.9rem;
        gap: 6px;
      }
    }

    /* ========== PRICE OPTIONS ========== */
    .price-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    
    @media (min-width: 768px) {
      .price-options { gap: 8px; }
    }

    .price-option {
      padding: 8px 6px;
      border-radius: 12px;
      text-align: center;
      border: 2px solid;
      font-size: 0.7rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    
    @media (min-width: 768px) {
      .price-option {
        padding: 10px 8px;
        border-radius: 14px;
        font-size: 0.8rem;
      }
    }

    .price-option.prepaid {
      background: #d4af37;
      border-color: #000;
      color: #000;
    }

    .price-option.cod {
      background: #000;
      border-color: #d4af37;
      color: #d4af37;
    }

    .option-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }
    
    @media (min-width: 768px) {
      .option-label {
        font-size: 0.65rem;
        margin-bottom: 4px;
      }
    }

    .option-price {
      font-size: 1.1rem;
      font-weight: 800;
      line-height: 1.2;
    }
    
    @media (min-width: 768px) {
      .option-price {
        font-size: 1.3rem;
      }
    }

    .price-option.selected {
      border-width: 3px;
      transform: scale(0.98);
    }

    /* ========== BUTTONS ========== */
    .btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      flex: 1; 
      padding: 12px; 
      border-radius: 40px; 
      font-weight: 800; 
      font-size: 0.8rem;
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 4px;
      border: 2px solid #000; 
      background: #ffffff; 
      color: #000; 
      text-transform: uppercase;
    }
    
    @media (min-width: 768px) {
      .btn {
        font-size: 0.85rem;
        gap: 6px;
      }
    }
    
    .btn-primary { 
      background: #000; 
      color: #d4af37; 
      border: 2px solid #d4af37; 
    }
    
    .btn-secondary:hover { 
      background: #000; 
      color: #d4af37; 
      border-color: #d4af37; 
    }

    /* ========== DELIVERY CARD ========== */
    .delivery-card {
      background: linear-gradient(145deg, #ffffff, #f8f8f8);
      transition: all 0.3s ease;
      border: 2px solid #000;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }
    
    @media (min-width: 768px) {
      .delivery-card {
        border-radius: 20px;
        padding: 16px;
      }
    }
    
    .progress-fill {
      background: linear-gradient(90deg, #d4af37, #f5d742);
      position: relative;
      overflow: hidden;
    }

    /* ========== REVIEWS SECTION - COMPLETELY REWORKED ========== */
    .reviews-section {
      margin-top: 30px;
      width: 100%;
    }

    .reviews-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 3px solid #d4af37;
    }

    .reviews-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .reviews-header .rating-summary {
      background: #000;
      color: #d4af37;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid #d4af37;
    }

    /* Review Grid - Fixed for mobile */
    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr; /* Single column on mobile */
      gap: 20px;
      margin-bottom: 30px;
    }
    
    @media (min-width: 500px) {
      .reviews-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 900px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (min-width: 1200px) {
      .reviews-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* Review Card - Fixed for mobile visibility */
    .review-card {
      background: #fff;
      border: 2px solid #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 8px 8px 0 rgba(212,175,55,0.25);
    }

    .review-media {
      width: 100%;
      aspect-ratio: 1/1;
      background: #f5f5f5;
      border-bottom: 2px solid #000;
      overflow: hidden;
    }

    .review-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .review-details {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .reviewer-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .reviewer-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d4af37;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: 800;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .reviewer-name {
      font-weight: 800;
      font-size: 1rem;
      color: #000;
      line-height: 1.2;
    }

    .reviewer-city {
      font-size: 0.7rem;
      color: #666;
    }

    .review-stars {
      display: flex;
      gap: 2px;
      margin-bottom: 10px;
      color: #d4af37;
      font-size: 0.9rem;
    }

    .review-comment {
      font-size: 0.85rem;
      line-height: 1.5;
      color: #333;
      margin-bottom: 12px;
      flex: 1;
    }

    .review-verified {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: #16a34a;
      font-weight: 600;
      margin-top: auto;
    }

    .review-verified i {
      font-size: 0.8rem;
    }

    /* Write Review Button */
    .write-review-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #000;
      color: #d4af37;
      border: 2px solid #d4af37;
      padding: 14px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 30px;
      width: 100%;
    }

    .write-review-btn:hover {
      background: #d4af37;
      color: #000;
    }

    /* Write Review Modal */
    .review-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .review-modal.show {
      display: flex;
    }

    .review-modal-content {
      background: #fff;
      border-radius: 30px;
      padding: 24px 20px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 4px solid #d4af37;
      box-shadow: 12px 12px 0 #000;
      position: relative;
    }

    .review-modal-content h3 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: #000;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #000;
      color: #d4af37;
      border: 2px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #000;
      border-radius: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #d4af37;
    }

    .rating-select {
      display: flex;
      gap: 10px;
      font-size: 1.5rem;
      color: #d4af37;
      cursor: pointer;
    }

    .rating-select i {
      transition: transform 0.2s;
    }

    .rating-select i:hover {
      transform: scale(1.2);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-actions button {
      flex: 1;
      padding: 14px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      border: 2px solid #000;
    }

    .modal-actions .submit-btn {
      background: #d4af37;
      color: #000;
    }

    .modal-actions .cancel-btn {
      background: #fff;
      color: #000;
    }

    /* Empty State */
    .empty-reviews {
      text-align: center;
      padding: 40px 20px;
      background: #f9f9f9;
      border: 2px dashed #000;
      border-radius: 20px;
    }

    .empty-reviews i {
      font-size: 4rem;
      color: #d4af37;
      margin-bottom: 15px;
    }

    .empty-reviews h3 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #000;
    }

    .empty-reviews p {
      font-size: 1rem;
      color: #666;
      margin-bottom: 20px;
    }

    .empty-reviews button {
      background: #000;
      color: #d4af37;
      border: 2px solid #d4af37;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      margin: 0 auto;
    }

    /* ========== FAQ SECTION ========== */
    .faq-section {
      margin-top: 40px;
      padding: 20px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 24px;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
    }

    .faq-section h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid #d4af37;
      padding-bottom: 15px;
    }

    .faq-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    @media (min-width: 768px) {
      .faq-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }

    .faq-item {
      border: 2px solid #000;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .faq-question {
      padding: 16px;
      background: #f8f8f8;
      font-weight: 800;
      font-size: 1rem;
      color: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border-bottom: 2px solid #000;
      transition: background 0.2s;
    }

    .faq-question:hover {
      background: #d4af37;
      color: #000;
    }

    .faq-question i {
      transition: transform 0.3s;
    }

    .faq-question.active i {
      transform: rotate(180deg);
    }

    .faq-answer {
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: all 0.3s ease;
      background: #fff;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #333;
    }

    .faq-answer.show {
      padding: 16px;
      max-height: 200px;
    }

    /* ========== PRODUCT INFO ========== */
    .social-strip { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 6px; 
      margin-bottom: 10px; 
    }
    
    .sold-badge, .live-badge {
      display: inline-flex; 
      align-items: center; 
      gap: 4px; 
      padding: 4px 10px;
      border-radius: 40px; 
      font-size: 0.7rem;
      font-weight: 700; 
      border: 2px solid #000; 
      box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    }
    
    .sold-badge { background: #dc2626; color: white; }
    .live-badge { background: #16a34a; color: white; }
    
    .product-title {
      font-size: 1.5rem;
      font-weight: 800; 
      line-height: 1.1; 
      margin-bottom: 10px; 
      color: #000;
    }
    
    @media (min-width: 768px) { 
      .product-title { font-size: 2.2rem; } 
    }

    .rating-row {
      display: flex; 
      flex-wrap: wrap; 
      align-items: center; 
      gap: 8px; 
      margin-bottom: 12px;
      font-size: 0.8rem;
    }
    
    .stars { 
      display: flex; 
      gap: 2px; 
      color: #d4af37; 
      font-size: 0.75rem; 
    }

    /* Share Button */
    .share-wrapper { 
      position: relative; 
      margin-left: auto; 
    }
    
    .share-btn {
      background: #ffffff; 
      border: 2px solid #000; 
      padding: 4px 12px;
      border-radius: 40px; 
      font-size: 0.7rem;
      font-weight: 700; 
      display: flex; 
      align-items: center; 
      gap: 4px; 
      cursor: pointer;
    }
    
    .share-menu {
      position: absolute; 
      top: calc(100% + 5px); 
      right: 0; 
      background: white;
      border-radius: 16px; 
      box-shadow: 4px 4px 0 rgba(0,0,0,0.15); 
      padding: 12px; 
      width: 220px;
      z-index: 1000; 
      opacity: 0; 
      visibility: hidden; 
      transform: translateY(-5px);
      transition: all 0.3s; 
      border: 2px solid #000;
    }
    
    .share-menu.show { 
      opacity: 1; 
      visibility: visible; 
      transform: translateY(0);

      <div id="emailNotificationForm">

        <div class="popup-actions" style="display: flex; gap: 10px; flex-direction: column;">

  <!-- WRITE REVIEW MODAL -->
  <div class="review-modal" id="reviewModal">
    <div class="review-modal-content">

      <form id="reviewForm" onsubmit="event.preventDefault(); submitReview();">

        <div class="form-group">

            <i class="fa-regular fa-star" data-rating="2"></i>
            <i class="fa-regular fa-star" data-rating="3"></i>

  <main>
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <i class="fa-solid fa-chevron-right"></i>
        <a href="collection.html">Collection</a>
        <i class="fa-solid fa-chevron-right"></i>

      </div>
    </div>

    <div class="container" id="product-container"></div>
  </main>

  <div id="footer"></div>
  <div id="common-modals"></div>

  <script>
    // ========== PRODUCT PAGE SPECIFIC CODE ==========
    let currentProduct = null;
    let selectedPaymentMethod = 'prepaid';
    let currentAction = null;
    let productReviews = [];
    let selectedRating = 0;
    
    const STORAGE_KEY = 'myessantia_product_data';
    const NOTIFICATION_STORAGE_KEY = 'myessantia_notifications';
    
    // Initialize rating stars
    function initRatingStars() {
      const stars = document.querySelectorAll('.rating-select i');
      stars.forEach(star => {
        star.addEventListener('mouseenter', function() {
          const rating = parseInt(this.dataset.rating);
          highlightStars(rating);
        });
        
        star.addEventListener('mouseleave', function() {
          highlightStars(selectedRating);
        });
        
        star.addEventListener('click', function() {
          selectedRating = parseInt(this.dataset.rating);
          document.getElementById('reviewRating').value = selectedRating;
          highlightStars(selectedRating);
        });
      });
    }
    
    function highlightStars(rating) {
      const stars = document.querySelectorAll('.rating-select i');
      stars.forEach((star, index) => {
        if (index < rating) {
          star.className = 'fa-solid fa-star';
        } else {
          star.className = 'fa-regular fa-star';
        }
      });
    }
    
    // Open review modal
    window.openReviewModal = function() {
      if (!currentProduct) {
        showNotification('Please wait for product to load', 'error');
        return;
      }
      
      // Check if user is logged in
      if (typeof window.currentUser === 'undefined' || !window.currentUser) {
        showNotification('Please login to write a review', 'error');
        setTimeout(() => {
          window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
        }, 1500);
        return;
      }
      
      document.getElementById('reviewModal').classList.add('show');
      document.body.style.overflow = 'hidden';
      
      // Reset form
      document.getElementById('reviewForm').reset();
      selectedRating = 0;
      document.getElementById('reviewRating').value = '0';
      highlightStars(0);
    };
    
    // Close review modal
    window.closeReviewModal = function() {
      document.getElementById('reviewModal').classList.remove('show');
      document.body.style.overflow = '';
    };
    
    // Submit review
    window.submitReview = async function() {
      if (!currentProduct) return;
      
      const name = document.getElementById('reviewerName').value.trim();
      const city = document.getElementById('reviewerCity').value.trim() || 'India';
      const rating = parseInt(document.getElementById('reviewRating').value);
      const comment = document.getElementById('reviewComment').value.trim();
      const imageUrl = document.getElementById('reviewImage').value.trim();
      
      if (!name) {
        showNotification('Please enter your name', 'error');
        return;
      }
      
      if (rating === 0) {
        showNotification('Please select a rating', 'error');
        return;
      }
      
      if (!comment) {
        showNotification('Please write your review', 'error');
        return;
      }
      
      try {
        const reviewData = {
          productId: currentProduct.id,
          reviewerName: name,
          city: city,
          rating: rating,
          comment: comment,
          verified: true,
          timestamp: new Date().toISOString()
        };
        
        if (imageUrl) {
          reviewData.imageUrl = imageUrl;
        }
        
        // Add to Firebase if available
        if (typeof db !== 'undefined' && db) {
          await db.collection('reviews').add(reviewData);
        }
        
        // Add to local array
        const newReview = {
          ...reviewData,
          id: 'temp-' + Date.now()
        };
        
        productReviews.unshift(newReview);
        
        // Re-render reviews
        renderReviews();
        
        showNotification('Thank you for your review!');
        closeReviewModal();
        
      } catch (error) {
        console.error('Error submitting review:', error);
        showNotification('Failed to submit review. Please try again.', 'error');
      }
    };
    
    // Render reviews
    function renderReviews() {
      const reviewsContainer = document.getElementById('reviews-container');
      if (!reviewsContainer) return;
      
      if (!productReviews || productReviews.length === 0) {
        reviewsContainer.innerHTML = `
          <div class="empty-reviews">
            <i class="fa-regular fa-star"></i>
            <h3>No reviews yet</h3>
            <p>Be the first to share your experience with this product!</p>
            <button onclick="openReviewModal()">Write a Review</button>
          </div>
        `;
        return;
      }
      
      let reviewsHTML = '<div class="reviews-grid">';
      
      productReviews.forEach(review => {
        // Generate star rating
        let starsHTML = '';
        for (let i = 1; i <= 5; i++) {
          if (i <= review.rating) {
            starsHTML += '<i class="fa-solid fa-star"></i>';
          } else {
            starsHTML += '<i class="fa-regular fa-star"></i>';
          }
        }
        
        // Get initials for avatar
        const initials = review.reviewerName
          .split(' ')
          .map(word => word[0])
          .join('')
          .toUpperCase()
          .substring(0, 2);
        
        const imageUrl = review.imageUrl || 'https://d1327z4fntq4ap.cloudfront.net/00k6827oetc2yh1kg544bpu8rb3e';
        const city = review.city || 'India';
        const date = review.timestamp ? new Date(review.timestamp).toLocaleDateString('en-IN') : '';
        
        reviewsHTML += `
          <div class="review-card">
            <div class="review-media">
              <img src="${imageUrl}" alt="Review image" onerror="this.src='https://d1327z4fntq4ap.cloudfront.net/00k6827oetc2yh1kg544bpu8rb3e'">
            </div>
            <div class="review-details">
              <div class="reviewer-info">
                <div class="reviewer-avatar">${initials}</div>
                <div>
                  <div class="reviewer-name">${review.reviewerName}</div>
                  <div class="reviewer-city">${city}</div>
                </div>
              </div>
              <div class="review-stars">${starsHTML}</div>
              <div class="review-comment">${review.comment}</div>
              ${review.verified ? `
                <div class="review-verified">
                  <i class="fa-solid fa-circle-check"></i> Verified Purchase
                </div>
              ` : ''}
              ${date ? `<div style="font-size: 0.65rem; color: #999; margin-top: 8px;">${date}</div>` : ''}
            </div>
          </div>
        `;
      });
      
      reviewsHTML += '</div>';
      
      // Add write review button
      reviewsHTML += `
        <button class="write-review-btn" onclick="openReviewModal()">
          <i class="fa-solid fa-pen"></i> Write a Review
        </button>
      `;
      
      reviewsContainer.innerHTML = reviewsHTML;
    }
    
    // FAQ data
    const faqData = [
      {
        question: 'What is the estimated delivery time?',
        answer: 'Orders are typically delivered within 5-7 business days. You will receive a tracking link once your order is shipped.'
      },
      {
        question: 'What is your return policy?',
        answer: 'We offer 7-day easy returns. Items must be unused and in original packaging. Return shipping is free for defective items.'
      },
      {
        question: 'Is this product authentic?',
        answer: 'Yes, all products on MyEssantia are 100% authentic and sourced directly from brands or authorized distributors.'
      },
      {
        question: 'Do you ship internationally?',
        answer: 'Currently we ship only within India. International shipping will be available soon.'
      },
      {
        question: 'How do I track my order?',
        answer: 'Once your order ships, you will receive an email and SMS with tracking details. You can also track in your account dashboard.'
      },
      {
        question: 'What payment methods do you accept?',
        answer: 'We accept all major credit/debit cards, UPI, net banking, and Cash on Delivery (COD).'
      }
    ];
    
    // Render FAQ section
    function renderFAQ() {
      let faqHTML = `
        <div class="faq-section">
          <h2><i class="fa-solid fa-circle-question"></i> Frequently Asked Questions</h2>
          <div class="faq-grid">
      `;
      
      faqData.forEach((item, index) => {
        faqHTML += `
          <div class="faq-item">
            <div class="faq-question" onclick="toggleFAQ(${index})">
              <span>${item.question}</span>
              <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="faq-answer" id="faq-${index}">
              ${item.answer}
            </div>
          </div>
        `;
      });
      
      faqHTML += `
          </div>
        </div>
      `;
      
      return faqHTML;
    }
    
    // Toggle FAQ
    window.toggleFAQ = function(index) {
      const answer = document.getElementById(`faq-${index}`);
      const question = answer.previousElementSibling;
      
      if (answer.classList.contains('show')) {
        answer.classList.remove('show');
        question.classList.remove('active');
      } else {
        answer.classList.add('show');
        question.classList.add('active');
      }
    };
    
    // Check if user has already requested notification
    function hasRequestedNotification(productId) {
      const notifications = JSON.parse(localStorage.getItem(NOTIFICATION_STORAGE_KEY) || '{}');
      return !!notifications[productId];
    }

    function markNotificationRequested(productId, email) {
      const notifications = JSON.parse(localStorage.getItem(NOTIFICATION_STORAGE_KEY) || '{}');
      notifications[productId] = {
        email: email,
        timestamp: new Date().toISOString(),
        productTitle: currentProduct?.title || 'Unknown Product'
      };
      localStorage.setItem(NOTIFICATION_STORAGE_KEY, JSON.stringify(notifications));
    }

    async function submitNotificationToFirebase(productId, email, actionType) {
      try {
        if (typeof db !== 'undefined' && db) {
          await db.collection('notifications').add({
            productId: productId,
            productTitle: currentProduct?.title || 'Unknown Product',
            email: email,
            actionType: actionType,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            status: 'pending'
          });
        }
      } catch (error) {
        console.error('Error saving notification:', error);
      }
    }

    function getRandomSold() { return Math.floor(Math.random() * (2000 - 500 + 1)) + 500; }
    function getRandomViewers() { return Math.floor(Math.random() * (35 - 8 + 1)) + 8; }

    async function loadProductReviews(productId) {
      try {
        if (typeof db === 'undefined' || !db) return [];
        if (!productId) return [];
        
        const snapshot = await db.collection('reviews')
          .where('productId', '==', productId)
          .get();
        
        if (snapshot.empty) return [];
        
        const reviews = snapshot.docs.map(doc => {
          const data = doc.data();
          
          let reviewDate = new Date();
          if (data.timestamp) {
            if (data.timestamp.toDate) {
              reviewDate = data.timestamp.toDate();
            } else if (data.timestamp.seconds) {
              reviewDate = new Date(data.timestamp.seconds * 1000);
            } else {
              reviewDate = new Date(data.timestamp);
            }
          }
          
          return {
            id: doc.id,
            reviewerName: data.reviewerName || data.name || 'Anonymous',
            city: data.city || 'India',
            rating: data.rating || 5,
            comment: data.comment || data.review || '',
            verified: data.verified || false,
            imageUrl: data.imageUrl || data.image || null,
            timestamp: reviewDate
          };
        });
        
        reviews.sort((a, b) => b.timestamp - a.timestamp);
        return reviews;
        
      } catch (error) {
        console.error('Error loading reviews:', error);
        return [];
      }
    }

    function getProductId() { return new URLSearchParams(window.location.search).get('id'); }

    function generateRatingDistribution(reviews) {
      let distribution = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 };
      
      if (reviews.length === 0) {
        const baseRating = currentProduct?.rating || 4.5;
        if (baseRating >= 4.5) {
          distribution = { 5: 75, 4: 15, 3: 6, 2: 3, 1: 1 };
        } else if (baseRating >= 4.0) {
          distribution = { 5: 55, 4: 25, 3: 12, 2: 5, 1: 3 };
        } else if (baseRating >= 3.5) {
          distribution = { 5: 35, 4: 30, 3: 20, 2: 10, 1: 5 };
        } else {
          distribution = { 5: 20, 4: 25, 3: 25, 2: 18, 1: 12 };
        }
      } else {
        reviews.forEach(review => {
          const rating = Math.round(review.rating);
          if (rating >= 1 && rating <= 5) distribution[rating]++;
        });
        
        const total = reviews.length;
        if (total > 0) {
          distribution = {
            5: Math.round((distribution[5] / total) * 100),
            4: Math.round((distribution[4] / total) * 100),
            3: Math.round((distribution[3] / total) * 100),
            2: Math.round((distribution[2] / total) * 100),
            1: Math.round((distribution[1] / total) * 100)
          };
        }
      }
      
      const sum = distribution[5] + distribution[4] + distribution[3] + distribution[2] + distribution[1];
      if (sum !== 100 && sum > 0) distribution[5] += (100 - sum);
      
      return distribution;
    }

    function getStars(r) { 
      r = parseFloat(r) || 4.5; 
      let s = ''; 
      for(let i = 1; i <= 5; i++) { 
        if(r >= i) s += '<i class="fa-solid fa-star"></i>'; 
        else if(r > i-1 && r < i) s += '<i class="fa-solid fa-star-half-alt"></i>'; 
        else s += '<i class="fa-regular fa-star"></i>'; 
      } 
      return s; 
    }

    function getLargeStars(rating) {
      rating = parseFloat(rating) || 4.5;
      let stars = '';
      for(let i = 1; i <= 5; i++) {
        if(rating >= i) stars += '<i class="fa-solid fa-star"></i>';
        else if(rating > i-1 && rating < i) stars += '<i class="fa-solid fa-star-half-alt"></i>';
        else stars += '<i class="fa-regular fa-star"></i>';
      }
      return stars;
    }

    function selectPaymentMethod(method, event) {
      selectedPaymentMethod = method;
      document.querySelectorAll('.price-option').forEach(opt => opt.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }

    window.toggleRazorpayPopup = function() {
      document.getElementById('razorpayPopup').classList.toggle('show');
    };

    window.closeRazorpayPopup = function() {
      document.getElementById('razorpayPopup').classList.remove('show');
    };

    window.showHighDemandPopup = function(action) {
      currentAction = action;
      const popup = document.getElementById('highDemandPopup');
      const emailForm = document.getElementById('emailNotificationForm');
      const alreadyMessage = document.getElementById('alreadyNotifiedMessage');
      
      if (hasRequestedNotification(currentProduct.id)) {
        emailForm.style.display = 'none';
        alreadyMessage.style.display = 'block';
      } else {
        emailForm.style.display = 'block';
        alreadyMessage.style.display = 'none';
        document.getElementById('notificationEmail').value = '';
      }
      
      popup.classList.add('show');
      document.body.style.overflow = 'hidden';
    };

    window.closeHighDemandPopup = function() {
      document.getElementById('highDemandPopup').classList.remove('show');
      document.body.style.overflow = '';
      currentAction = null;
    };

    window.submitNotification = async function(actionType) {
      if (!currentProduct) return;
      
      const email = document.getElementById('notificationEmail').value.trim();
      if (!email || !isValidEmail(email)) {
        showNotification('Please enter a valid email address', 'error');
        return;
      }
      
      markNotificationRequested(currentProduct.id, email);
      await submitNotificationToFirebase(currentProduct.id, email, actionType);
      
      document.getElementById('emailNotificationForm').style.display = 'none';
      document.getElementById('alreadyNotifiedMessage').style.display = 'block';
      showNotification('We\'ll notify you when this product is ready to dispatch!');
      updateButtonStates();
    };

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showNotification(message, type = 'success') {
      const existingNotifications = document.querySelectorAll('.notification');
      existingNotifications.forEach(notif => notif.remove());
      
      const notification = document.createElement('div');
      notification.className = 'notification';
      if (type === 'error') {
        notification.style.background = '#ff4444';
        notification.style.color = 'white';
        notification.style.borderColor = '#000';
      }
      notification.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 3000);
    }

    window.addToCart = function() {
      if (!currentProduct) return;
      
      if (currentProduct.highDemand) {
        showHighDemandPopup('cart');
        return;
      }
      
      if (typeof window.addToCartGlobal === 'function') {
        window.addToCartGlobal(currentProduct.id);
      } else {
        const quantity = parseInt(document.getElementById('productQuantity').value) || 1;
        
        if (currentProduct.stock <= 0) {
          showNotification('Sorry, this product is out of stock!');
          return;
        }

        if (quantity > currentProduct.stock) {
          showNotification(`Only ${currentProduct.stock} items available!`);
          return;
        }

        if (window.cart && Array.isArray(window.cart)) {
          const existingItem = window.cart.find(item => item.id === currentProduct.id);
          
          if (existingItem) {
            existingItem.quantity += quantity;
          } else {
            window.cart.push({
              id: currentProduct.id,
              title: currentProduct.title,
              category: currentProduct.category || 'accessory',
              price: currentProduct.price,
              primaryImg: currentProduct.primaryImg || (currentProduct.images && currentProduct.images[0]) || (currentProduct.media?.images && currentProduct.media.images[0]?.url),
              quantity: quantity
            });
          }
          
          localStorage.setItem('MyEssantia_cart', JSON.stringify(window.cart));
          
          if (typeof window.updateCartCount === 'function') {
            window.updateCartCount();
          }
        }
        
        showNotification(`Added ${quantity} item${quantity > 1 ? 's' : ''} to cart!`);
        
        setTimeout(() => {
          if (typeof window.openCart === 'function') {
            window.openCart();
          }
        }, 500);
      }
    };

    window.buyNow = function() {
      if (!currentProduct) return;
      
      if (currentProduct.highDemand) {
        showHighDemandPopup('buy');
        return;
      }
      
      if (typeof window.buyNowGlobal === 'function') {
        window.buyNowGlobal(currentProduct.id);
      } else {
        window.addToCart();

    function updateButtonStates() {
      const addToCartBtn = document.querySelector('.btn-secondary');
      const buyNowBtn = document.querySelector('.btn-primary');
      
      if (!addToCartBtn || !buyNowBtn || !currentProduct) return;
      
      if (currentProduct.highDemand) {
        if (hasRequestedNotification(currentProduct.id)) {
          addToCartBtn.innerHTML = '<i class="fa-regular fa-bell"></i> Will Notify Soon!';
          buyNowBtn.innerHTML = '<i class="fa-regular fa-bell"></i> Will Notify Soon!';
          addToCartBtn.classList.add('high-demand-disabled');
          buyNowBtn.classList.add('high-demand-disabled');
          addToCartBtn.disabled = true;
          buyNowBtn.disabled = true;
        } else {
          addToCartBtn.innerHTML = '<i class="fa-solid fa-cart-plus"></i> Add to Cart';
          buyNowBtn.innerHTML = '<i class="fa-solid fa-bolt"></i> Buy Now';
          addToCartBtn.classList.remove('high-demand-disabled');
          buyNowBtn.classList.remove('high-demand-disabled');
          addToCartBtn.disabled = false;
          buyNowBtn.disabled = false;
        }
      } else {
        addToCartBtn.innerHTML = '<i class="fa-solid fa-cart-plus"></i> Add to Cart';
        buyNowBtn.innerHTML = '<i class="fa-solid fa-bolt"></i> Buy Now';
        addToCartBtn.classList.remove('high-demand-disabled');
        buyNowBtn.classList.remove('high-demand-disabled');
        addToCartBtn.disabled = false;
        buyNowBtn.disabled = false;
      }
    }

    async function loadProduct() {

      if (!productId) return showNotFound();
      
      try {
        if (typeof db === 'undefined' || !db) {
          currentProduct = {
            id: productId,
            title: 'Minimalist Leather Backpack',
            category: 'Bags',
            price: 2499,
            rating: 4.7,
            stock: 15,
            description: 'Handcrafted genuine leather backpack with premium metal hardware.',
            primaryImg: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=600',
            highDemand: false
          };
          document.getElementById('breadcrumb-product').textContent = currentProduct.title;
          
          productReviews = await loadProductReviews(productId);
          renderProduct(currentProduct);
          return;
        }
        
        const doc = await db.collection('products').doc(productId).get();
        if (!doc.exists) return showNotFound();
        
        currentProduct = { id: doc.id, ...doc.data() };
        document.getElementById('breadcrumb-product').textContent = currentProduct.title;
        
        productReviews = await loadProductReviews(productId);
        renderProduct(currentProduct);
        
      } catch (error) { 
        console.error('Error loading product:', error); 
        currentProduct = {
          id: productId,
          title: 'Urban Canvas Sneakers',
          category: 'Footwear',
          price: 1899,
          rating: 4.3,
          stock: 8,

        productReviews = await loadProductReviews(productId);

      }
    }

        initRatingStars();
      }
      
      updateDeliveryBar(product.price);
      updateButtonStates();
      
      const dates = getDeliveryDates();
      document.getElementById('deliveryDates').textContent = dates.display;
    }

    window.changeImage = function(src, el) { 
      document.getElementById('mainImage').src = src; 
      document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active')); 
      el.classList.add('active'); 
    };

    window.updateQuantity = function(delta) { 
      const inp = document.getElementById('productQuantity'); 
      let v = parseInt(inp.value) || 1; 
      v += delta; 
      if(v < 1) v = 1; 
      if(currentProduct && v > currentProduct.stock) v = currentProduct.stock; 
      inp.value = v; 
      if(currentProduct) updateDeliveryBar(currentProduct.price * v); 
    };

    function updateDeliveryBar(t) { 
      const p = document.getElementById('deliveryProgress'); 
      const tx = document.getElementById('deliveryText'); 
      if(!p || !tx) return; 
      p.style.width = Math.min(100, (t/1299) * 100) + '%'; 
      tx.innerHTML = t >= 1299 ? 'You get free delivery!' : `Add <span style="font-weight:800; color:#d4af37;">₹${(1299 - t).toFixed(2)}</span> more`; 
    }

    window.toggleShare = function(e) { 
      e.stopPropagation(); 
      const m = document.getElementById('shareMenu'); 
      m.classList.toggle('show'); 
      if(m.classList.contains('show')) {
        setTimeout(() => document.addEventListener('click', function f(e) { 
          if(!m.contains(e.target) && !e.target.closest('.share-btn')) { 
            m.classList.remove('show'); 
            document.removeEventListener('click', f); 
          } 
        }), 100); 
      }
    };

    document.addEventListener('DOMContentLoaded', () => { 
      if (typeof window.loadComponents === 'function') {
        window.loadComponents();
      }
      loadProduct();
      
      window.addEventListener('orientationchange', function() {
        setTimeout(() => {
          if (document.querySelector('.high-demand-popup.show')) {
            document.body.style.overflow = 'hidden';
          }
        }, 100);
      });
    });

    window.copyLink = function() { 
      const i = document.getElementById('shareLink'); 
      i.select(); 
      navigator.clipboard.writeText(i.value); 
      document.querySelector('.copy-btn').textContent = 'Copied!'; 
      setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy', 2000); 
    };

    window.shareOn = function(platform) {
      const url = encodeURIComponent(window.location.href);
      const title = encodeURIComponent(currentProduct?.title || 'Check this product');
      let shareUrl = '';
      
      switch(platform) {
        case 'facebook':
          shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
          break;
        case 'twitter':
          shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
          break;
        case 'whatsapp':
          shareUrl = `https://wa.me/?text=${title}%20${url}`;
          break;
      }
      
      if (shareUrl) window.open(shareUrl, '_blank');
    };

    window.switchTab = function(t) { 
      document.querySelectorAll('.tab-header').forEach(h => h.classList.remove('active')); 
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
      document.querySelector(`.tab-header[onclick="switchTab('${t}')"]`).classList.add('active'); 
      document.getElementById(`tab-${t}`).classList.add('active'); 
    };
    
    function getDeliveryDates() {
      const today = new Date();
      const minDate = new Date(today);
      minDate.setDate(today.getDate() + 5);
      const maxDate = new Date(today);
      maxDate.setDate(today.getDate() + 7);
      
      const options = { day: 'numeric', month: 'short' };
      const minDateStr = minDate.toLocaleDateString('en-IN', options);
      const maxDateStr = maxDate.toLocaleDateString('en-IN', options);
      
      const minYear = minDate.getFullYear();
      const maxYear = maxDate.getFullYear();
      const currentYear = today.getFullYear();
      
      if (minYear !== currentYear || maxYear !== currentYear) {
        const yearOptions = { day: 'numeric', month: 'short', year: 'numeric' };
        return {
          min: minDate.toLocaleDateString('en-IN', yearOptions),
          max: maxDate.toLocaleDateString('en-IN', yearOptions),
          display: `${minDate.toLocaleDateString('en-IN', yearOptions)} - ${maxDate.toLocaleDateString('en-IN', yearOptions)}`
        };
      }
      
      return {
        min: minDateStr,
        max: maxDateStr,
        display: `${minDateStr} - ${maxDateStr}`
      };
    }

    window.addEventListener('scroll', () => { 
      document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 200); 
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const highDemandPopup = document.getElementById('highDemandPopup');
        if (highDemandPopup.classList.contains('show')) closeHighDemandPopup();
        
        const reviewModal = document.getElementById('reviewModal');
        if (reviewModal.classList.contains('show')) closeReviewModal();
        
        const razorpayPopup = document.getElementById('razorpayPopup');
        if (razorpayPopup.classList.contains('show')) razorpayPopup.classList.remove('show');
      }
    });
  </script>
</body>
</html>
