<div class="filters-bar">
  <div class="search-box">
    <i class="fa-solid fa-search"></i>
    <input type="text" id="search-requests-admin" placeholder="search name, email, phone or message...">
  </div>

  <div class="filter-tabs">
    <span class="filter-tab active" data-filter="all">all</span>
    <span class="filter-tab" data-filter="received">received</span>
    <span class="filter-tab" data-filter="processing">processing</span>
    <span class="filter-tab" data-filter="completed">completed</span>
    <span class="filter-tab" data-filter="with-image">with images</span>
  </div>

  <div class="action-group" style="display:flex; gap:8px; flex-wrap:wrap;">
    <button class="export-btn" onclick="exportAdminRequests()">
      <i class="fa-solid fa-download"></i> export
    </button>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-regular fa-message"></i></div>
    <div class="stat-info">
      <h3 id="requests-total">0</h3>
      <p>total requests</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-solid fa-hourglass-half"></i></div>
    <div class="stat-info">
      <h3 id="requests-open">0</h3>
      <p>open requests</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-regular fa-image"></i></div>
    <div class="stat-info">
      <h3 id="requests-images">0</h3>
      <p>with images</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-regular fa-envelope"></i></div>
    <div class="stat-info">
      <h3 id="requests-users">0</h3>
      <p>unique emails</p>
    </div>
  </div>
</div>

<div id="requests-loading" class="loading-spinner" style="display:none; justify-content:center; padding:40px;">
  <div class="spinner"></div>
</div>

<div class="reviews-table">
  <div class="table-header">
    <h2><i class="fa-regular fa-message"></i> enquiry requests</h2>
  </div>

  <div id="requests-empty-state" class="empty-state" style="display:none;">
    <i class="fa-regular fa-folder-open"></i>
    <h3>no requests yet</h3>
    <p>new submitted enquiries will appear here.</p>
  </div>

  <div class="table-wrapper" id="requests-table-wrapper">
    <table>
      <thead>
        <tr>
          <th>customer</th>
          <th>contact</th>
          <th>message</th>
          <th>images</th>
          <th>status</th>
          <th>date</th>
          <th>actions</th>
        </tr>
      </thead>
      <tbody id="requests-table-body"></tbody>
    </table>
  </div>

  <div id="requests-mobile-cards" class="mobile-cards"></div>

  <div class="pagination" id="requests-pagination" style="display:none;">
    <button class="page-btn" id="prev-request-page" onclick="changeRequestPage('prev')">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <div class="page-numbers" id="request-page-numbers"></div>
    <button class="page-btn" id="next-request-page" onclick="changeRequestPage('next')">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>
