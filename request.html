<div class="filters-bar">
  <div class="search-box">
    <i class="fa-solid fa-search"></i>
    <input type="text" id="search-requests-page" placeholder="search name, email, phone or message...">
  </div>

  <div class="filter-tabs">
    <span class="filter-tab request-filter-tab active" data-filter="all">all</span>
    <span class="filter-tab request-filter-tab" data-filter="received">received</span>
    <span class="filter-tab request-filter-tab" data-filter="processing">processing</span>
    <span class="filter-tab request-filter-tab" data-filter="completed">completed</span>
    <span class="filter-tab request-filter-tab" data-filter="with-image">with images</span>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
    <div class="stat-info">
      <h3 id="total-requests-count">0</h3>
      <p>total requests</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-solid fa-inbox"></i></div>
    <div class="stat-info">
      <h3 id="received-requests-count">0</h3>
      <p>received</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-solid fa-gears"></i></div>
    <div class="stat-info">
      <h3 id="processing-requests-count">0</h3>
      <p>processing</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-solid fa-image"></i></div>
    <div class="stat-info">
      <h3 id="request-images-count">0</h3>
      <p>with images</p>
    </div>
  </div>
</div>

<div id="requests-loading" class="loading-state" style="display:none;">
  <div class="spinner"></div>
</div>

<div class="reviews-table">
  <div class="table-header">
    <h2><i class="fa-solid fa-envelope-open-text"></i> enquiry requests</h2>
  </div>

  <div id="requests-empty-state" class="empty-state" style="display:none;">
    <i class="fa-regular fa-folder-open"></i>
    <h3>no requests found</h3>
    <p>No enquiry submissions match this filter.</p>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>name</th>
          <th>email</th>
          <th>phone</th>
          <th>message</th>
          <th>images</th>
          <th>status</th>
          <th>date</th>
          <th>actions</th>
        </tr>
      </thead>
      <tbody id="requests-table-body"></tbody>
    </table>
  </div>

  <div id="requests-mobile-cards" class="mobile-cards"></div>

  <div class="pagination" id="requests-pagination" style="display:none;">
    <button class="page-btn" id="prev-request-page" onclick="changeRequestPage('prev')">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <div class="page-numbers" id="request-page-numbers"></div>
    <button class="page-btn" id="next-request-page" onclick="changeRequestPage('next')">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>
